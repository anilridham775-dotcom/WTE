<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="steamhouse-wte-v4.0">
<title>Steam House — Waste-to-Energy Digital Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1a;
  --surface:#0e1627;
  --surface2:#152035;
  --surface3:#1c2d47;
  --border:rgba(99,120,158,.18);
  --border2:rgba(99,120,158,.28);
  --text:#e8f0fe;
  --text2:#8fa8cc;
  --text3:#4a6080;
  --accent:#00d97e;
  --accent2:#00b868;
  --blue:#4c9fff;
  --orange:#ffaa00;
  --red:#ff4d6a;
  --purple:#a78bfa;
  --yellow:#fbbf24;
  --sidebar-w:240px;
}

/* ── BASE ── */
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;width:100vw;display:flex;overflow:hidden;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,120,158,.3);border-radius:10px}

/* ── SIDEBAR ── */
#sb{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;flex-shrink:0;
}

/* Logo / brand area */
#sb-logo{
  padding:18px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:11px;
  background:linear-gradient(135deg,rgba(0,217,126,.06),rgba(76,159,255,.04));
}
#sb-logo .logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,217,126,.3);
}
#sb-logo .logo-text .name{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.2px;line-height:1.2}
#sb-logo .logo-text .sub{font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}

/* Nav section headers */
.nh{
  font-size:8.5px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text3);
  padding:14px 16px 5px;
}

/* Nav items — the core of Wide Gate */
.ni{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px 9px 16px;
  cursor:pointer;
  color:var(--text2);
  border-left:3px solid transparent;
  transition:all .18s ease;
  position:relative;
}
.ni .ni-icon{
  font-size:15px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;opacity:.75;transition:opacity .18s;
}
.ni .ni-label{
  flex:1;font-size:12.5px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .18s;
}
.ni:hover{
  background:rgba(99,120,158,.07);
  color:var(--text);
  border-left-color:rgba(99,120,158,.3);
}
.ni:hover .ni-icon{opacity:1}
.ni.on{
  color:var(--accent);
  border-left-color:var(--accent);
  background:linear-gradient(90deg,rgba(0,217,126,.1),transparent);
  font-weight:600;
}
.ni.on .ni-icon{opacity:1}
.ni.on .ni-label{color:var(--accent);font-weight:600}

/* Sidebar footer */
#sb-footer{
  padding:12px 16px;
  border-top:1px solid var(--border);
  font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:7px;
  margin-top:auto;
}
#sb-footer .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  animation:pulse 2s infinite;
  flex-shrink:0;
}

/* ── MAIN CONTENT AREA ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOP BAR ── */
#tb{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;height:54px;
  gap:16px;
}
#tb-left{display:flex;align-items:center;gap:0;min-width:0}
#tb-left .divider{width:1px;height:28px;background:var(--border2);margin:0 16px;flex-shrink:0}
.page-title{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
#tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-badge{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--accent);
  padding:4px 10px;
  background:rgba(0,217,126,.08);
  border:1px solid rgba(0,217,126,.2);
  border-radius:20px;
}
.tb-badge .tb-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}

/* ── CONTENT AREA ── */
#ct{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:18px 22px;
  display:flex;flex-direction:column;gap:14px;
  background:var(--bg);
  width:100%;
}

/* ── STAT CARDS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.sc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
  border-top:3px solid var(--c,var(--accent));
  position:relative;overflow:hidden;
}
.sc::after{
  content:'';position:absolute;
  top:0;right:0;width:60px;height:60px;
  background:radial-gradient(circle,rgba(255,255,255,.025),transparent 70%);
  border-radius:50%;
}
.sl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.sv{font-size:26px;font-weight:800;font-family:'Consolas','Courier New',monospace;line-height:1;margin-bottom:4px}
.ss{font-size:10.5px;color:var(--text3)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ch{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
}
.ct2{font-size:13px;font-weight:700;color:var(--text)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 210px);border-radius:0 0 12px 12px}
.tbl-wrap table{width:100%;min-width:500px;border-collapse:collapse}
.tbl-wrap thead tr th{
  position:sticky;top:0;z-index:5;
  background:#0a1220;
  text-align:left;padding:9px 14px;
  font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text3);font-weight:700;
  border-bottom:2px solid var(--border2);white-space:nowrap;
}
.tbl-wrap td{
  padding:10px 14px;color:var(--text2);
  border-bottom:1px solid rgba(255,255,255,.03);
  vertical-align:middle;
}
.tbl-wrap tr:hover td{background:rgba(99,120,158,.05)}

/* Search */
.search-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--surface2);flex-wrap:wrap;
}
.search-bar input{
  flex:1;min-width:180px;background:var(--surface3);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:7px 12px;font-size:12.5px;
  font-family:inherit;outline:none;
}
.search-bar input:focus{border-color:rgba(0,217,126,.4)}
.search-bar input::placeholder{color:var(--text3)}
.search-count{font-size:11px;color:var(--text3)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600}
.bg{background:rgba(0,217,126,.1);color:#00d97e;border:1px solid rgba(0,217,126,.25)}
.ba{background:rgba(255,170,0,.1);color:#ffaa00;border:1px solid rgba(255,170,0,.25)}
.br{background:rgba(255,77,106,.1);color:#ff4d6a;border:1px solid rgba(255,77,106,.25)}
.bb{background:rgba(76,159,255,.1);color:#4c9fff;border:1px solid rgba(76,159,255,.25)}
.bgr{background:rgba(99,120,158,.08);color:var(--text3);border:1px solid var(--border)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:8px;
  border:1px solid var(--border2);
  background:var(--surface3);color:var(--text);
  font-family:inherit;font-size:12.5px;cursor:pointer;
  font-weight:500;transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-g{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn-g:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm{padding:4px 10px;font-size:11.5px;border-radius:7px}

/* ── FORMS ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fl{font-size:11.5px;color:var(--text2);font-weight:600;margin-bottom:5px}
input,select,textarea{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:8px 11px;
  font-size:12.5px;width:100%;font-family:inherit;outline:none;
  transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(0,217,126,.45);
  box-shadow:0 0 0 3px rgba(0,217,126,.06);
}
.sec{
  font-size:9px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text3);
  padding:4px 0 8px;border-bottom:1px solid var(--border);
  margin:14px 0 10px;grid-column:1/-1;
}
.full{grid-column:1/-1}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:16px;backdrop-filter:blur(6px);
}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;width:600px;max-width:96vw;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
}
.mh{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;font-weight:700;color:var(--text);
  background:linear-gradient(135deg,rgba(0,217,126,.04),transparent);
}
.mb{padding:20px;overflow-y:auto;flex:1}
.mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* ── ALERTS ── */
.alert{padding:10px 14px;border-radius:10px;font-size:12.5px;border-left:3px solid}
.al-r{background:rgba(255,77,106,.06);border-color:var(--red);color:#fca5a5}
.al-a{background:rgba(255,170,0,.06);border-color:var(--orange);color:#fcd34d}
.al-g{background:rgba(0,217,126,.06);border-color:var(--accent);color:#6ee7b7}
.al-b{background:rgba(76,159,255,.06);border-color:var(--blue);color:#93c5fd}

/* ── PROGRESS BAR ── */
.prog{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px}

/* ── LOGIN ── */
.login-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;outline:none}
.login-input:focus{border-color:rgba(0,217,126,.45)}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
#ct > *{animation:fadeIn .2s ease}

/* ── COPY FLASH ── */
.copy-flash{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#000;padding:9px 22px;
  border-radius:22px;font-size:13px;font-weight:700;
  z-index:99999;pointer-events:none;opacity:0;transition:opacity .25s;
  box-shadow:0 4px 20px rgba(0,217,126,.4);
}
.copy-flash.show{opacity:1}

/* ── DRIVER APP ── */
.drv-app{background:var(--bg);height:100vh;width:100%;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;color:var(--text);display:flex;flex-direction:column;overflow:hidden}
.drv-header{background:var(--surface);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.drv-content{padding:14px;display:flex;flex-direction:column;gap:12px;max-width:640px;width:100%;margin:0 auto;box-sizing:border-box;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.drv-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.drv-nav-btn{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;font-family:inherit;transition:color .2s}
.drv-nav-btn.on{color:var(--accent)}
.drv-nav-btn .ic{font-size:20px}
.drv-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.drv-stat{background:rgba(0,0,0,.2);border-radius:10px;padding:12px;text-align:center}
.drv-stat .n{font-size:24px;font-weight:700;font-family:Consolas,monospace}
.drv-stat .l{font-size:10px;color:var(--text2);margin-top:2px}
.drv-btn{width:100%;padding:14px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:15px;font-family:inherit}
.drv-btn-primary{background:var(--accent);color:#000}
.drv-btn-warning{background:var(--orange);color:#000}
.drv-btn-info{background:var(--blue);color:#fff}
.drv-btn-ghost{background:rgba(99,120,158,.08);color:var(--text2);border:1px solid var(--border)}
.drv-trip-active{background:rgba(255,170,0,.07);border:2px solid var(--orange);border-radius:14px;padding:16px}
@media(min-width:600px){.drv-content{padding:20px;padding-bottom:80px}}
</style>
</head>

<script>
// Google Maps Places - Load dynamically
function loadGoogleMaps(callback) {
  if(window.google && window.google.maps) { callback(); return; }
  var script = document.createElement('script');
  script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyD-placeholder&libraries=places&callback=__gmCallback';
  script.async = true;
  window.__gmCallback = callback;
  document.head.appendChild(script);
}

// Location picker - shows address search with Google Maps autocomplete
// Falls back to manual entry if no API key
function showLocationPicker(latId, lngId, statusId, mapsLinkId) {
  var overlay = document.createElement('div');
  overlay.id = 'loc-picker-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px';
  
  overlay.innerHTML = '<div style="background:#162033;border:1px solid rgba(100,160,255,.15);border-radius:16px;width:480px;max-width:96vw;padding:20px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div style="font-size:14px;font-weight:700;color:#e2eeff">📍 Set Location</div>'
    +'<button onclick="document.getElementById(\'loc-picker-overlay\').remove()" style="background:none;border:none;color:#5a7a9a;cursor:pointer;font-size:20px">×</button>'
    +'</div>'
    // Search box
    +'<div style="margin-bottom:12px">'
    +'<div style="font-size:11.5px;color:#9ab8d4;margin-bottom:5px">Search Address or Place</div>'
    +'<div style="display:flex;gap:8px">'
    +'<input id="loc-search" placeholder="Type address, area, city..." style="background:#0f1724;border:1px solid rgba(100,160,255,.15);border-radius:8px;color:#e2eeff;padding:9px 12px;font-size:13px;flex:1;font-family:inherit" onkeyup="searchLocation(this.value)">'
    +'<button onclick="searchLocation(document.getElementById(\'loc-search\').value)" style="padding:9px 14px;border-radius:8px;border:none;background:#2196f3;color:#fff;cursor:pointer;font-size:13px;font-family:inherit">Search</button>'
    +'</div>'
    +'<div id="loc-suggestions" style="margin-top:6px;display:flex;flex-direction:column;gap:4px"></div>'
    +'</div>'
    // OR use current GPS
    +'<div style="background:#0f1724;border-radius:8px;padding:12px;margin-bottom:12px">'
    +'<div style="font-size:11.5px;color:#9ab8d4;margin-bottom:8px">OR use current GPS location</div>'
    +'<button onclick="useCurrentGPS()" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(0,230,118,.3);background:rgba(0,230,118,.08);color:#00e676;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600">🎯 Use My Current Location</button>'
    +'<div id="gps-status" style="font-size:11px;color:#8ab0d0;margin-top:6px;text-align:center"></div>'
    +'</div>'
    // Manual entry
    +'<div style="background:#0f1724;border-radius:8px;padding:12px">'

// Search using Nominatim (OpenStreetMap) - FREE, no API key needed
async function searchLocation(query) {
  if(!query || query.length < 3) return;
  var sugDiv = document.getElementById('loc-suggestions');
  if(!sugDiv) return;
  sugDiv.innerHTML = '<div style="font-size:11px;color:#8ab0d0;padding:4px">Searching...</div>';
  
  try {
    var url = 'https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(query)+'&countrycodes=in&limit=5&addressdetails=1';
    var resp = await fetch(url, {headers:{'Accept-Language':'en'}});
    var results = await resp.json();
    
    if(!results || results.length === 0) {
      sugDiv.innerHTML = '<div style="font-size:11px;color:#5a7a9a;padding:4px">No results found. Try a different search.</div>';
      return;
    }
    
    sugDiv.innerHTML = '';
    results.forEach(function(r) {
      var div = document.createElement('div');
      div.style.cssText = 'padding:8px 12px;background:#0f1724;border-radius:6px;cursor:pointer;font-size:12px;color:#e2eeff;border:1px solid rgba(100,160,255,.08)';
      div.innerHTML = '<div style="font-weight:600">'+r.display_name.split(',').slice(0,3).join(', ')+'</div>'
        +'<div style="font-size:10px;color:#5a7a9a;margin-top:2px">'+parseFloat(r.lat).toFixed(6)+', '+parseFloat(r.lon).toFixed(6)+'</div>';
      div.onmouseover = function(){this.style.background='#162033';this.style.borderColor='rgba(0,230,118,.2)';};
      div.onmouseout = function(){this.style.background='#0f1724';this.style.borderColor='rgba(100,160,255,.08)';};
      div.onclick = function() {
        var latEl = document.getElementById('loc-lat');
        var lngEl = document.getElementById('loc-lng');
        var searchEl = document.getElementById('loc-search');
        if(latEl) latEl.value = parseFloat(r.lat).toFixed(6);
        if(lngEl) lngEl.value = parseFloat(r.lon).toFixed(6);
        if(searchEl) searchEl.value = r.display_name.split(',').slice(0,3).join(', ');
        document.getElementById('loc-suggestions').innerHTML = '';
        updateLocPreview(parseFloat(r.lat), parseFloat(r.lon), r.display_name.split(',')[0]);
      };
      sugDiv.appendChild(div);
    });
  } catch(e) {
    sugDiv.innerHTML = '<div style="font-size:11px;color:#f44336;padding:4px">Search error. Try GPS or manual entry.</div>';
  }
}

function updateLocPreview(lat, lng, name) {
  var prev = document.getElementById('loc-preview');
  if(prev) {
    prev.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'
      +'<div style="font-size:11px;color:#00e676">✅ '+(name||'Location set')+': '+lat+', '+lng+'</div>'
      +'<a href="https://www.google.com/maps?q='+lat+','+lng+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ Maps →</a>'
      +'</div>';
  }
}

function useCurrentGPS() {
  var status = document.getElementById('gps-status');
  if(status) status.textContent = '🔄 Getting GPS...';
  if(!navigator.geolocation) {
    if(status) status.textContent = 'GPS not supported';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude.toFixed(6);
      var lng = pos.coords.longitude.toFixed(6);
      var latEl = document.getElementById('loc-lat');
      var lngEl = document.getElementById('loc-lng');
      if(latEl) latEl.value = lat;
      if(lngEl) lngEl.value = lng;
      if(status) status.innerHTML = '✅ GPS detected! Accuracy: ±'+Math.round(pos.coords.accuracy)+'m';
      updateLocPreview(lat, lng, 'Current Location');
    },
    function(e) {
      if(status) status.textContent = '❌ '+(e.code===1?'Permission denied':'Could not detect');
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function confirmLocation() {
  var lat = document.getElementById('loc-lat') ? document.getElementById('loc-lat').value : '';
  var lng = document.getElementById('loc-lng') ? document.getElementById('loc-lng').value : '';
  
  if(!lat || !lng) {
    alert('Please search for a location, use GPS, or enter coordinates manually.');
    return;
  }
  
  var target = window._locTarget || {};
  
  // Set values in the target fields
  if(target.latId) {
    var el = document.getElementById(target.latId);
    if(el) el.value = lat;
  }
  if(target.lngId) {
    var el2 = document.getElementById(target.lngId);
    if(el2) el2.value = lng;
  }
  if(target.statusId) {
    var el3 = document.getElementById(target.statusId);
    if(el3) el3.innerHTML = '✅ Location set: '+lat+', '+lng;
  }
  if(target.mapsLinkId) {
    var el4 = document.getElementById(target.mapsLinkId);
    if(el4) el4.innerHTML = '<a href="https://www.google.com/maps?q='+lat+','+lng+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ View on Google Maps →</a>';
  }
  
  // Remove overlay
  var overlay = document.getElementById('loc-picker-overlay');
  if(overlay) overlay.remove();
}

function filterTbl(tid, query) {
  var table = document.getElementById(tid);
  if(!table) return;
  var q = query.toLowerCase().trim();
  var rows = table.querySelectorAll('tbody tr');
  var visible = 0;
  rows.forEach(function(row){
    var text = (row.getAttribute('data-plain')||'').toLowerCase();
    var show = !q || text.indexOf(q) >= 0;
    row.style.display = show ? '' : 'none';
    if(show) visible++;
  });
  var cnt = document.getElementById('cnt-'+tid);
  if(cnt) cnt.textContent = visible + ' / ' + rows.length + ' rows';
}

function sortTbl(tid, colIdx) {
  var table = document.getElementById(tid);
  if(!table) return;
  var asc = table.getAttribute('data-sort-col') == colIdx && table.getAttribute('data-sort-dir') !== 'asc';
  table.setAttribute('data-sort-col', colIdx);
  table.setAttribute('data-sort-dir', asc ? 'asc' : 'desc');
  table.querySelectorAll('thead th span[id^="si-"]').forEach(function(s){ s.textContent = '⇅'; });
  var si = document.getElementById('si-'+tid+'-'+colIdx);
  if(si) si.textContent = asc ? '↑' : '↓';
  var tbody = table.querySelector('tbody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort(function(a, b){
    var av = (a.querySelectorAll('td')[colIdx]||{}).innerText||'';
    var bv = (b.querySelectorAll('td')[colIdx]||{}).innerText||'';
    var an = parseFloat(av.replace(/[^0-9.-]/g,'')), bn = parseFloat(bv.replace(/[^0-9.-]/g,''));
    if(!isNaN(an) && !isNaN(bn)) return asc ? an-bn : bn-an;
    return asc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  rows.forEach(function(r){ tbody.appendChild(r); });
}

function copyRow(row) {
  var text = (row.getAttribute('data-plain')||'').replace(/\|/g,'  ');
  navigator.clipboard.writeText(text).then(function(){
    row.classList.add('tbl-copied');
    setTimeout(function(){ row.classList.remove('tbl-copied'); }, 1200);
    showCopyFlash('Row copied to clipboard!');
  }).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopyFlash('Row copied!');
  });
}

function copyAllVisible(tid) {
  var table = document.getElementById(tid);
  if(!table) return;
  var heads = Array.from(table.querySelectorAll('thead th')).map(function(th){
    return th.innerText.replace(/[⇅↑↓]/g,'').trim();
  }).join('\t');
  var rows = Array.from(table.querySelectorAll('tbody tr')).filter(function(r){
    return r.style.display !== 'none';
  });
  var lines = rows.map(function(r){ return (r.getAttribute('data-plain')||'').replace(/ \| /g,'\t'); });
  var text = heads + '\n' + lines.join('\n');
  navigator.clipboard.writeText(text).then(function(){
    showCopyFlash(lines.length + ' rows copied to clipboard!');
  }).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopyFlash(lines.length + ' rows copied!');
  });
}

function showCopyFlash(msg) {
  var el = document.getElementById('copy-flash-global');
  if(!el){
    el = document.createElement('div');
    el.id = 'copy-flash-global';
    el.className = 'copy-flash';

  el.textContent = '✅ ' + msg;
  el.classList.add('show');
  clearTimeout(window._flashTimer);

}

// ── OTP HELPERS ───────────────────────────────────────────
// OTP is daily — same OTP valid for the whole calendar day (resets at 00:01)
// Key: otp_{email}_{YYYY-MM-DD}
function otpTodayKey(email){
  return 'otp_'+email+'_'+new Date().toISOString().split('T')[0];
}
function otpGenerate(){
  return String(Math.floor(100000+Math.random()*900000)); // 6-digit
}
function otpStore(email,otp){
  // Store OTP keyed to today's date — auto-invalid tomorrow
  localStorage.setItem(otpTodayKey(email), otp);
}
function otpGet(email){
  return localStorage.getItem(otpTodayKey(email));
}
function otpClear(email){
  // Clear today and any old keys for this email
  Object.keys(localStorage).forEach(function(k){
    if(k.startsWith('otp_'+email+'_'))localStorage.removeItem(k);
  });
}
function otpAlreadyVerifiedToday(email){
  return localStorage.getItem('otp_verified_'+email) === new Date().toISOString().split('T')[0];
}
function otpMarkVerified(email){
  // Clean up old verified markers first
  Object.keys(localStorage).forEach(function(k){
    if(k.startsWith('otp_verified_'))localStorage.removeItem(k);
  });
  localStorage.setItem('otp_verified_'+email, new Date().toISOString().split('T')[0]);
}
async function otpSend(user, otp){
  var s=localStorage.getItem('ej_service'),t=localStorage.getItem('ej_template_otp')||localStorage.getItem('ej_template'),k=localStorage.getItem('ej_pubkey');
  if(!s||!t||!k) throw new Error('EmailJS not configured. Go to User Management to set it up.');
  emailjs.init(k);
  var result = await emailjs.send(s, t, {
    to_email:     user.email,
    contact_name: user.full_name,
    otp_code:     otp,
    valid_until:  'midnight tonight — same OTP valid all day',
    login_url:    window.location.origin,
    company_name: 'Steam House'
  });
  if(!result||result.status!==200) throw new Error('EmailJS status: '+(result?result.status:'no response'));
}

var _otpSending=false;
async function doLogin(){
  var email=document.getElementById('l_email').value.trim().toLowerCase();
  var pin=document.getElementById('l_pin').value.trim();
  if(!email||!pin){loginErr('Enter your email and PIN.');return;}

  var btn=document.getElementById('login-btn');
  if(btn){btn.textContent='Checking...';btn.disabled=true;}

  try{
    var data=await sbFetch('user_roles',{select:'*',eq:{email:email}});
    var arr=safeArr(data);
    var user=arr[0];
    if(!user){
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      loginErr('Email not found. Check your email address.');
      return;
    }
    if(String(user.pin)!==String(pin)){
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      loginErr('Incorrect PIN. Please try again.');
      return;
    }
    if(!user.is_active){
      if(btn){btn.textContent='Sign In';btn.disabled=false;}
      loginErr('Your account is inactive. Contact admin.');
      return;
    }

    // Check if EmailJS is configured
    var ejService=localStorage.getItem('ej_service');
    var ejKey=localStorage.getItem('ej_pubkey');
    if(!ejService||!ejKey){
      // EmailJS not set up — skip OTP, warn admin
      console.warn('EmailJS not configured — OTP skipped');
      CURRENT_USER=user;
      localStorage.setItem('wteshl_user',JSON.stringify(user));
      if(user.role==='driver')showDriverApp();
      else if(user.role==='generator')showGeneratorPortal();
      else initERP();
      return;
    }

    // Check if OTP already sent today (don't resend unless user asks)
    var existingOtp=otpGet(email);
    if(!existingOtp){
      existingOtp=otpGenerate();
      otpStore(email,existingOtp);
    }

    // Send OTP
    if(btn){btn.textContent='Sending OTP...';btn.disabled=true;}
    await otpSend(user, existingOtp);
    showOTPScreen(user);

  }catch(e){
    if(btn){btn.textContent='Sign In';btn.disabled=false;}
    loginErr('Error: '+e.message);
  }
}

window.doVerifyOTP=function(){
  var entered=(document.getElementById('l_otp').value||'').trim();
  var user=window._pendingLoginUser;
  if(!user){showLogin();return;}
  if(!entered||entered.length!==6){loginErr('Enter the 6-digit OTP from your email.');return;}

  var stored=otpGet(user.email);
  if(!stored){loginErr('OTP expired or not found. Please go back and sign in again.');return;}
  if(entered!==stored){loginErr('Incorrect OTP. Please check your email and try again.');return;}

  // OTP correct — clear used OTP (new one generated next login same day from stored)
  // Do NOT clear — keep OTP stored so user can login again today with same OTP
  window._pendingLoginUser=null;

  CURRENT_USER=user;
  localStorage.setItem('wteshl_user',JSON.stringify(user));
  if(user.role==='driver')showDriverApp();
  else if(user.role==='generator')showGeneratorPortal();
  else initERP();
};

window.doResendOTP=async function(){
  var user=window._pendingLoginUser;
  if(!user){showLogin();return;}
  try{
    // Check if OTP already exists for today — resend same one, don't generate new
    var existingOtp=otpGet(user.email);
    if(existingOtp){
      loginInfo('Resending your OTP for today...');
      await otpSend(user,existingOtp);
      loginInfo('OTP resent! Check your email (same code as before).');
    }else{
      // New day — generate fresh OTP
      loginInfo('Sending new OTP...');
      var newOtp=otpGenerate();
      otpStore(user.email,newOtp);
      await otpSend(user,newOtp);
      loginInfo('OTP sent! Check your email.');
    }
  }catch(e){
    loginErr('Failed to resend: '+e.message);
  }
};

async function renderBoiler(){
  var ct=document.getElementById('ct');
  try{
    var sites=safeArr(await sbFetch('processing_sites',{select:'*',order:'created_at.desc'}));
    var boilerSites=sites.filter(function(s){return s.site_type==='Boiler'||s.site_type==='WTE-Plant';});
    var crusherSites=sites.filter(function(s){return s.site_type==='Crusher';});
    var boilerLogs=safeArr(await sbFetch('boiler_operations',{select:'*,processing_sites(site_name)',order:'op_date.desc',limit:30}));
    var crusherLogs=safeArr(await sbFetch('crusher_operations',{select:'*,processing_sites(site_name)',order:'op_date.desc',limit:30}));

    // Summary stats
    var todayStr=new Date().toISOString().split('T')[0];
    var todayBoiler=boilerLogs.filter(function(b){return b.op_date===todayStr;});
    var todayCrusher=crusherLogs.filter(function(c){return c.op_date===todayStr;});
    var totalSteam=todayBoiler.reduce(function(a,b){return a+(parseFloat(b.steam_output_tons)||0);},0);
    var totalCrushed=todayCrusher.reduce(function(a,c){return a+(parseFloat(c.material_crushed_tons)||0);},0);

    var boilerRows=boilerLogs.map(function(b){
      var siteName=(b.processing_sites&&b.processing_sites.site_name)||b.site_id||'-';
      return[b.op_code||'-',b.op_date||'-',siteName,
        b.combustion_temp_c?b.combustion_temp_c+'°C':'-',
        b.steam_output_tons?b.steam_output_tons+'T':'-',
        b.steam_pressure_bar?b.steam_pressure_bar+' bar':'-',
        b.efficiency_pct?b.efficiency_pct+'%':'-',
        b.fuel_used_kg?b.fuel_used_kg+' kg':'-',
        badge(b.status==='Running'?'g':b.status==='Shutdown'?'r':'a',b.status||'—'),
        b.operator_name||'-',
        '<button class="btn btn-sm" id="ebo'+b.id+'">Edit</button>'];
    });
    var crusherRows=crusherLogs.map(function(c){
      var siteName=(c.processing_sites&&c.processing_sites.site_name)||c.site_id||'-';
      return[c.op_code||'-',c.op_date||'-',siteName,
        c.material_type||'-',
        c.material_crushed_tons?c.material_crushed_tons+'T':'-',
        c.output_size_mm?c.output_size_mm+' mm':'-',
        c.machine_hours?c.machine_hours+'h':'-',
        c.power_consumed_kwh?c.power_consumed_kwh+' kWh':'-',
        badge(c.status==='Running'?'g':c.status==='Shutdown'?'r':'a',c.status||'—'),
        c.operator_name||'-',
        '<button class="btn btn-sm" id="eco'+c.id+'">Edit</button>'];
    });

    ct.innerHTML=
      '<div class="sg">'
        +sc('#f44336','Boiler Sites',boilerSites.length,'Active plants')
        +sc('#ff9800','Today Steam',totalSteam.toFixed(1)+'T','Output today')
        +sc('#2196f3','Crusher Sites',crusherSites.length,'Active units')
        +sc('#00e676','Crushed Today',totalCrushed.toFixed(1)+'T','Material today')
      +'</div>'
      +card('🔥 Boiler Operations Log',
        '<button class="btn btn-g btn-sm" onclick="newBoilerOp()">+ Log Boiler Op</button>',
        tbl(['Code','Date','Site','Temp','Steam','Pressure','Efficiency','Fuel','Status','Operator',''],boilerRows),true)
      +card('⚙️ Crusher Operations Log',
        '<button class="btn btn-g btn-sm" onclick="newCrusherOp()">+ Log Crusher Op</button>',
        tbl(['Code','Date','Site','Material','Crushed','Output Size','Hours','Power','Status','Operator',''],crusherRows),true);

    setTimeout(function(){
      document.querySelectorAll('[id^="ebo"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){editBoilerOp(id);};});
      document.querySelectorAll('[id^="eco"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){editCrusherOp(id);};});
    },150);
  }catch(e){ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}
}

window.saveDriver=async function(){
  var name=gv('d_name'),mobile=gv('d_mobile'),dl=gv('d_dl'),dlexp=gv('d_dlexp'),email=gv('d_email'),pin=gv('d_pin');
  if(!name||!mobile||!dl||!dlexp){alert('Name, Mobile, DL Number and DL Expiry are required.');return;}
  if(email&&!pin){alert('PIN is required when Email is provided.');return;}
  try{
    // Step 1 — Create Staff Profile (HR record)
    var staffCode=await sbRpc('next_staff_code');
    var staffRec=await sbInsert('staff_profiles',{
      staff_code:staffCode,full_name:name,mobile:mobile,email:email||null,
      department:gv('d_dept')||'Fleet',designation_type:'Driver',
      designation:'Driver',basic_salary:parseFloat(gv('d_salary'))||0,
      joining_date:gv('d_join')||null,is_active:true
    });
    var staffId=staffRec[0]&&staffRec[0].id;

    // Step 2 — Create Login (User Role)
    var userId=null;
    if(email&&pin){
      try{
        // Check if email already exists
        var existing=safeArr(await sbFetch('user_roles',{select:'id,email',eq:{email:email}}));
        if(existing.length>0){
          // Email exists — just link to existing user record
          userId=existing[0].id;
          // Update staff_id on existing record
          await sbUpdate('user_roles',{staff_id:staffId||null,full_name:name,phone:mobile},{id:userId});
          console.log('Linked to existing login:',email);
        }else{
          var userRec=await sbInsert('user_roles',{
            full_name:name,email:email,phone:mobile,
            role:'driver',pin:pin,is_active:true,staff_id:staffId||null
          });
          userId=userRec[0]&&userRec[0].id;
        }
      }catch(ue){console.warn('Login creation failed:',ue.message||ue);}
    }

    // Step 3 — Create Driver Registry record (linked to staff + user)
    var driverCode=await sbRpc('next_driver_code');
    var dob=gv('d_dob');
    if(!dob){alert('Date of Birth is required.');return;}
    await sbInsert('drivers',{
      driver_code:driverCode,full_name:name,mobile:mobile,
      dob:dob,blood_group:gv('d_blood')||null,dl_no:dl,dl_expiry:dlexp,
      police_verified:gv('d_police')==='Verified',
      employment_type:gv('d_emp')||'Permanent',
      joining_date:gv('d_join')||null,status:'Active',
      staff_id:staffId||null,user_id:userId||null
    });

    closeModal();
    success('Driver '+driverCode+' registered! ✅ Staff profile '+staffCode+' created.'+(email?' 🔐 Login created.':' ⚠️ No login (no email provided).'));
    renderDrivers();
  }catch(e){alert('Error: '+e.message);}
};

window.saveDriverEdit=async function(id,userId,staffId){
  try{
    // Update driver record
    var driverUpdate={
      full_name:gv('ed_name'),
      mobile:gv('ed_mobile'),
      dl_no:gv('ed_dl'),
      dl_expiry:gv('ed_dlexp')||null,
      dob:gv('ed_dob')||null,
      blood_group:document.getElementById('ed_blood')?document.getElementById('ed_blood').value:null,
      employment_type:document.getElementById('ed_emp')?document.getElementById('ed_emp').value:null,
      joining_date:gv('ed_join')||null,
      police_verified:document.getElementById('ed_police')?document.getElementById('ed_police').value==='Verified':false,
      status:document.getElementById('ed_status')?document.getElementById('ed_status').value:'Active'
    };
    await sbUpdate('drivers',driverUpdate,{id:id});

    // Update login if exists
    if(userId){
      var emailEl=document.getElementById('ed_email');
      var pinEl=document.getElementById('ed_pin');
      var activeEl=document.getElementById('ed_active');
      var userUpdate={};
      if(emailEl&&emailEl.value)userUpdate.email=emailEl.value.trim();
      if(pinEl&&pinEl.value)userUpdate.pin=pinEl.value.trim();
      if(activeEl)userUpdate.is_active=activeEl.value==='true';
      userUpdate.full_name=gv('ed_name');
      userUpdate.phone=gv('ed_mobile');
      if(Object.keys(userUpdate).length)await sbUpdate('user_roles',userUpdate,{id:userId});
    }

    // Update staff profile if exists
    if(staffId){
      var salEl=document.getElementById('ed_salary');
      var deptEl=document.getElementById('ed_dept');
      var staffUpdate={full_name:gv('ed_name'),mobile:gv('ed_mobile')};
      if(salEl)staffUpdate.basic_salary=parseFloat(salEl.value)||0;
      if(deptEl)staffUpdate.department=deptEl.value;
      await sbUpdate('staff_profiles',staffUpdate,{id:staffId});
    }

    closeModal();
    success('Driver '+gv('ed_name')+' updated successfully!');
    renderDrivers();
  }catch(e){alert('Error: '+e.message);}
};

window.savePM = async function() {
  var veh = gv('pm_veh');
  if(!veh) { alert('Please select a vehicle.'); return; }
  var svcs = window._pmServices || [];
  var toSave = [];
  svcs.forEach(function(svc, idx){
    var cb = document.getElementById('pm_cb_'+idx);
    var sd = document.getElementById('pm_sd_'+idx);
    if(cb && cb.checked) {
      if(!sd || !sd.value) { alert('Please set a service date for: '+svc.label); return; }
      toSave.push({ label: svc.label, date: sd.value, next: document.getElementById('pm_nd_'+idx) ? document.getElementById('pm_nd_'+idx).value : '' });
    }
  });
  if(toSave.length === 0) { alert('Please select at least one service.'); return; }
  var parts = parseFloat(gv('pm_parts'))||0;
  var labour = parseFloat(gv('pm_labour'))||0;
  var totalPerService = toSave.length > 1 ? 0 : parts + labour;
  try {
    var created = 0;
    for(var i = 0; i < toSave.length; i++) {
      await sbInsert('preventive_maintenance', {
        pm_code: 'PM-'+Date.now()+'-'+i,
        vehicle_id: veh,
        pm_type: toSave[i].label,
        service_date: toSave[i].date,
        odometer_km: gv('pm_odo') ? parseInt(gv('pm_odo')) : null,
        technician: gv('pm_technician') || null,
        workshop: gv('pm_vendor') || null,
        parts_cost: toSave.length === 1 ? parts : null,
        labour_cost: toSave.length === 1 ? labour : null,
        next_service_km: gv('pm_next_km') ? parseInt(gv('pm_next_km')) : null,
        next_service_date: toSave[i].next || null,
        notes: gv('pm_notes') || null,
        data_source: 'MANUAL',
        supervisor_pin_verified: gv('pm_pin').length === 4
      });
      created++;
    }
    closeModal();
    success(created+' PM service(s) saved successfully!');
    renderPM();
  } catch(e) { alert('Error: '+e.message); }
};

window.saveRM = async function() {
  var veh = gv('rm_veh'), dt = gv('rm_dt');
  if(!veh || !dt) { alert('Vehicle and breakdown date/time are required.'); return; }

  var faults = window._rmFaultTypes || [];
  var selectedFaults = [];
  faults.forEach(function(ft, idx){
    var cb = document.getElementById('rm_cb_'+idx);
    var note = document.getElementById('rm_note_'+idx);
    if(cb && cb.checked) selectedFaults.push(ft.label + (note && note.value ? ' — '+note.value : ''));
  });
  if(selectedFaults.length === 0) { alert('Please select at least one fault type.'); return; }

  try {
    await sbInsert('reactive_maintenance', {
      rm_code: 'RM-'+Date.now(),
      vehicle_id: veh,
      breakdown_at: dt,
      fault_category: selectedFaults[0].split(' — ')[0].replace(/^[^a-zA-Z]+/,'').trim(),
      fault_description: selectedFaults.join('; '),
      severity: gv('rm_severity') || 'Medium',
      location: gv('rm_location') || null,
      downtime_hours: gv('rm_downtime') ? parseFloat(gv('rm_downtime')) : null,
    });
    closeModal();
    success('Breakdown logged successfully!');
    renderRM();
  } catch(e) { alert('Error: '+e.message); }
};

function csvDownload(filename, rows){
  var csv=rows.map(function(r){return r.map(function(c){var s=String(c===null||c===undefined?'':c);return s.includes(',')|| s.includes('"')|| s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  success('Downloaded: '+filename);
}

window.prLoadStaff=async function(sel){
  var opt=sel.options[sel.selectedIndex];
  var sal=opt.getAttribute('data-sal')||0;
  var type=opt.getAttribute('data-type')||'';
  var salEl=document.getElementById('pr_basic');
  if(salEl)salEl.value=sal;
  var staffId=sel.value;
  var month=parseInt(document.getElementById('pr_month').value);
  var year=parseInt(gv('pr_year'));
  if(!staffId||!month||!year)return;
  var startDate=year+'-'+String(month).padStart(2,'0')+'-01';
  var endDate=new Date(year,month,0).toISOString().split('T')[0];

  // Show loading state
  var loadingFields=['pr_pdays','pr_ldays','pr_trips','pr_wtons','pr_tripinc','pr_wtinc','pr_attbonus','pr_advrec'];
  loadingFields.forEach(function(f){var el=document.getElementById(f);if(el)el.style.opacity='0.4';});

  try{
    // ── 1. AUTO-CALCULATE ATTENDANCE ──────────────────────
    var att=await calcAttendanceForPayroll(staffId,month,year);
    if(document.getElementById('pr_pdays'))document.getElementById('pr_pdays').value=att.present_days;
    if(document.getElementById('pr_ldays'))document.getElementById('pr_ldays').value=att.late_count;
    if(document.getElementById('pr_absded')){
      // Auto-calc absent deduction
      var basic=parseFloat(sal)||0;
      var absDed=att.absent_days>0?Math.round((basic/26)*att.absent_days):0;
      document.getElementById('pr_absded').value=absDed;
    }
    // Late deduction days → ₹
    if(document.getElementById('pr_lateded')&&att.late_deduction_days>0){
      var basic2=parseFloat(sal)||0;
      document.getElementById('pr_lateded').value=Math.round((basic2/26)*att.late_deduction_days);
    }

    // ── 2. AUTO-COUNT TRIPS ───────────────────────────────
    var crewTrips=safeArr(await sbFetch('trip_crew',{select:'trip_id,trips(trip_date,total_weight_kg)',eq:{staff_id:staffId}}));
    var monthTrips=crewTrips.filter(function(c){return c.trips&&c.trips.trip_date>=startDate&&c.trips.trip_date<=endDate;});
    var tripCount=monthTrips.length;
    var totalWt=monthTrips.reduce(function(s,c){return s+(parseFloat(c.trips&&c.trips.total_weight_kg||0));},0)/1000;
    if(document.getElementById('pr_trips'))document.getElementById('pr_trips').value=tripCount;
    if(document.getElementById('pr_wtons'))document.getElementById('pr_wtons').value=totalWt.toFixed(2);

    // ── 3. AUTO-PICK INCENTIVE RATE ───────────────────────
    var rates=safeArr(await sbFetch('incentive_master',{select:'*',eq:{status:'Active'},order:'effective_from.desc'}));
    var today=new Date().toISOString().split('T')[0];
    var rate=rates.find(function(r){
      return(r.applicable_to===type||r.applicable_to==='Both')
        &&r.effective_from<=today&&(!r.effective_to||r.effective_to>=today);
    });
    if(rate){
      var tripInc=tripCount*(rate.trip_incentive_rate||0);
      var wtInc=totalWt*(rate.weight_incentive_rate||0);
      // Attendance bonus only if no excess lates
      var attBonus=att.late_count<=6?rate.attendance_bonus||0:0;
      if(document.getElementById('pr_tripinc'))document.getElementById('pr_tripinc').value=tripInc.toFixed(0);
      if(document.getElementById('pr_wtinc'))document.getElementById('pr_wtinc').value=wtInc.toFixed(0);
      if(document.getElementById('pr_attbonus'))document.getElementById('pr_attbonus').value=attBonus;
    }

    // ── 4. AUTO-FILL ADVANCE RECOVERY ────────────────────
    var staffAdvances=(window._prAdvances||[]).filter(function(a){return a.staff_id===staffId;});
    if(staffAdvances.length){
      var totalBal=staffAdvances.reduce(function(s,a){return s+(a.balance||0);},0);
      var maxRecovery=Math.round(parseFloat(sal)*0.5);
      if(document.getElementById('pr_advrec'))document.getElementById('pr_advrec').value=Math.min(totalBal,maxRecovery).toFixed(0);
    }

    // Show summary info
    var infoDiv=document.getElementById('pr_attinfo');
    if(!infoDiv){
      var sumDiv=document.getElementById('pr_summary');
      if(sumDiv)sumDiv.insertAdjacentHTML('beforebegin','<div id="pr_attinfo"></div>');
      infoDiv=document.getElementById('pr_attinfo');
    }
    if(infoDiv)infoDiv.innerHTML='<div style="background:#0f1724;border-radius:8px;padding:10px;font-size:11.5px;color:#8ab0d0;margin-bottom:8px">'
      +'📊 <strong style="color:#00e676">Attendance Auto-Loaded</strong> — '
      +'Present: <strong>'+att.present_days+' days</strong> · '
      +'Absent: <strong>'+att.absent_days+' days</strong> · '
      +'Late: <strong>'+att.late_count+' times</strong>'
      +(att.late_count>6?' · <span style="color:#f44336">'+( att.late_count-6)+' excess lates → -'+att.late_deduction_days+' day deduction</span>':'')
      +' · Hours: <strong>'+att.total_hours+'h</strong>'
      +'</div>';

    loadingFields.forEach(function(f){var el=document.getElementById(f);if(el)el.style.opacity='1';});
  }catch(e){
    loadingFields.forEach(function(f){var el=document.getElementById(f);if(el)el.style.opacity='1';});
    console.warn('Auto-load error:',e);
  }
};

    +'<div style="color:#9ab8d4">Attendance Bonus</div><div style="text-align:right;color:#00e676">+₹'+attBonus.toLocaleString('en-IN')+'</div>'
    +'<div style="color:#9ab8d4;border-top:1px solid rgba(100,160,255,.1);padding-top:6px;margin-top:4px">Gross Pay</div><div style="text-align:right;border-top:1px solid rgba(100,160,255,.1);padding-top:6px;margin-top:4px;font-weight:700">₹'+gross.toLocaleString('en-IN')+'</div>'
    +'<div style="color:#f44336">Absent Deduction</div><div style="text-align:right;color:#f44336">-₹'+absDed.toLocaleString('en-IN')+'</div>'
    +'<div style="color:#f44336">Late Deduction</div><div style="text-align:right;color:#f44336">-₹'+lateDed.toLocaleString('en-IN')+'</div>'
    +'<div style="color:#f44336">Advance Recovery</div><div style="text-align:right;color:#f44336">-₹'+advRec.toLocaleString('en-IN')+'</div>'
    +'<div style="color:#f44336">Other Deductions</div><div style="text-align:right;color:#f44336">-₹'+otherDed.toLocaleString('en-IN')+'</div>'
    +'<div style="color:#9ab8d4;border-top:1px solid rgba(100,160,255,.1);padding-top:6px;margin-top:4px">Total Deductions</div><div style="text-align:right;color:#f44336;border-top:1px solid rgba(100,160,255,.1);padding-top:6px;margin-top:4px;font-weight:700">-₹'+totalDed.toLocaleString('en-IN')+'</div>'

    +'</div></div>';

window.savePayroll=async function(){
  var staffId=gv('pr_staff');var month=document.getElementById('pr_month').value;var year=gv('pr_year');
  if(!staffId||!month||!year){alert('Staff, Month and Year are required.');return;}
  var basic=parseFloat(gv('pr_basic'))||0;
  var wdays=parseFloat(gv('pr_wdays'))||26;
  var pdays=parseFloat(gv('pr_pdays'))||wdays;
  var ldays=parseFloat(gv('pr_ldays'))||0;
  var absdays=wdays-pdays;
  var tripInc=parseFloat(gv('pr_tripinc'))||0;
  var wtInc=parseFloat(gv('pr_wtinc'))||0;
  var attBonus=parseFloat(gv('pr_attbonus'))||0;
  var advRec=parseFloat(gv('pr_advrec'))||0;
  var lateDed=parseFloat(gv('pr_lateded'))||0;
  var absDed=parseFloat(gv('pr_absded'))||Math.round((basic/wdays)*absdays);
  var otherDed=parseFloat(gv('pr_othded'))||0;
  var gross=basic+tripInc+wtInc+attBonus;
  var totalDed=advRec+lateDed+absDed+otherDed;
  var net=gross-totalDed;
  try{
    var code=await sbRpc('next_payroll_code');
    await sbInsert('payroll',{
      payroll_code:code,staff_id:staffId,month:parseInt(month),year:parseInt(year),
      basic_salary:basic,working_days:wdays,present_days:pdays,late_days:ldays,
      absent_days:absdays,trips_count:parseInt(gv('pr_trips'))||0,
      total_weight_tons:parseFloat(gv('pr_wtons'))||0,
      trip_incentive:tripInc,weight_incentive:wtInc,attendance_bonus:attBonus,
      gross_pay:gross,advance_recovery:advRec,late_deduction:lateDed,
      absent_deduction:absDed,other_deduction:otherDed,
      total_deductions:totalDed,net_pay:net,
      status:'Draft',notes:gv('pr_notes')||null
    });
    closeModal();success('Payroll '+code+' saved as Draft!');renderPayroll();
  }catch(e){alert('Error: '+e.message);}
};

// ATTENDANCE AUTO-CALCULATE FOR PAYROLL
// ══════════════════════════════════════════════════════════
window.calcAttendanceForPayroll=async function(staffId, month, year){
  // Get all attendance records for this staff this month
  var startDate=year+'-'+String(month).padStart(2,'0')+'-01';
  var endDate=new Date(year,month,0).toISOString().split('T')[0];

  var attRecs=safeArr(await sbFetch('attendance',{
    select:'*',
    order:'punch_time.asc'
  })).filter(function(a){
    if(!a.punch_time)return false;
    var d=a.punch_time.split('T')[0];
    // Match by staff_id or user_role_id linked to staff
    return d>=startDate&&d<=endDate&&(a.staff_id===staffId);
  });

  // Get shift roster for this month to know late_after per day
  var rosterRecs=safeArr(await sbFetch('staff_shift_roster',{
    select:'*,shift_master(start_time,end_time,late_after,min_hours,is_overnight)',
    eq:{staff_id:staffId},
    order:'week_start.asc'
  }));

  function getShiftForDate(dateStr){
    var rec=rosterRecs.find(function(r){return r.week_start<=dateStr&&r.week_end>=dateStr;});
    return rec?rec.shift_master:null;
  }

  // Group by date
  var byDate={};
  attRecs.forEach(function(a){
    var d=a.punch_time.split('T')[0];
    if(!byDate[d])byDate[d]={ins:[],outs:[]};
    if(a.punch_type==='IN')byDate[d].ins.push(a.punch_time);
    else byDate[d].outs.push(a.punch_time);
  });

  var presentDays=0,absentDays=0,lateCount=0,earlyCount=0,totalHours=0,halfDays=0;
  var WORKING_DAYS=26;

  Object.keys(byDate).forEach(function(date){
    var rec=byDate[date];
    var shift=getShiftForDate(date);
    var lateAfter=shift?shift.late_after:'10:00';
    var minHours=shift?shift.min_hours:6.25;

    if(rec.ins.length===0){absentDays++;return;}

    var firstIn=rec.ins[0];
    var lastOut=rec.outs.length>0?rec.outs[rec.outs.length-1]:null;

    // Calculate hours worked
    var hoursWorked=0;
    if(lastOut){
      var inT=new Date(firstIn);var outT=new Date(lastOut);
      hoursWorked=(outT-inT)/(1000*60*60);
      // Handle overnight shift
      if(hoursWorked<0)hoursWorked+=24;
    }
    totalHours+=hoursWorked;

    // Check if minimum hours met
    var minMet=hoursWorked>=minHours;

    if(minMet){
      presentDays++;
    }else if(hoursWorked>0){
      halfDays++;
      presentDays+=0.5;
    }else{
      absentDays++;
    }

    // Late check — compare IN time to late_after
    var inTime=firstIn.split('T')[1].substring(0,5);
    if(inTime>lateAfter)lateCount++;
  });

  absentDays=Math.max(0,WORKING_DAYS-Math.ceil(presentDays));

  // Late deduction: beyond 6 lates, each extra = 0.5 day (only if 6:15 met)
  var extraLates=Math.max(0,lateCount-6);
  var lateDedDays=extraLates*0.5;

  return{
    present_days:Math.round(presentDays),
    absent_days:absentDays,
    half_days:halfDays,
    late_count:lateCount,
    late_deduction_days:lateDedDays,
    total_hours:Math.round(totalHours*10)/10,
    working_days:WORKING_DAYS
  };
};

async function loadTrackingData(){
  var ct=document.getElementById('ct');
  try{
    // Get latest GPS ping per vehicle in last 30 minutes
    var cutoff=new Date(Date.now()-30*60000).toISOString();
    var pings=safeArr(await sbFetch('vehicle_tracking',{
      select:'*,drivers(full_name,driver_code),vehicles(reg_no),trips(trip_code,status)',
      order:'recorded_at.desc',
      limit:200
    }));

    // Get latest ping per vehicle
    var latestByVehicle={};
    pings.forEach(function(p){
      var key=p.vehicle_id||p.driver_id||p.id;
      if(!latestByVehicle[key]||p.recorded_at>latestByVehicle[key].recorded_at){
        latestByVehicle[key]=p;
      }
    });
    var latest=Object.values(latestByVehicle);
    var active=latest.filter(function(p){return p.recorded_at>=cutoff;});
    var rows=latest.map(function(p){
      var drv=p.drivers||{};var veh=p.vehicles||{};var trp=p.trips||{};
      var age=Math.round((Date.now()-new Date(p.recorded_at).getTime())/60000);
      var isActive=p.recorded_at>=cutoff;
      return[
        '<div style="font-weight:600">'+(drv.full_name||'-')+'</div><div style="font-size:10px;color:#5a7a9a">'+(drv.driver_code||'')+'</div>',
        '<strong style="font-family:Consolas,monospace">'+(veh.reg_no||'-')+'</strong>',
        trp.trip_code?'<span style="font-family:Consolas,monospace;font-size:11px">'+trp.trip_code+'</span>':'-',
        p.latitude?p.latitude.toFixed(5):'-',
        p.longitude?p.longitude.toFixed(5):'-',
        p.speed_kmh!==null&&p.speed_kmh!==undefined?p.speed_kmh+' km/h':'-',
        '<span style="color:'+(isActive?'#00e676':'#5a7a9a')+'">'+(age<1?'Just now':age+' min ago')+'</span>',
        badge(isActive?'g':'gr',isActive?'Active':'Offline'),
        p.latitude?'<a href="https://www.google.com/maps?q='+p.latitude+','+p.longitude+'" target="_blank" style="color:#00e676;font-size:11px;text-decoration:none">📍 Maps</a>':'-'
      ];
    });

    ct.innerHTML='<div class="sg">'
      +sc('#00e676','Active Vehicles',active.length,'Last 30 min')
      +sc('#2196f3','Total Tracked',latest.length,'All vehicles')

window.openGenOnboarding=async function(generatorId){

  var obs=safeArr(await sbFetch('gen_onboarding',{select:'*',eq:{generator_id:generatorId},order:'created_at.desc'}));

async function renderContracts(){
  var ct=document.getElementById('ct');
  try{
    var contracts=safeArr(await sbFetch('gen_contracts',{select:'*,generators(gen_code,company_name)',order:'created_at.desc'}));
    var today=new Date().toISOString().split('T')[0];
    var active=contracts.filter(function(c){return c.status==='Signed'&&c.valid_till>=today;});
    var expiring=active.filter(function(c){return new Date(c.valid_till)<new Date(Date.now()+30*864e5);});
    var expired=contracts.filter(function(c){return c.valid_till&&c.valid_till<today;});

    var rows=contracts.map(function(c){
      var gen=c.generators||{};
      var daysLeft=c.valid_till?Math.ceil((new Date(c.valid_till)-new Date())/864e5):null;
      var statusColor=c.status==='Signed'&&daysLeft>30?'g':c.status==='Signed'&&daysLeft<=30?'a':c.status==='Draft'?'gr':'r';
      return[
        '<strong style="font-family:Consolas,monospace;color:#00e676">'+c.contract_no+'</strong>',
        '<div style="font-weight:600">'+(gen.company_name||'-')+'</div><div style="font-size:10px;color:#5a7a9a">'+(gen.gen_code||'')+'</div>',
        c.contract_date||'-',
        c.valid_from||'-',
        '<span style="color:'+(daysLeft!==null&&daysLeft<=30?'#ff9800':'#e2eeff')+'">'+(c.valid_till||'-')+'</span>',
        c.rate_per_kg?'&#8377;'+c.rate_per_kg+'/kg':'-',
        c.payment_terms||'-',
        badge(statusColor,c.status||'Draft'),
        daysLeft!==null?'<span style="color:'+(daysLeft<=0?'#f44336':daysLeft<=30?'#ff9800':'#00e676')+'">'+( daysLeft<=0?'Expired':daysLeft+'d left')+'</span>':'-',
        '<div style="display:flex;gap:4px">'+
          '<button class="btn btn-sm" id="pct'+c.id+'">Print</button>'+
          '<button class="btn btn-sm" id="ect'+c.id+'">Edit</button>'+
        '</div>'
      ];
    });


    ct.innerHTML+='<div class="sg">';
      sc('#00e676','Active Contracts',active.length,'')+
      sc('#ff9800','Expiring Soon',expiring.length,'Within 30 days')+
      sc('#f44336','Expired',expired.length,'')+
      sc('#5a7a9a','Draft',contracts.filter(function(c){return c.status==='Draft';}).length,'')+
      '</div>'+
      card('Generator Contracts',
        '<button class="btn btn-g btn-sm" onclick="newContract()">+ New Contract</button>',
        tbl(['Contract No','Generator','Date','Valid From','Valid Till','Rate/kg','Payment Terms','Status','Days',''],rows),true);

    setTimeout(function(){
      document.querySelectorAll('[id^="pct"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){printContract(id);};});
      document.querySelectorAll('[id^="ect"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){editContract(id);};});
    },150);
  }catch(e){ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}
}

window.generateContract=async function(onboardingId,generatorId){
  var r=safeArr(await sbFetch('gen_onboarding',{select:'*',eq:{id:onboardingId}}))[0];
  var gen=safeArr(await sbFetch('generators',{select:'*',eq:{id:generatorId}}))[0];
  if(!r||!gen)return;
  // Pre-fill contract with onboarding data
  window._contractPrefill={onboardingId:onboardingId,generatorId:generatorId,
    collection_frequency:r.collection_frequency,gen:gen};
  newContract();
};

async function renderWeighbridge(){
  var ct=document.getElementById('ct');
  try{
    var records=safeArr(await sbFetch('weighbridge',{select:'*,trips(trip_code,trip_date)',order:'weighed_at.desc',limit:50}));
    var today=new Date().toISOString().split('T')[0];
    var todayRec=records.filter(function(r){return r.weighed_at&&r.weighed_at.startsWith(today);});
    var totalToday=todayRec.reduce(function(s,r){return s+(r.net_weight_kg||0);},0);

    var rows=records.map(function(r){
      var trp=r.trips||{};
      var varPct=r.variance_pct;
      var varColor=Math.abs(varPct||0)>5?'#f44336':Math.abs(varPct||0)>2?'#ff9800':'#00e676';
      return[
        '<strong style="font-family:Consolas,monospace">'+r.wb_code+'</strong>',
        trp.trip_code||'-',trp.trip_date||'-',
        r.gross_weight_kg?r.gross_weight_kg+' kg':'-',
        r.tare_weight_kg?r.tare_weight_kg+' kg':'-',
        '<strong style="color:#00e676">'+(r.net_weight_kg||0)+' kg</strong>',
        r.variance_kg?'<span style="color:'+varColor+'">'+r.variance_kg+' kg ('+(varPct||0).toFixed(1)+'%)</span>':'-',
        r.weighed_by||'-',
        new Date(r.weighed_at).toLocaleString('en-IN')
      ];
    });


    ct.innerHTML+='<div class="sg">';
      sc('#2196f3','Today Records',todayRec.length,'')+
      sc('#00e676','Net Weight Today',totalToday.toFixed(0)+' kg','')+
      sc('#ff9800','Total Records',records.length,'')+
      '</div>'+
      card('Weighbridge Records',
        '<button class="btn btn-g btn-sm" onclick="newWeighbridge()">+ New Weighing</button>',
        tbl(['WB Code','Trip','Date','Gross','Tare','Net Weight','Variance','Weighed By','Time'],rows),true);
  }catch(e){ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}
}

window.newWeighbridge=async function(){
  var trips=safeArr(await sbFetch('trips',{select:'id,trip_code,trip_date,total_weight_kg',eq:{status:'In Transit'},order:'trip_date.desc',limit:20}));
  var tOpts='<option value="">Select Trip</option>'+trips.map(function(t){return'<option value="'+t.id+'" data-wt="'+(t.total_weight_kg||0)+'">'+t.trip_code+' ('+t.trip_date+')</option>';}).join('');
  var selS='background:#1e3048;border:1px solid rgba(100,160,255,.15);border-radius:8px;color:#e2eeff;padding:7px 10px;font-size:12.5px;width:100%;font-family:inherit';
  var body='<div class="fg">'+
    '<div class="full"><div class="fl">Trip *</div><select id="wb_trip" onchange="wbCalcVariance()" style="'+selS+'">'+tOpts+'</select></div>'+
    '<div class="sec" style="grid-column:1/-1">Weights</div>'+
    fld('Gross Weight (kg) — Vehicle + Waste',inp('wb_gross','','number'),true)+
    fld('Tare Weight (kg) — Empty Vehicle',inp('wb_tare','','number'),true)+
    fld('Net Weight (kg) — Auto Calculated','<input id="wb_net" type="number" style="background:#0f1724;border:1px solid rgba(0,230,118,.3);border-radius:8px;color:#00e676;padding:7px 10px;font-size:12.5px;width:100%;font-family:inherit" readonly>') +
    fld('Driver Reported Weight (kg)',inp('wb_reported','','number'))+
    fld('Variance','<input id="wb_variance" readonly style="background:#0f1724;border:1px solid rgba(100,160,255,.15);border-radius:8px;color:#ff9800;padding:7px 10px;font-size:12.5px;width:100%;font-family:inherit">') +
    fld('Weighed By',inp('wb_by',''),true)+
    '<div class="full">'+fld('Notes',inp('wb_notes',''))+'</div>'+
    '</div>';
  modal('New Weighbridge Entry',body,
    '<button class="btn btn-sm" onclick="closeModal()">Cancel</button>'+
    '<button class="btn btn-g btn-sm" onclick="saveWeighbridge()">Save</button>');

  setTimeout(function(){
    var gross=document.getElementById('wb_gross');
    var tare=document.getElementById('wb_tare');
    if(gross)gross.addEventListener('input',wbCalcNet);
    if(tare)tare.addEventListener('input',wbCalcNet);
  },100);
};

window.wbCalcNet=function(){
  var gross=parseFloat(document.getElementById('wb_gross').value)||0;
  var tare=parseFloat(document.getElementById('wb_tare').value)||0;
  var net=gross-tare;
  var netEl=document.getElementById('wb_net');
  if(netEl)netEl.value=net>0?net.toFixed(0):'';
  // Calculate variance vs trip reported weight
  var tripSel=document.getElementById('wb_trip');
  if(tripSel&&tripSel.selectedOptions[0]){
    var reported=parseFloat(tripSel.selectedOptions[0].getAttribute('data-wt'))||0;
    if(reported>0&&net>0){
      var diff=net-reported;
      var pct=(diff/reported*100);
      var varEl=document.getElementById('wb_variance');
      if(varEl)varEl.value=diff.toFixed(0)+' kg ('+pct.toFixed(1)+'%)';
    }
  }
};

window.saveWeighbridge=async function(){
  var tripId=document.getElementById('wb_trip').value;
  var gross=parseFloat(gv('wb_gross'))||0;
  var tare=parseFloat(gv('wb_tare'))||0;
  var net=gross-tare;
  var by=gv('wb_by');
  if(!tripId||!gross||!tare||!by){alert('Trip, Gross Weight, Tare Weight and Weighed By are required.');return;}
  try{
    var code=await sbRpc('next_wb_code');
    var tripSel=document.getElementById('wb_trip');
    var reported=tripSel&&tripSel.selectedOptions[0]?parseFloat(tripSel.selectedOptions[0].getAttribute('data-wt'))||0:0;
    var variance=net-reported;
    var variancePct=reported>0?(variance/reported*100):0;
    await sbInsert('weighbridge',{
      wb_code:code,trip_id:tripId,
      gross_weight_kg:gross,tare_weight_kg:tare,net_weight_kg:net,
      variance_kg:variance,variance_pct:parseFloat(variancePct.toFixed(2)),
      weighed_by:by,weighed_at:new Date().toISOString(),
      notes:gv('wb_notes')||null
    });
    // Update trip total weight with verified net weight
    await sbUpdate('trips',{total_weight_kg:net,status:'Completed'},{id:tripId});
    closeModal();success('Weighbridge '+code+' recorded! Trip updated with verified weight.');renderWeighbridge();
  }catch(e){alert('Error: '+e.message);}
};

      '<div class="card"><div class="ch"><span class="ct2">Summary</span></div><div style="padding:12px">'+
      '<div style="margin-bottom:8px"><div style="font-size:10px;color:#5a7a9a">Total Outstanding</div><div style="font-size:18px;font-weight:700;color:#ff9800">Rs. '+Number(totalOut).toLocaleString('en-IN')+'</div></div>'+

      '</div></div>'+
      '</div>'+
      '<div>'+card('Payment Tracking',
        '<button class="btn btn-sm" onclick="renderPayTracking()">Refresh</button>',
        tbl(['Invoice','Generator','Date','Due Date','Status','Amount','GST','Flag',''],rows),true)+

window.sendPaymentReminder=async function(invoiceId){
  var inv=safeArr(await sbFetch('invoices',{select:'*,generators(company_name,email,contact_person)',eq:{id:invoiceId}}))[0];
  if(!inv)return;
  var gen=inv.generators||{};
  var s=localStorage.getItem('ej_service');
  var t=localStorage.getItem('ej_template');
  var k=localStorage.getItem('ej_pubkey');
  if(!s||!t||!k){alert('Configure EmailJS in User Management first to send reminders.');return;}
  try{
    emailjs.init(k);
    await emailjs.send(s,t,{
      to_email:gen.email||'',
      contact_name:gen.contact_person||gen.company_name,
      company_name:gen.company_name,
      invoice_no:inv.invoice_no,
      amount:'Rs. '+Number(inv.total_amount||0).toLocaleString('en-IN'),
      due_date:inv.due_date||'-',
      login_url:window.location.origin
    });
    success('Payment reminder sent to '+gen.company_name+'!');
  }catch(e){
    var msg=e&&e.text?e.text:e.message||'Unknown error';
    alert('Email error: '+msg);
  }
};

async function renderEnergy(){

    var today=new Date().toISOString().split('T')[0];

    var totalGen=todayRec.reduce(function(s,r){return s+(r.units_generated_kwh||0);},0);
    var totalExport=todayRec.reduce(function(s,r){return s+(r.net_export_kwh||0);},0);

// ESG & CARBON CREDITS
// ══════════════════════════════════════════════════════════
async function renderESG(){
  var ct=document.getElementById('ct');
  try{
    var trips=safeArr(await sbFetch('trips',{select:'total_weight_kg,status,trip_date',order:'trip_date.desc'}));
    var energy=safeArr(await sbFetch('energy_logs',{select:'units_generated_kwh,net_export_kwh,rdf_consumed_kg,log_date',order:'log_date.desc'}));
    var rdf=safeArr(await sbFetch('rdf_batches',{select:'waste_input_kg,rdf_output_kg,batch_date',order:'batch_date.desc'}));

    var completed=trips.filter(function(t){return t.status==='Completed';});
    var totalWaste=completed.reduce(function(s,t){return s+(t.total_weight_kg||0);},0)/1000; // tons
    var totalEnergy=energy.reduce(function(s,e){return s+(e.units_generated_kwh||0);},0);
    var totalRDF=rdf.reduce(function(s,r){return s+(r.rdf_output_kg||0);},0)/1000;

    // ESG Calculations (standard factors)
    var CO2_avoided = totalWaste * 0.5;         // 0.5 tons CO2 per ton waste diverted from landfill
    var methane_avoided = totalWaste * 0.05;    // 0.05 tons CH4 per ton
    var coal_replaced = totalEnergy * 0.0007;   // 0.7 kg coal per kWh
    var carbon_credits = CO2_avoided * 0.85;    // ~85% of CO2 = credits

    // Current month
    var now=new Date();
    var curMonth=now.toLocaleString('en-IN',{month:'long',year:'numeric'});
    var monthTrips=completed.filter(function(t){return t.trip_date&&t.trip_date.startsWith(now.toISOString().slice(0,7));});
    var monthWaste=monthTrips.reduce(function(s,t){return s+(t.total_weight_kg||0);},0)/1000;
    var monthEnergy=energy.filter(function(e){return e.log_date&&e.log_date.startsWith(now.toISOString().slice(0,7));}).reduce(function(s,e){return s+(e.units_generated_kwh||0);},0);
    var monthCO2=monthWaste*0.5;
    var monthCredits=monthCO2*0.85;

    ct.innerHTML=
      '<div class="sg">'+
      sc('#00e676','Total Waste Diverted',totalWaste.toFixed(1)+' T','')+
      sc('#2196f3','CO₂ Avoided',CO2_avoided.toFixed(1)+' T','')+
      sc('#00e676','Carbon Credits',carbon_credits.toFixed(0)+' Credits','')+
      sc('#ff9800','Energy Generated',totalEnergy.toFixed(0)+' kWh','')+
      '</div>'+

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'+

      // Lifetime stats
      '<div class="card"><div class="ch"><span class="ct2">Lifetime ESG Impact</span></div><div style="padding:14px">'+
      '<div style="display:flex;flex-direction:column;gap:10px">'+
      ['Waste Diverted from Landfill:totalWaste.toFixed(1)+" T"',
       'CO₂ Equivalent Avoided:CO2_avoided.toFixed(2)+" T CO₂eq"',
       'Methane Avoided:methane_avoided.toFixed(3)+" T CH₄"',
       'Coal Replaced:coal_replaced.toFixed(1)+" T"',
       'RDF Produced:totalRDF.toFixed(1)+" T"',
       'Energy Generated:totalEnergy.toFixed(0)+" kWh"',
       'Carbon Credits Earned:carbon_credits.toFixed(0)+" Credits"'].map(function(item){
        var parts=item.split(':');
        return'<div style="display:flex;justify-content:space-between;padding:8px;background:#0f1724;border-radius:8px">'+
          '<span style="font-size:12px;color:#9ab8d4">'+parts[0]+'</span>'+
          '<span style="font-size:13px;font-weight:700;color:#00e676">'+eval(parts[1])+'</span></div>';
      }).join('')+
      '</div></div></div>'+

      // Monthly stats
      '<div class="card"><div class="ch"><span class="ct2">'+curMonth+'</span></div><div style="padding:14px">'+
      '<div style="display:flex;flex-direction:column;gap:10px">'+
      [['Waste Collected',monthWaste.toFixed(1)+' T'],
       ['Energy Generated',monthEnergy.toFixed(0)+' kWh'],
       ['CO₂ Avoided',monthCO2.toFixed(2)+' T'],
       ['Carbon Credits',monthCredits.toFixed(0)+' Credits']].map(function(item){
        return'<div style="display:flex;justify-content:space-between;padding:8px;background:#0f1724;border-radius:8px">'+
          '<span style="font-size:12px;color:#9ab8d4">'+item[0]+'</span>'+
          '<span style="font-size:13px;font-weight:700;color:#2196f3">'+item[1]+'</span></div>';
      }).join('')+
      '<div style="margin-top:12px;padding:12px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:10px;text-align:center">'+
        '<div style="font-size:11px;color:#8ab0d0;margin-bottom:4px">Equivalent Trees Planted</div>'+
        '<div style="font-size:24px;font-weight:800;color:#00e676">'+Math.round(CO2_avoided*45)+'</div>'+
      '</div>'+
      '</div></div></div>'+

      card('ESG Metrics — Monthly Trend','<button class="btn btn-sm" onclick="exportESGReport()">Export ESG Report</button>',
        '<div style="padding:14px;color:#8ab0d0;font-size:12px;text-align:center">ESG trend chart will appear here as more data is collected.<br>Currently showing '+completed.length+' completed trips.</div>');

  }catch(e){ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}
}

async function renderFinanceDash(){
  var ct=document.getElementById('ct');
  ct.innerHTML='<div style="text-align:center;padding:20px;color:#5a7a9a">Loading Finance Dashboard...</div>';
  try{
    var now=new Date();
    var today=now.toISOString().split('T')[0];
    var monthStart=today.slice(0,7)+'-01';
    var prevMonthStart=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().split('T')[0];
    var prevMonthEnd=new Date(now.getFullYear(),now.getMonth(),0).toISOString().split('T')[0];

    var invoices=safeArr(await sbFetch('invoices',{select:'*,generators(gen_code,company_name)',order:'invoice_date.desc',limit:500}));
    var allInv=invoices;
    var monthInv=allInv.filter(function(i){return i.invoice_date&&i.invoice_date>=monthStart;});
    var prevMonthInv=allInv.filter(function(i){return i.invoice_date&&i.invoice_date>=prevMonthStart&&i.invoice_date<=prevMonthEnd;});

    var monthRev=monthInv.reduce(function(s,i){return s+(parseFloat(i.total_amount)||0);},0);
    var prevRev=prevMonthInv.reduce(function(s,i){return s+(parseFloat(i.total_amount)||0);},0);
    var outstanding=allInv.filter(function(i){return i.status==='Unpaid';});
    var totalOut=outstanding.reduce(function(s,i){return s+(parseFloat(i.total_amount)||0);},0);
    var totalPaid=allInv.filter(function(i){return i.status==='Paid';}).reduce(function(s,i){return s+(parseFloat(i.total_amount)||0);},0);
    var overdue=outstanding.filter(function(i){return i.due_date&&i.due_date<today;});
    var totalOverdue=overdue.reduce(function(s,i){return s+(parseFloat(i.total_amount)||0);},0);
    var growth=prevRev>0?Math.round((monthRev-prevRev)/prevRev*100):0;

    // Aging buckets
    var aging={'0-30 days':0,'31-60 days':0,'61-90 days':0,'90+ days':0};
    outstanding.forEach(function(i){
      if(!i.due_date)return;
      var days=Math.ceil((new Date()-new Date(i.due_date))/864e5);
      if(days<=0)return;
      if(days<=30)aging['0-30 days']+=parseFloat(i.total_amount)||0;
      else if(days<=60)aging['31-60 days']+=parseFloat(i.total_amount)||0;
      else if(days<=90)aging['61-90 days']+=parseFloat(i.total_amount)||0;
      else aging['90+ days']+=parseFloat(i.total_amount)||0;
    });

    // Top 5 generators by revenue
    var genRev={};
    allInv.forEach(function(i){
      var gn=(i.generators&&i.generators.company_name)||'Unknown';
      genRev[gn]=(genRev[gn]||0)+(parseFloat(i.total_amount)||0);
    });
    var top5=Object.entries(genRev).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

    ct.innerHTML=
      '<div style="font-size:20px;font-weight:800;color:#00e676;margin-bottom:14px">Finance Dashboard</div>'+
      '<div class="sg">'+
        sc('#00e676','This Month Revenue','Rs.'+Number(monthRev).toLocaleString('en-IN'),(growth>=0?'▲':' ▼')+Math.abs(growth)+'% vs last month')+
        sc('#2196f3','Total Collected','Rs.'+Number(totalPaid).toLocaleString('en-IN'),'All time')+
        sc('#ff9800','Outstanding','Rs.'+Number(totalOut).toLocaleString('en-IN'),outstanding.length+' invoices')+
        sc('#f44336','Overdue','Rs.'+Number(totalOverdue).toLocaleString('en-IN'),overdue.length+' invoices')+
      '</div>'+

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'+

      // Aging
      '<div class="card"><div class="ch"><span class="ct2">Receivables Aging</span></div><div style="padding:14px">'+
      Object.entries(aging).map(function(e){
        var col=e[0].includes('90+')?'#f44336':e[0].includes('61')?'#ff9800':e[0].includes('31')?'#ff9800':'#00e676';
        return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f1724;border-radius:8px;margin-bottom:6px">'+
          '<span style="font-size:12px;color:#9ab8d4">'+e[0]+'</span>'+
          '<span style="font-weight:700;color:'+col+'">Rs.'+Number(e[1]).toLocaleString('en-IN')+'</span>'+
          '</div>';
      }).join('')+'</div></div>'+

      // Top generators
      '<div class="card"><div class="ch"><span class="ct2">Top Generators by Revenue</span></div><div style="padding:14px">'+
      top5.map(function(e,i){
        return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f1724;border-radius:8px;margin-bottom:6px">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
          '<div style="width:22px;height:22px;border-radius:50%;background:rgba(0,230,118,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#00e676">'+(i+1)+'</div>'+
          '<span style="font-size:12px;color:#e2eeff">'+e[0]+'</span></div>'+
          '<span style="font-weight:700;color:#00e676">Rs.'+Number(e[1]).toLocaleString('en-IN')+'</span>'+
          '</div>';
      }).join('')+'</div></div>'+

      '</div>'+

      // Invoice register
      card('Invoice Register',
        '<button class="btn btn-sm" onclick="go(\'billing\')">Go to Billing</button>'+
        '<button class="btn btn-sm" style="margin-left:8px" onclick="go(\'paytracking\')">Payment Tracking</button>',
        tbl(['Invoice','Generator','Date','Amount','GST','Total','Status'],
          monthInv.slice(0,20).map(function(i){

async function renderStore(){
  var ct=document.getElementById('ct');
  try{
    var items=safeArr(await sbFetch('store_items',{select:'*',order:'item_name.asc'}));
    var categories=['Bins & Accessories','Spare Parts','Safety & PPE','Tools & Equipment','Consumables','Chemicals & Others'];
    var byCat={};
    categories.forEach(function(c){byCat[c]=items.filter(function(i){return i.category===c;});});
    var lowStock=items.filter(function(i){return i.current_qty<=i.reorder_level;});
    var totalValue=items.reduce(function(s,i){return s+(i.current_qty*(i.unit_cost||0));},0);

    var rows=items.map(function(i){
      var isLow=i.current_qty<=i.reorder_level;
      return[
        '<strong style="font-family:Consolas,monospace;color:var(--accent)">'+i.item_code+'</strong>',
        '<div style="font-weight:600">'+i.item_name+'</div><div style="font-size:10px;color:var(--text3)">'+i.category+'</div>',
        i.unit||'Nos',
        '<span style="font-weight:700;color:'+(isLow?'var(--red)':'var(--text)')+'">'+i.current_qty+'</span>',
        i.reorder_level||0,
        i.unit_cost?'Rs.'+i.unit_cost:'-',
        i.unit_cost?'Rs.'+Math.round(i.current_qty*i.unit_cost).toLocaleString('en-IN'):'-',
        badge(isLow?'r':i.current_qty>i.reorder_level*2?'g':'a',isLow?'Low Stock':i.current_qty>i.reorder_level*2?'Adequate':'Monitor'),
        i.location||'-',
        '<div style="display:flex;gap:4px"><button class="btn btn-sm" id="esi'+i.id+'">Edit</button><button class="btn btn-sm" id="iss'+i.id+'">Issue</button></div>'
      ];
    });

    ct.innerHTML='<div class="sg">'+
      sc('var(--blue)','Total Items',items.length,'')+
      sc('var(--red)','Low Stock',lowStock.length,'Needs reorder')+
      sc('var(--accent)','Categories',categories.length,'')+
      sc('var(--orange)','Stock Value','Rs.'+Math.round(totalValue).toLocaleString('en-IN'),'')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">'+
      categories.map(function(cat){
        var catItems=byCat[cat]||[];
        var low=catItems.filter(function(i){return i.current_qty<=i.reorder_level;});
        return'<div onclick="go(\'store\')" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer">'
          +'<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px">'+cat+'</div>'
          +'<div style="font-size:20px;font-weight:800;color:var(--accent)">'+catItems.length+'</div>'
          +(low.length>0?'<div style="font-size:10px;color:var(--red);margin-top:3px">'+low.length+' low stock</div>':'<div style="font-size:10px;color:var(--text3)">All adequate</div>')
          +'</div>';
      }).join('')+
      '</div>'+
      card('Store Inventory',
        '<button class="btn btn-g btn-sm" onclick="newStoreItem()">+ Add Item</button>'+
        '<button class="btn btn-sm" style="margin-left:8px" onclick="go(\'grn\')">Receive GRN</button>',
        tbl(['Code','Item','Unit','Qty','Reorder','Unit Cost','Value','Status','Location',''],rows),true);

    setTimeout(function(){
      document.querySelectorAll('[id^="esi"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){editStoreItem(id);};});
      document.querySelectorAll('[id^="iss"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){issueItem(id);};});
    },150);
  }catch(e){
    if(e.message&&e.message.includes('store_items')){
      ct.innerHTML='<div class="alert al-r">Run SQL to create store tables first. <button class="btn btn-sm" onclick="showStoreSql()">Show SQL</button></div>';
    }else{ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}
  }
}

ALTER TABLE stock_transactions DISABLE ROW LEVEL SECURITY;

ALTER TABLE po_items DISABLE ROW LEVEL SECURITY;
