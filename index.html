ALTER TABLE grn_items DISABLE ROW LEVEL SECURITY;
ALTER TABLE audit_logs DISABLE ROW LEVEL SECURITY;
GRANT ALL ON ALL TABLES IN SCHEMA public TO anon, authenticated, service_role;
GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO anon, authenticated, service_role;`;
  var w=window.open('','_blank','width=800,height=600');
  w.document.write('<pre style="padding:20px;font-family:monospace;background:#111;color:#0f0">'+sql+'</pre><button onclick="navigator.clipboard.writeText(document.querySelector(\'pre\').textContent).then(()=>alert(\'Copied!\'))">Copy SQL</button>');
};

window.confirmIssue=async function(id,available){
  var qty=parseFloat(gv('iss_qty'))||0;
  if(qty<=0){alert('Enter a valid quantity.');return;}
  if(qty>parseFloat(available)){alert('Cannot issue more than available stock ('+available+').');return;}
  try{
    var item=safeArr(await sbFetch('store_items',{select:'*',eq:{id:id}}))[0];
    var newQty=(item.current_qty||0)-qty;
    await sbUpdate('store_items',{current_qty:newQty},{id:id});
    var n=safeArr(await sbFetch('stock_transactions',{select:'id'})).length+1;
    var refNo='ISS-'+String(n).padStart(5,'0');
    await sbInsert('stock_transactions',{item_id:id,txn_type:'Issue',qty:qty,ref_no:refNo,issued_to:gv('iss_to')||null,issued_dept:document.getElementById('iss_dept').value,remarks:gv('iss_ref')||null,txn_by:CURRENT_USER?CURRENT_USER.full_name:null,txn_date:new Date().toISOString()});
    logAudit('ISSUE','Store',refNo,null,qty+' '+item.unit+' issued to '+gv('iss_to'));
    closeModal();success(refNo+' — '+qty+' '+item.unit+' issued successfully!');renderStore();
  }catch(e){alert('Error: '+e.message);}
};

async function renderProcurement(){
  var ct=document.getElementById('ct');
  try{
    var pos=safeArr(await sbFetch('purchase_orders',{select:'*,vendors(vendor_name,vendor_code)',order:'created_at.desc',limit:50}));
    var draft=pos.filter(function(p){return p.status==='Draft';});

    document.querySelectorAll('.po-item-sel').forEach(function(sel){

        var row=sel.closest('.po-item-row');

          if(unitEl&&opt)unitEl.value=opt.getAttribute('data-unit')||'Nos';

window.addPORow=function(){
  var selS='background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:12.5px;width:100%;font-family:inherit';
  var items_sel=document.querySelector('.po-item-sel');

window.removePORow=function(btn){var row=btn.closest('.po-item-row');if(row)row.remove();updatePOTotal();};
window.updatePOTotal=function(){
  var rows=document.querySelectorAll('.po-item-row');
  var total=0;
  rows.forEach(function(row){
    var qty=parseFloat(row.querySelector('.po-qty')&&row.querySelector('.po-qty').value)||0;
    var rate=parseFloat(row.querySelector('.po-rate')&&row.querySelector('.po-rate').value)||0;
    total+=qty*rate;
  });
  var tot=document.getElementById('po_total');
  if(tot)tot.textContent='Rs. '+total.toLocaleString('en-IN');
};
window.savePO=async function(){
  var vnd=document.getElementById('po_vnd').value;
  if(!vnd){alert('Select a vendor.');return;}
  var rows=document.querySelectorAll('.po-item-row');
  var lineItems=[];
  var total=0;
  rows.forEach(function(row){
    var sel=row.querySelector('.po-item-sel');
    var qty=parseFloat(row.querySelector('.po-qty').value)||0;
    var rate=parseFloat(row.querySelector('.po-rate').value)||0;
    var unit=row.querySelector('.po-unit').value||'Nos';
    if(sel&&sel.value&&qty>0){
      var itemName=sel.selectedOptions[0]?sel.selectedOptions[0].textContent.split(' — ')[1]:'';
      lineItems.push({item_id:sel.value,item_name:itemName,qty:qty,unit:unit,unit_rate:rate,total_amount:qty*rate,received_qty:0});
      total+=qty*rate;
    }
  });
  if(!lineItems.length){alert('Add at least one item.');return;}
  try{
    var n=safeArr(await sbFetch('purchase_orders',{select:'id'})).length+1;
    var po_no='PO-'+new Date().getFullYear()+'-'+String(n).padStart(4,'0');
    var poRec=await sbInsert('purchase_orders',{po_no:po_no,vendor_id:vnd,po_date:gv('po_date'),expected_delivery:gv('po_exp'),total_amount:total,notes:gv('po_notes')||null,status:'Draft'});
    var poId=poRec[0]&&poRec[0].id;
    if(poId){
      var poItems=lineItems.map(function(li){return Object.assign({},li,{po_id:poId});});
      await sbInsert('po_items',poItems);
    }
    logAudit('CREATE','PO',po_no,null,'Rs.'+total+' — '+lineItems.length+' items');
    closeModal();success('PO '+po_no+' created! Total: Rs.'+total.toLocaleString('en-IN'));renderProcurement();
  }catch(e){alert('Error: '+e.message);}
};

window.saveGRN=async function(){
  var poId=document.getElementById('grn_po').value;
  if(!poId){alert('Select a PO.');return;}
  try{
    var po=safeArr(await sbFetch('purchase_orders',{select:'*',eq:{id:poId}}))[0];
    var n=safeArr(await sbFetch('grn_records',{select:'id'})).length+1;
    var grn_no='GRN-'+new Date().getFullYear()+'-'+String(n).padStart(4,'0');
    var qualityOk=document.getElementById('grn_qok').value==='true';
    await sbInsert('grn_records',{grn_no:grn_no,po_id:poId,vendor_id:po.vendor_id,grn_date:gv('grn_date'),received_by:gv('grn_by')||null,quality_ok:qualityOk,remarks:gv('grn_remarks')||null});
    // Update PO status
    await sbUpdate('purchase_orders',{status:qualityOk?'Received':'Quality Rejected'},{id:poId});
    // Also update PO items stock
    var poItems=safeArr(await sbFetch('po_items',{select:'*',eq:{po_id:poId}}));
    for(var j=0;j<poItems.length;j++){
      var pi=poItems[j];
      if(pi.item_id&&qualityOk){
        var curr=safeArr(await sbFetch('store_items',{select:'current_qty',eq:{id:pi.item_id}}))[0];
        if(curr){await sbUpdate('store_items',{current_qty:(curr.current_qty||0)+pi.qty},{id:pi.item_id});}
      }
    }
    logAudit('CREATE','GRN',grn_no,null,po.po_no+' received');
    closeModal();success('GRN '+grn_no+' created! Stock updated.');renderGRN();
  }catch(e){alert('Error: '+e.message);}
};

window.filterAuditLog=function(action){
  var rows=window._allAuditRows||[];
  var filtered=action==='All'?rows:rows.filter(function(r){
    return r[2]&&r[2].indexOf(action)>-1;
  });
  var tblDiv=document.getElementById('audit-table');
  if(tblDiv)tblDiv.innerHTML=tbl(['Date/Time','User','Action','Module','Record','Details'],filtered);

  document.querySelectorAll('[data-action]').forEach(function(b){
    b.style.background=b.dataset.action===action?'var(--accent)':'var(--surface3)';
    b.style.color=b.dataset.action===action?'#000':'var(--text2)';

};

async function renderSegregation(){

    var storageYard=[

      {type:'Combustible',qty:totalCombustible,color:'var(--orange)',icon:'🔥'},
      {type:'Recyclable',qty:totalRecyclable,color:'var(--accent)',icon:'🔄'},
      {type:'Raw Waste',qty:records.reduce(function(s,r){return s+(r.raw_waste_kg||0);},0),color:'var(--text3)',icon:'🗑️'},
      {type:'Hazardous',qty:records.reduce(function(s,r){return s+(r.hazardous_kg||0);},0),color:'var(--red)',icon:'⚠️'},

    storageYard.forEach(function(s){
      storageHtml+='<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid '+s.color+';border-radius:12px;padding:14px">'
        +'<div style="font-size:20px;margin-bottom:6px">'+s.icon+'</div>'
        +'<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">'+s.type+'</div>'
        +'<div style="font-size:22px;font-weight:800;color:'+s.color+';font-family:Consolas,monospace;margin-top:4px">'+s.qty.toLocaleString('en-IN')+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">kg total</div>'
        +'</div>';
    });

    ct.innerHTML='<div class="sg">'+
      sc('var(--orange)','Today Batches',todayRec.length,'')+
      sc('#ff6b35','Combustible',totalCombustible+'kg','')+
      sc('var(--accent)','Recyclable',totalRecyclable+'kg','')+
      sc('var(--red)','Reject',records.reduce(function(s,r){return s+(r.reject_kg||0);},0)+'kg','')+
      '</div>'+
      '<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Storage Yard Status</div>'+
      storageHtml+
      card('Segregation Records',
        '<button class="btn btn-g btn-sm" onclick="newSegregation()">+ New Segregation</button>',
        tbl(['Seg Code','Trip','Date','Combustible','Recyclable','Inert','Moisture Rich','Reject','Total','Location','Operator'],rows),true);

        'CREATE TABLE IF NOT EXISTS segregation_records (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, seg_code TEXT UNIQUE, trip_id uuid REFERENCES trips(id), seg_date DATE, combustible_kg NUMERIC DEFAULT 0, recyclable_kg NUMERIC DEFAULT 0, inert_kg NUMERIC DEFAULT 0, moisture_rich_kg NUMERIC DEFAULT 0, reject_kg NUMERIC DEFAULT 0, hazardous_kg NUMERIC DEFAULT 0, raw_waste_kg NUMERIC DEFAULT 0, rdf_storage_kg NUMERIC DEFAULT 0, storage_location TEXT, moisture_content_pct NUMERIC, operator TEXT, notes TEXT, created_at TIMESTAMPTZ DEFAULT now()); ALTER TABLE segregation_records DISABLE ROW LEVEL SECURITY; GRANT ALL ON ALL TABLES IN SCHEMA public TO anon,authenticated,service_role;'+
        '</code></div>';
    }else{ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}

async function renderYardGate(){
  var ct=document.getElementById('ct');
  try{
    var entries=safeArr(await sbFetch('yard_gate_entries',{select:'*,trips(trip_code),vehicles(reg_no),drivers(full_name)',order:'gate_in_time.desc',limit:50}));
    var today=new Date().toISOString().split('T')[0];
    var todayIn=entries.filter(function(e){return e.gate_in_time&&e.gate_in_time.startsWith(today);});
    var pending=entries.filter(function(e){return !e.gate_out_time;});

    var rows=entries.map(function(e){
      var trp=e.trips||{};var veh=e.vehicles||{};var drv=e.drivers||{};
      var duration=e.gate_out_time?Math.round((new Date(e.gate_out_time)-new Date(e.gate_in_time))/60000):null;
      return[
        '<strong style="font-family:Consolas,monospace;color:var(--accent)">'+e.gate_no+'</strong>',
        trp.trip_code||'-',veh.reg_no||'-',drv.full_name||'-',
        e.gate_in_time?new Date(e.gate_in_time).toLocaleTimeString('en-IN'):'-',
        e.gross_weight_kg?e.gross_weight_kg+'kg':'-',
        e.tare_weight_kg?e.tare_weight_kg+'kg':'-',
        e.net_weight_kg?'<strong style="color:var(--accent)">'+e.net_weight_kg+'kg</strong>':'-',
        e.waste_type||'-',
        e.gate_out_time?new Date(e.gate_out_time).toLocaleTimeString('en-IN'):'<span style="color:var(--orange)">In Yard</span>',
        duration?duration+' min':'-',
        e.seal_no||'-',
        '<div style="display:flex;gap:4px">'+
          (!e.gross_weight_kg?'<button class="btn btn-sm" id="gwt'+e.id+'">Weigh</button>':'')+
          (!e.gate_out_time?'<button class="btn btn-sm" id="gex'+e.id+'">Exit</button>':'')+
          '<button class="btn btn-sm" id="pws'+e.id+'">Slip</button>'+
        '</div>'
      ];
    });

    ct.innerHTML='<div class="sg">'+
      sc('var(--accent)','Today Entries',todayIn.length,'')+
      sc('var(--orange)','Currently In Yard',pending.length,'')+
      sc('var(--blue)','Total Entries',entries.length,'')+
      '</div>'+
      card('Yard Gate Management',
        '<button class="btn btn-g btn-sm" onclick="newGateEntry()">+ Gate Entry</button>',
        tbl(['Gate No','Trip','Vehicle','Driver','Gate In','Gross','Tare','Net Wt','Waste Type','Gate Out','Duration','Seal No',''],rows),true);

    setTimeout(function(){
      document.querySelectorAll('[id^="gwt"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){recordGrossWeight(id);};});
      document.querySelectorAll('[id^="gex"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){recordGateExit(id);};});
      document.querySelectorAll('[id^="pws"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){printWeighmentSlip(id);};});
    },150);
  }catch(e){
    if(e.message&&e.message.includes('yard_gate')){
      ct.innerHTML='<div class="alert al-a">Run SQL: <code>CREATE TABLE IF NOT EXISTS yard_gate_entries (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, gate_no TEXT UNIQUE, trip_id uuid REFERENCES trips(id), vehicle_id uuid REFERENCES vehicles(id), driver_id uuid REFERENCES drivers(id), gate_in_time TIMESTAMPTZ, gate_out_time TIMESTAMPTZ, gross_weight_kg NUMERIC, tare_weight_kg NUMERIC, net_weight_kg NUMERIC, waste_type TEXT, waste_category TEXT, photo_url TEXT, seal_no TEXT, driver_name TEXT, created_at TIMESTAMPTZ DEFAULT now()); ALTER TABLE yard_gate_entries DISABLE ROW LEVEL SECURITY; GRANT ALL ON ALL TABLES IN SCHEMA public TO anon,authenticated,service_role;</code></div>';
    }else{ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>';}
  }
}

window.recordGrossWeight=async function(id){

  var body='<div class="fg">'+
    fld('Gross Weight (kg) — Vehicle + Waste',inp('gw_gross',entry.gross_weight_kg||'','number'),true)+

window.saveWeights=async function(id){
  var gross=parseFloat(gv('gw_gross'))||0;
  var tare=parseFloat(gv('gw_tare'))||0;
  var net=gross-tare;
  if(net<=0){alert('Net weight must be positive. Check Gross and Tare values.');return;}
  try{
    var entry=safeArr(await sbFetch('yard_gate_entries',{select:'trip_id',eq:{id:id}}))[0];
    await sbUpdate('yard_gate_entries',{gross_weight_kg:gross,tare_weight_kg:tare,net_weight_kg:net},{id:id});
    if(entry&&entry.trip_id)await sbUpdate('trips',{total_weight_kg:net},{id:entry.trip_id});
    closeModal();success('Weights recorded! Net: '+net+'kg');renderYardGate();
  }catch(e){alert('Error: '+e.message);}
};
window.recordGateExit=async function(id){
  var sealNo='SL-'+Math.floor(Math.random()*99999).toString().padStart(5,'0');
  var entry=safeArr(await sbFetch('yard_gate_entries',{select:'*,trips(trip_id)',eq:{id:id}}))[0];
  if(!confirm('Record Gate Exit for '+entry.gate_no+'? Seal No: '+sealNo))return;
  try{
    await sbUpdate('yard_gate_entries',{gate_out_time:new Date().toISOString(),seal_no:sealNo},{id:id});
    if(entry&&entry.trip_id)await sbUpdate('trips',{status:'Completed'},{id:entry.trip_id});
    logAudit('CREATE','YardGate',entry.gate_no,null,'Gate EXIT with seal '+sealNo);
    success('Gate Exit recorded! Seal: '+sealNo);renderYardGate();
  }catch(e){alert('Error: '+e.message);}
};

window.autoAssignBD=async function(leadId){
  var lead=safeArr(await sbFetch('leads',{select:'*',eq:{id:leadId}}))[0];if(!lead)return;
  // Get all staff who are BD type
  var bdStaff=safeArr(await sbFetch('staff_profiles',{select:'*',eq:{designation_type:'BD'},order:'full_name.asc'}));
  if(!bdStaff.length){alert('No BD staff found. Add staff with designation type BD first.');return;}
  // Get workload - count active leads per BD
  var allLeads=safeArr(await sbFetch('leads',{select:'assigned_bd,status'}));
  var workload={};
  bdStaff.forEach(function(s){workload[s.full_name]=0;});
  allLeads.forEach(function(l){
    if(l.assigned_bd&&l.status!=='Converted'&&l.status!=='Rejected'&&workload[l.assigned_bd]!==undefined){
      workload[l.assigned_bd]++;
    }
  });
  // Assign to BD with lowest workload in same city/zone
  var sameCityBD=bdStaff.filter(function(s){return s.city&&lead.city&&s.city.toLowerCase()===lead.city.toLowerCase();});
  var poolToAssign=sameCityBD.length>0?sameCityBD:bdStaff;
  var bestBD=poolToAssign.reduce(function(best,s){
    return (workload[s.full_name]||0)<(workload[best.full_name]||0)?s:best;
  },poolToAssign[0]);

  await sbUpdate('leads',{assigned_bd:bestBD.full_name,status:'Assigned'},{id:leadId});
  logAudit('ASSIGN','Lead',leadId,null,'Auto-assigned to '+bestBD.full_name+' (workload: '+workload[bestBD.full_name]+')');
  success('Auto-assigned to '+bestBD.full_name+' (city match: '+(sameCityBD.length>0?'Yes':'No')+', workload: '+workload[bestBD.full_name]+' leads)');
  renderLeads();
};

window.saveUser=async function(){
  var name=gv('nu_name'),email=gv('nu_email'),pin=gv('nu_pin'),role=document.getElementById('nu_role')?document.getElementById('nu_role').value:'';
  if(!name||!email||!pin||!role){alert('Name, Email, PIN and Role are required.');return;}
  try{
    // Check duplicate email
    var existingU=safeArr(await sbFetch('user_roles',{select:'id',eq:{email:email}}));
    if(existingU.length>0){alert('This email is already registered. Edit the existing user instead.');return;}

    var staffId=null;
    var drvPickId=document.getElementById('nu_drv_pick')?document.getElementById('nu_drv_pick').value:'';
    var stfPickId=document.getElementById('nu_stf_pick')?document.getElementById('nu_stf_pick').value:'';

    // Use selected staff profile or auto-create one
    if(stfPickId){
      staffId=stfPickId;
    }else if(role!=='generator'){
      var dtype=role==='driver'?'Driver':role==='inspector'?'Supervisor':'Admin Staff';
      var scode=await sbRpc('next_staff_code');
      var srec=await sbInsert('staff_profiles',{
        staff_code:scode,full_name:name,mobile:gv('nu_phone')||null,
        email:email,department:gv('nu_dept')||'Operations',
        designation_type:dtype,designation:role,
        basic_salary:parseFloat(gv('nu_salary'))||0,is_active:true
      });
      staffId=srec[0]&&srec[0].id;
    }

    // Create user login
    var userRec=await sbInsert('user_roles',{full_name:name,email:email,phone:gv('nu_phone')||null,role:role,pin:pin,is_active:true,staff_id:staffId});
    var userId=userRec[0]&&userRec[0].id;

    // If driver was selected — link user_id to driver record
    if(drvPickId&&userId){
      await sbUpdate('drivers',{user_id:userId,staff_id:staffId||null},{id:drvPickId});
    }
    // Update staff record with user linkage info
    if(staffId&&userId){
      await sbUpdate('staff_profiles',{email:email},{id:staffId});
    }

    closeModal();
    logAudit('CREATE','User',null,null,'User account created');
    success('User created!'+(drvPickId?' Linked to Driver record.':stfPickId?' Linked to Staff profile.':staffId?' Staff profile auto-created.':''));
    renderUsers();
  }catch(e){alert('Error: '+e.message);}
};

// ══════════════════════════════════════════════════════════
// LIVE GPS TRACKER — updates every 2 minutes during active trip
// ══════════════════════════════════════════════════════════
var _gpsTrackInterval=null;
var _gpsTrackTripId=null;

function startGPSTracking(tripId){
  if(_gpsTrackInterval)clearInterval(_gpsTrackInterval);
  _gpsTrackTripId=tripId;
  // Immediate first ping
  sendGPSPing(tripId);
  // Then every 2 minutes
  _gpsTrackInterval=setInterval(function(){sendGPSPing(tripId);},120000);
  console.log('GPS tracking started for trip',tripId);
}

function stopGPSTracking(){
  if(_gpsTrackInterval){clearInterval(_gpsTrackInterval);_gpsTrackInterval=null;}
  _gpsTrackTripId=null;
  console.log('GPS tracking stopped');
}

async function sendGPSPing(tripId){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(async function(pos){
    var lat=pos.coords.latitude;
    var lng=pos.coords.longitude;
    var acc=pos.coords.accuracy;
    var speed=pos.coords.speed||0;
    // Update global DRIVER_LOCATION
    DRIVER_LOCATION={lat:lat,lng:lng,accuracy:acc,timestamp:new Date().toISOString()};
    // Update GPS badge
    var gpsBadge=document.getElementById('gps-badge');
    if(gpsBadge){gpsBadge.style.background='rgba(0,230,118,.15)';gpsBadge.style.color='#00e676';gpsBadge.textContent='📍 ±'+Math.round(acc)+'m';}
    try{
      // Save to vehicle_tracking table
      var driverId=DRIVER_RECORD?DRIVER_RECORD.id:null;
      var vehicleId=null;
      // Get vehicle from trip
      if(tripId){
        var tripRec=safeArr(await sbFetch('trips',{select:'vehicle_id',eq:{id:tripId}}));
        vehicleId=tripRec[0]?tripRec[0].vehicle_id:null;
      }
      await sbInsert('vehicle_tracking',{
        trip_id:tripId||null,
        driver_id:driverId,
        vehicle_id:vehicleId,
        latitude:lat,longitude:lng,
        accuracy_m:Math.round(acc),
        speed_kmh:speed?Math.round(speed*3.6):null,
        recorded_at:new Date().toISOString()
      });
      // Check speed violation (>60 km/h)
      var speedKmh=speed?Math.round(speed*3.6):0;
      if(speedKmh>60){
        console.warn('SPEED VIOLATION: '+speedKmh+' km/h on trip '+tripId);
        await logAudit('ALERT','GPS',tripId,null,'Speed violation: '+speedKmh+' km/h');
      }
      // Geofence check — panic button support
      if(DRIVER_LOCATION){DRIVER_LOCATION.speed_kmh=speedKmh;}
      // Auto-detect stage based on GPS proximity to known locations
      await autoDetectTripStage(tripId,lat,lng);
      // Check route deviation
      await checkRouteDeviation(tripId,lat,lng);
    }catch(e){console.warn('GPS ping error:',e.message);}
  },function(err){
    console.warn('GPS error:',err.message);
  },{enableHighAccuracy:true,timeout:10000,maximumAge:30000});
}

async function autoDetectTripStage(tripId,lat,lng){
  if(!tripId||!lat||!lng)return;
  try{
    // Get trip details with pickups
    var trip=safeArr(await sbFetch('trips',{select:'*',eq:{id:tripId}}))[0];
    if(!trip||trip.status==='Completed')return;
    // Get all pending pickups with generator locations
    var pickups=safeArr(await sbFetch('trip_pickups',{
      select:'*,bins(bin_code,generator_id,generators(latitude,longitude,company_name))',
      eq:{trip_id:tripId,status:'Pending'}
    }));
    // Check distance to each generator location
    pickups.forEach(async function(p){
      var gen=p.bins&&p.bins.generators;
      if(!gen||!gen.latitude||!gen.longitude)return;
      var dist=calcDistance(lat,lng,gen.latitude,gen.longitude);
      // Within 100 meters of generator — mark arrived
      if(dist<=100){
        await sbUpdate('trip_pickups',{
          status:'Arrived',
          arrived_at:new Date().toISOString()
        },{id:p.id});
        console.log('Auto-marked arrived at',gen.company_name,'dist:',dist+'m');
      }
    });
  }catch(e){console.warn('Stage detect error:',e.message);}
}

async function checkRouteDeviation(tripId,lat,lng){
  if(!tripId)return;
  try{
    // Get trip pickups to check if vehicle is near any generator
    var pickups=safeArr(await sbFetch('trip_pickups',{
      select:'bins(generators(latitude,longitude,company_name))',
      eq:{trip_id:tripId,status:'Pending'}
    }));
    var nearAny=pickups.some(function(p){
      var g=p.bins&&p.bins.generators;
      if(!g||!g.latitude)return false;
      return calcDistance(lat,lng,g.latitude,g.longitude)<5000; // 5km tolerance
    });
    if(!nearAny&&pickups.length>0){
      // More than 5km from any pending pickup — possible deviation
      console.warn('Possible route deviation on trip '+tripId);
    }
  }catch(e){}
}
function calcDistance(lat1,lng1,lat2,lng2){
  var R=6371000;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function captureDriverLocation(){return new Promise(function(resolve){if(!navigator.geolocation){resolve(null);return;}navigator.geolocation.getCurrentPosition(function(pos){DRIVER_LOCATION={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,timestamp:new Date().toISOString()};resolve(DRIVER_LOCATION);},function(){resolve(null);},{enableHighAccuracy:true,timeout:8000});});}

window.collectBin=async function(pickupId,tripId){
  var wtEl=document.getElementById('wt_'+pickupId);
  var wt=wtEl?parseFloat(wtEl.value):0;
  if(!wt||wt<=0){alert('Please enter the weight collected in kg.');return;}
  try{
    await sbUpdate('trip_pickups',{status:'Collected',weight_collected_kg:wt,collected_at:new Date().toISOString()},{id:pickupId});
    // Update bin fill to 0
    var pickup=safeArr(await sbFetch('trip_pickups',{select:'bin_id',eq:{id:pickupId}}))[0];
    if(pickup&&pickup.bin_id)await sbUpdate('bins',{current_fill_pct:0,last_collected:new Date().toISOString()},{id:pickup.bin_id});
    // Update trip total weight
    var allPickups=safeArr(await sbFetch('trip_pickups',{select:'weight_collected_kg',eq:{trip_id:tripId}}));
    var totalWt=allPickups.reduce(function(s,p){return s+(parseFloat(p.weight_collected_kg)||0);},0);
    await sbUpdate('trips',{total_weight_kg:totalWt},{id:tripId});
    success('Bin collected! '+wt+' kg recorded.');
    renderDriverCollect();
  }catch(e){alert('Error: '+e.message);}
};

// ── QR CAMERA SCANNER ─────────────────────────────────────
var _qrStream=null,_qrScanInterval=null;
window.startQRCamera=function(){
  var area=document.getElementById('qr-camera-area');
  if(area)area.style.display='block';
  var video=document.getElementById('qr-video');
  if(!video)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert('Camera not available. Please enter QR code manually.');
    if(area)area.style.display='none';return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
    .then(function(stream){
      _qrStream=stream;video.srcObject=stream;video.play();
      _qrScanInterval=setInterval(scanQRFrame,250);
    })
    .catch(function(err){
      alert('Camera access denied. Enter QR code manually. ' + err.message);
      if(area)area.style.display='none';
    });
};
window.stopQRCamera=function(){
  if(_qrStream){_qrStream.getTracks().forEach(function(t){t.stop();});_qrStream=null;}
  if(_qrScanInterval){clearInterval(_qrScanInterval);_qrScanInterval=null;}
  var area=document.getElementById('qr-camera-area');if(area)area.style.display='none';
};
function scanQRFrame(){
  var video=document.getElementById('qr-video');
  var canvas=document.getElementById('qr-canvas');
  if(!video||!canvas||video.readyState!==4)return;
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  var imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  try{
    if(typeof jsQR==='undefined')return;
    var code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data){
      stopQRCamera();
      var qrVal=code.data.trim().toUpperCase();
      var qrEl=document.getElementById('att_qr');if(qrEl)qrEl.value=qrVal;
      var det=document.getElementById('qr-detected');if(det)det.style.display='block';
      var detCode=document.getElementById('qr-detected-code');if(detCode)detCode.textContent=qrVal;
      if(navigator.vibrate)navigator.vibrate([100,50,100]);
    }
  }catch(e){}
}


window.drvPunchAttendance=async function(punchType){
  var qr=(document.getElementById('att_qr').value||'').trim().toUpperCase();
  if(!qr){alert('Enter QR code first.');return;}
  try{
    var locs=safeArr(await sbFetch('qr_locations',{select:'*',eq:{qr_code:qr}}));
    var loc=locs[0];if(!loc){alert('Invalid QR code. Please check and try again.');return;}
    var lat=null,lng=null,gpsVerified=false,distance=null;
    if(DRIVER_LOCATION){
      lat=DRIVER_LOCATION.lat;lng=DRIVER_LOCATION.lng;
      if(loc.latitude&&loc.longitude){
        var R=6371000;var dLat=(loc.latitude-lat)*Math.PI/180;var dLon=(loc.longitude-lng)*Math.PI/180;
        var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat*Math.PI/180)*Math.cos(loc.latitude*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        distance=Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
        gpsVerified=distance<=(loc.radius_meters||100);
      }else{gpsVerified=true;}
    }
    var driverRec=safeArr(await sbFetch('drivers',{select:'id,staff_id',eq:{user_id:CURRENT_USER.id}}));
    var drvId=driverRec[0]?driverRec[0].id:null;
    var stfId=driverRec[0]?driverRec[0].staff_id:(CURRENT_USER.staff_id||null);
    await sbInsert('attendance',{
      user_role_id:CURRENT_USER.id,staff_id:stfId,driver_id:drvId,
      qr_location_id:loc.id,punch_type:punchType,
      punch_time:new Date().toISOString(),latitude:lat,longitude:lng,
      gps_verified:gpsVerified,distance_from_qr:distance
    });
    var msg=punchType==='IN'?'✅ Punched IN successfully!':'👋 Punched OUT successfully!';
    if(!gpsVerified&&distance!==null)msg+='\n⚠️ GPS not within range ('+distance+'m away)';
    alert(msg);
    renderDriverAttend();
  }catch(e){alert('Error: '+e.message);}
};

window.toggleCheck=function(id){
  var state=window._checkState||{};
  state[id]=!state[id];
  window._checkState=state;

  var row=document.getElementById('row-'+id);
  var chk=document.getElementById('chk-'+id);
  var tick=document.getElementById('tick-'+id);
  var def=(window._checkDefs||[]).find(function(c){return c.id===id;});

  if(state[id]){
    if(row){row.style.background='#0d2b1a';row.style.borderColor='rgba(0,230,118,.5)';}
    if(chk){chk.style.background='rgba(0,230,118,.2)';chk.style.borderColor='#00e676';}
    if(tick){
      tick.innerHTML='✅';
      tick.style.background='#00e676';
      tick.style.borderColor='#00e676';
    }
  }else{
    var isCrit=def&&def.critical;
    if(row){row.style.background='#1a2840';row.style.borderColor=isCrit?'rgba(255,152,0,.3)':'rgba(90,122,154,.2)';}
    if(chk){chk.style.background=isCrit?'rgba(255,152,0,.15)':'rgba(90,122,154,.1)';chk.style.borderColor=isCrit?'#ff9800':'#5a7a9a';}
    if(tick){tick.innerHTML='○';tick.style.background='rgba(90,122,154,.15)';tick.style.borderColor='rgba(90,122,154,.3)';}
  }

  // Update progress
  var defs=window._checkDefs||[];
  var req=defs.filter(function(c){return c.critical;});
  var done=req.filter(function(c){return state[c.id];}).length;
  var pct=Math.round(done/req.length*100);

  var prog=document.getElementById('checklist-progress');
  var bar=document.getElementById('checklist-bar');
  var btn=document.getElementById('submit-checklist-btn');

  if(prog)prog.textContent=done+' / '+req.length+' required ('+pct+'%)';
  if(bar)bar.style.width=pct+'%';
  if(btn){
    if(done===req.length){
      btn.style.background='#00e676';
      btn.style.color='#000000';
      btn.textContent='All Clear — Submit Checklist!';
    }else{

window.submitDriverChecklist=async function(){
  var state=window._checkState||{};
  var defs=window._checkDefs||[];
  var req=defs.filter(function(c){return c.critical;});
  var allReq=req.every(function(c){return state[c.id];});

  if(!allReq){
    var missing=req.filter(function(c){return !state[c.id];}).map(function(c){return c.label;});
    alert('Please complete all required checks:\n\n'+missing.join('\n'));

    return;
  }

  var fuelEl=document.getElementById('fuel_pct');
  var fuelPct=parseInt(fuelEl?fuelEl.value:0)||0;
  if(fuelPct<20){alert('Fuel is below 20%. Please refuel before proceeding.');return;}

  var cleanStatus=window._cleanStatus||'Clean';
  if(cleanStatus==='Dirty - Cannot Proceed'){alert('Vehicle is dirty. Please clean before proceeding.');return;}

  try{
    var today=new Date().toISOString().split('T')[0];
    var code=await sbRpc('next_checklist_code');
    var fuelLitresEl=document.getElementById('fuel_litres');
    var fuelLitres=parseInt(fuelLitresEl?fuelLitresEl.value:0)||null;

    var checkData={
      checklist_code:code,check_date:today,
      fuel_level_pct:fuelPct,fuel_litres:fuelLitres,
      cleaning_status:cleanStatus,vehicle_ready:true
    };
    if(DRIVER_RECORD)checkData.driver_id=DRIVER_RECORD.id;
    if(CURRENT_USER)checkData.user_role_id=CURRENT_USER.id;
    defs.forEach(function(c){if(c.id!=='cleaning_ok')checkData[c.id]=state[c.id]||false;});

    await sbInsert('vehicle_checklist',checkData);

    logAudit('CREATE','Checklist',null,null,'Pre-trip checklist submitted');
    CHECKLIST_DONE_TODAY=true;
    localStorage.setItem('checklist_date',today);
    window._checkState={};
    window._checkDefs=[];

    var dc=document.getElementById('driver-content');
    if(dc){
      dc.innerHTML=
        '<div style="text-align:center;padding:60px 20px;">'+
          '<div style="font-size:80px;margin-bottom:16px;">✅</div>'+
          '<div style="font-size:22px;font-weight:800;color:#00e676;margin-bottom:8px;">Vehicle Cleared!</div>'+
          '<div style="font-size:14px;color:#8ab0d0;">Checklist '+code+' submitted</div>'+
        '</div>';
    }
    document.querySelectorAll('.drv-nav-btn').forEach(function(b){b.classList.remove('on');});
    var hn=document.getElementById('dnb-home');if(hn)hn.classList.add('on');
    setTimeout(function(){renderDriverHome();},2000);

  }catch(e){alert('Error: '+e.message);}
};

window.driverQRPunch=async function(punchType){
  var qrCode=gv('drv-qr').trim().toUpperCase();if(!qrCode){alert('Please enter QR code.');return;}
  try{var locs=await sbFetch('qr_locations',{select:'*',eq:{qr_code:qrCode,is_active:'true'}});var loc=safeArr(locs)[0];
  if(!loc){document.getElementById('drv-att-result').innerHTML='<div style="color:#f44336;font-size:13px;padding:8px">Invalid QR code</div>';return;}
  var lat=null,lng=null,gpsVerified=false,distance=null;
  if(DRIVER_LOCATION){lat=DRIVER_LOCATION.lat;lng=DRIVER_LOCATION.lng;if(loc.latitude&&loc.longitude){var R=6371000;var dLat=(loc.latitude-lat)*Math.PI/180;var dLon=(loc.longitude-lng)*Math.PI/180;var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat*Math.PI/180)*Math.cos(loc.latitude*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);distance=Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));gpsVerified=distance<=(loc.radius_meters||100);}else{gpsVerified=true;}}
  // Get staff_id and driver_id for this user
  var driverRec=safeArr(await sbFetch('drivers',{select:'id,staff_id',eq:{user_id:CURRENT_USER?CURRENT_USER.id:null}}));

  var resEl=document.getElementById('drv-att-result');if(resEl)resEl.innerHTML='<div style="text-align:center;padding:10px"><div style="font-size:36px;margin-bottom:6px">'+(punchType==='IN'?'✅':'👋')+'</div><div style="font-size:15px;font-weight:700;color:'+(punchType==='IN'?'#00e676':'#f44336')+'">'+(punchType==='IN'?'Punched IN!':'Punched OUT!')+'</div><div style="font-size:12px;color:#8ab0d0">'+loc.location_name+'</div>'+(gpsVerified?'<div style="font-size:11px;color:#00e676;margin-top:4px">✅ GPS Verified</div>':'<div style="font-size:11px;color:#ff9800;margin-top:4px">⚠️ GPS not verified</div>')+'</div>';

window.detectLocation = function() {
  var status = document.getElementById('loc-status');
  if(!status) return;
  status.textContent = '🔄 Detecting location...';
  if(!navigator.geolocation) {
    status.textContent = '❌ GPS not supported. Please enter manually.';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude.toFixed(6);
      var lng = pos.coords.longitude.toFixed(6);
      var latEl = document.getElementById('pg_lat');
      var lngEl = document.getElementById('pg_lng');
      if(latEl) latEl.value = lat;
      if(lngEl) lngEl.value = lng;
      status.innerHTML = '✅ Location detected! Accuracy: ±' + Math.round(pos.coords.accuracy) + 'm';
      var mapsEl = document.getElementById('maps-link');
      if(mapsEl) {
        mapsEl.innerHTML = '<a href="https://www.google.com/maps?q=' + lat + ',' + lng + '" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ View on Google Maps →</a>';
      }
    },
    function(err) {
      var msgs = {1:'Permission denied — please allow location access',2:'Position unavailable',3:'Timeout'};
      status.textContent = '❌ ' + (msgs[err.code] || 'Error detecting location');
    },
    {enableHighAccuracy:true, timeout:10000}
  );
};

// ── AUTO TRIP PLANNER ─────────────────────────────────────
async function autoTripPlanner() {
  // Find all bins >= 95% that don't have a pending/active trip
  var criticalBins = await sbFetch('bins',{select:'*,generators(company_name,address,city,latitude,longitude)',order:'current_fill_pct.desc'});
  criticalBins = safeArr(criticalBins).filter(function(b){ return b.current_fill_pct >= 95 && b.status !== 'In Transit'; });

  if(criticalBins.length === 0) {
    return {triggered:false, message:'No bins at critical level (95%+)'};
  }

  // Find available vehicles (status Active, no active trip today)
  var vehicles = await sbFetch('vehicles',{select:'*',eq:{status:'Active'}});
  vehicles = safeArr(vehicles);

  // Find vehicles with checklist done today (vehicle ready)
  var today = new Date().toISOString().split('T')[0];
  var checklists = await sbFetch('vehicle_checklist',{select:'vehicle_id,vehicle_ready',eq:{check_date:today}});
  var readyVehicleIds = safeArr(checklists).filter(function(c){return c.vehicle_ready;}).map(function(c){return c.vehicle_id;});

  var readyVehicles = vehicles.filter(function(v){ return readyVehicleIds.includes(v.id); });

  if(readyVehicles.length === 0) {
    return {triggered:false, message:'No vehicles have completed pre-trip checklist today. Drivers must complete 360 degree check first.'};
  }

  // Create trip for each critical bin group
  var tripsCreated = [];
  var vIdx = 0;

  for(var i=0; i<criticalBins.length; i++) {
    var bin = criticalBins[i];
    var vehicle = readyVehicles[vIdx % readyVehicles.length];
    vIdx++;

    try {
      var tripCode = await sbRpc('next_trip_code');
      var tripResult = await sbInsert('trips',{
        trip_code: tripCode,
        vehicle_id: vehicle.id,
        driver_id: vehicle.drivers ? vehicle.drivers.id : null,
        trip_date: today,
        route_priority: 'Urgent Fill First',
        instructions: 'AUTO-PLANNED: Bin '+bin.bin_code+' at '+bin.current_fill_pct+'% capacity. Urgent pickup required. Generator: '+(bin.generators ? bin.generators.company_name : ''),
        status: 'Planned',
        auto_planned: true
      });

      var tripId = tripResult[0] && tripResult[0].id;
      if(tripId) {
        await sbInsert('trip_pickups',{trip_id:tripId, bin_id:bin.id, sequence_no:1, status:'Pending'});
        await sbUpdate('bins',{status:'Trip Planned'},{id:bin.id});
        tripsCreated.push({trip:tripCode, bin:bin.bin_code, vehicle:vehicle.reg_no, driver:vehicle.drivers ? vehicle.drivers.full_name : 'Unassigned', fill:bin.current_fill_pct});
      }
    } catch(e) {
      console.error('Auto plan error:', e);
    }
  }

  return {triggered:true, trips:tripsCreated};
}

async function renderAutoPlanner() {
  var ct = document.getElementById('ct');
  ct.innerHTML = '<div style="text-align:center;padding:20px;color:#8ab0d0">Loading...</div>';
  try {
    var bins = safeArr(await sbFetch('bins',{select:'*,generators(id,gen_code,company_name,city,spoc_name,spoc_mobile)',order:'current_fill_pct.desc'}));
    var today = new Date().toISOString().split('T')[0];
    var checklists = safeArr(await sbFetch('vehicle_checklist',{select:'vehicle_id,vehicle_ready',eq:{check_date:today}}));
    var readyVehicles = checklists.filter(function(c){return c.vehicle_ready;}).length;

    var critical = bins.filter(function(b){return b.current_fill_pct>=95;});
    var warning  = bins.filter(function(b){return b.current_fill_pct>=80&&b.current_fill_pct<95;});
    var moderate = bins.filter(function(b){return b.current_fill_pct>=60&&b.current_fill_pct<80;});
    var normal   = bins.filter(function(b){return b.current_fill_pct<60;});

    // Group bins by generator
    var genMap = {};
    bins.forEach(function(b){
      var gid = (b.generators&&b.generators.id)||'unknown';
      if(!genMap[gid]){
        genMap[gid]={
          gen:b.generators||{company_name:'Unknown',city:''},
          bins:[],critical:0,warning:0,moderate:0,normal:0
        };
      }
      genMap[gid].bins.push(b);
      if(b.current_fill_pct>=95)genMap[gid].critical++;
      else if(b.current_fill_pct>=80)genMap[gid].warning++;
      else if(b.current_fill_pct>=60)genMap[gid].moderate++;
      else genMap[gid].normal++;

    // Sort generators: critical first, then warning, then by max fill
    var genList = Object.keys(genMap).map(function(k){return genMap[k];});
    genList.sort(function(a,b){
      if(b.critical!==a.critical)return b.critical-a.critical;
      if(b.warning!==a.warning)return b.warning-a.warning;
      var maxA=Math.max.apply(null,a.bins.map(function(x){return x.current_fill_pct||0;}));

window.detectSiteLocation = function() {
  var status = document.getElementById('site-loc-status');
  var mapsEl = document.getElementById('site-maps-link');
  if(status) status.textContent = 'Detecting...';
  if(!navigator.geolocation){if(status)status.textContent='GPS not supported';return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
      var le=document.getElementById('st_lat'); var lne=document.getElementById('st_lng');
      if(le) le.value=lat; if(lne) lne.value=lng;
      if(status) status.innerHTML='✅ Detected! Accuracy: ±'+Math.round(pos.coords.accuracy)+'m';
      if(mapsEl) mapsEl.innerHTML='<a href="https://www.google.com/maps?q='+lat+','+lng+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ Verify on Google Maps →</a>';
    },
    function(e){if(status)status.textContent='Error: '+(e.code===1?'Permission denied':'Could not detect');},
    {enableHighAccuracy:true,timeout:10000}
  );
};

window.stpToggleBin=function(binId){
  var sel=window._stpSelected||new Set();
  if(sel.has(binId)){sel.delete(binId);}else{sel.add(binId);}
  window._stpSelected=sel;
  // Update visual
  var card2=document.getElementById('stpc_'+binId);
  var chk=document.getElementById('stpchk_'+binId);
  var selected=sel.has(binId);
  if(card2){
    card2.style.background=selected?'rgba(0,217,126,.06)':'var(--surface2)';
    card2.style.borderColor=selected?'rgba(0,217,126,.4)':'var(--border)';
  }
  if(chk){
    chk.style.background=selected?'var(--accent)':'var(--surface3)';
    chk.style.borderColor=selected?'var(--accent)':'var(--border2)';
    chk.innerHTML=selected?'<span style="color:#000;font-weight:900">✓</span>':'';
  }
  var cnt=document.getElementById('stp_count');
  if(cnt)cnt.textContent='('+sel.size+' selected)';
};

window.saveSmartTrip = async function() {
  var vehId = gv('stp_veh');
  var siteId = gv('stp_site');
  var date = gv('stp_date');
  if(!vehId||!date){alert('Vehicle and date required.');return;}

  var selBins = (window._stpBins||[]).filter(function(b){
    var el=document.getElementById('stb_'+b.id);
    return el&&el.checked;
  });
  if(selBins.length===0){alert('Please select at least one bin to collect.');return;}

  try {
    // Get vehicle driver
    var vehicles = await sbFetch('vehicles',{select:'*',eq:{id:vehId}});
    var veh = safeArr(vehicles)[0];
    var driverId = veh&&veh.drivers?veh.drivers.id:null;

    var code = await sbRpc('next_trip_code');
    var tripResult = await sbInsert('trips',{
      trip_code:code,
      vehicle_id:vehId,
      driver_id:driverId,
      trip_date:date,
      delivery_site_id:siteId||null,
      route_priority:gv('stp_pri')||'Urgent Fill First',
      instructions:gv('stp_inst')||null,
      status:'Planned',
      auto_planned:false
    });

    var tripId = tripResult[0]&&tripResult[0].id;
    if(tripId) {
      var pickups = selBins.map(function(b,i){
        return {trip_id:tripId,bin_id:b.id,sequence_no:i+1,status:'Pending'};
      });
      await sbInsert('trip_pickups',pickups);
      selBins.forEach(async function(b){
        await sbUpdate('bins',{status:'Trip Planned'},{id:b.id});
      });
    }

    // Get destination site name
    var sites = await sbFetch('processing_sites',{select:'site_name',eq:{id:siteId}});
    var siteName = safeArr(sites)[0]?safeArr(sites)[0].site_name:'';

    alert('✅ Trip '+code+' created!\n\n'
      +'Bins: '+selBins.map(function(b){return b.bin_code;}).join(', ')+'\n'
      +'Vehicle: '+(veh?veh.reg_no:'')+'\n'
      +'Driver: '+(veh&&veh.drivers?veh.drivers.full_name:'Unassigned')+'\n'
      +'Deliver to: '+siteName+'\n\n'
      +'Trip pushed to driver app!');

    renderSmartTripPlanner();
  } catch(e){alert('Error: '+e.message);}
};

// Generate QR code as SVG (simple QR-like visual with encoded data)
function generateQRSVG(text, size) {
  size = size || 200;
  // Create a simple visual QR placeholder with the code text
  // In production this would use a QR library
  var hash = 0;
  for(var i=0;i<text.length;i++) hash = ((hash<<5)-hash)+text.charCodeAt(i);
  hash = Math.abs(hash);
  
  var cells = 21;
  var cell = Math.floor(size/cells);
  var svg = '<svg width="'+size+'" height="'+size+'" xmlns="http://www.w3.org/2000/svg" style="background:#fff">';
  
  // Border
  svg += '<rect x="0" y="0" width="'+size+'" height="'+size+'" fill="#fff"/>';
  svg += '<rect x="2" y="2" width="'+(size-4)+'" height="'+(size-4)+'" fill="none" stroke="#000" stroke-width="2"/>';
  
  // Position detection patterns (corners)
  var corners = [[1,1],[1,cells-8],[cells-8,1]];
  corners.forEach(function(c) {
    var x=c[0]*cell, y=c[1]*cell;
    svg += '<rect x="'+x+'" y="'+y+'" width="'+(7*cell)+'" height="'+(7*cell)+'" fill="#000"/>';
    svg += '<rect x="'+(x+cell)+'" y="'+(y+cell)+'" width="'+(5*cell)+'" height="'+(5*cell)+'" fill="#fff"/>';
    svg += '<rect x="'+(x+2*cell)+'" y="'+(y+2*cell)+'" width="'+(3*cell)+'" height="'+(3*cell)+'" fill="#000"/>';
  });
  
  // Data pattern based on hash
  for(var r=0;r<cells;r++) {
    for(var c2=0;c2<cells;c2++) {
      if((r<9&&c2<9)||(r<9&&c2>cells-9)||(r>cells-9&&c2<9)) continue;
      var bit = (hash >> ((r*cells+c2)%32)) & 1;
      var extra = (text.charCodeAt((r+c2)%text.length)>>((r*c2)%8))&1;
      if((bit^extra)==1) {
        svg += '<rect x="'+(c2*cell)+'" y="'+(r*cell)+'" width="'+cell+'" height="'+cell+'" fill="#000"/>';
      }
    }
  }
  
  // Center text
  svg += '<rect x="'+(size/2-30)+'" y="'+(size/2-10)+'" width="60" height="20" fill="#fff"/>';
  svg += '<text x="'+(size/2)+'" y="'+(size/2+5)+'" text-anchor="middle" font-size="9" font-family="Consolas,monospace" fill="#000">'+text+'</text>';
  svg += '</svg>';
  return svg;
}

// ── QR LOCATIONS (complete replacement) ──────────────────
async function renderQRLocations() {
  var ct = document.getElementById('ct');
  try {
    var locations = safeArr(await sbFetch('qr_locations',{select:'*',order:'location_type,location_name'}));
    var html = '<div class="sg">'
      +sc('#2196f3','Total QR Codes',locations.length,'')
      +sc('#00e676','Active',locations.filter(function(l){return l.is_active;}).length,'')
      +sc('#ff9800','Yard/Parking',locations.filter(function(l){return l.location_type==='Yard'||l.location_type==='Parking';}).length,'')
      +sc('#9c27b0','Vehicles',locations.filter(function(l){return l.location_type==='Vehicle';}).length,'')
      +'</div>';

    html += '<div class="card"><div class="ch"><span class="ct2">📱 QR Code Locations</span>'
      +'<button class="btn btn-g btn-sm" onclick="newQRLocation()">+ Add QR Location</button></div>'
      +'<div class="cb"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">';

    if(locations.length === 0) {
      html += '<div style="padding:30px;text-align:center;color:#5a7a9a;grid-column:1/-1">No QR locations created yet. Click <strong>+ Add QR Location</strong> to create one.</div>';
    }

    locations.forEach(function(loc) {
      var typeColor = loc.location_type==='Yard'?'#2196f3':loc.location_type==='Parking'?'#ff9800':loc.location_type==='Vehicle'?'#9c27b0':'#00e676';
      var typeIcon = loc.location_type==='Yard'?'🏗️':loc.location_type==='Parking'?'🅿️':loc.location_type==='Vehicle'?'🚛':'📍';
      html += '<div style="background:#0f1724;border:1px solid rgba(100,160,255,.1);border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px">'
        +'<div style="font-size:11px;font-weight:700;color:'+typeColor+'">'+typeIcon+' '+loc.location_type+'</div>'
        +generateQRSVG(loc.qr_code, 140)
        +'<div style="text-align:center">'
        +'<div style="font-family:Consolas,monospace;font-size:13px;font-weight:700;color:#00e676">'+loc.qr_code+'</div>'
        +'<div style="font-size:12px;color:#e2eeff;font-weight:600;margin-top:2px">'+loc.location_name+'</div>'
        +(loc.latitude?'<div style="margin-top:4px"><a href="https://www.google.com/maps?q='+loc.latitude+','+loc.longitude+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">📍 Maps</a></div>':'')
        +'<div style="font-size:10px;color:#5a7a9a;margin-top:2px">Radius: '+(loc.radius_meters||50)+'m</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px">'
        +'<button class="btn btn-sm" id="pq'+loc.id+'" data-qc="'+loc.qr_code+'" data-qn="'+loc.location_name+'">Print</button>'
        +'<button class="btn btn-sm" id="eql'+loc.id+'">Edit</button>'
        +'</div></div>';
    });

    html += '</div></div></div>';
    ct.innerHTML = html;

    setTimeout(function(){
      document.querySelectorAll('[id^="eql"]').forEach(function(b){
        var id=b.id.slice(3); b.onclick=function(){editQRLocation(id);};
      });
      document.querySelectorAll('[id^="pq"]').forEach(function(b){
        var qc=b.getAttribute('data-qc'); var qn=b.getAttribute('data-qn');
        b.onclick=function(){printQR(qc,qn);};
      });
    },150);
  } catch(e){ ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

window.newQRLocation = function() {
  var body = '<div class="fg">'
    +fld('Location Name',inp('ql_name','e.g. Main Gate, Vehicle GJ-05-AB-1234'),true)
    +fld('Location Type',sel('ql_type',['Yard','Parking','Vehicle','Office','Weighbridge','Gate']),true)
    +fld('GPS Radius (metres)',inp('ql_radius','50','number'))
    +'<div class="full">'+'</div>'
    +'<div class="sec">Location — Search address or use GPS to auto-fill</div>'
    +'<div class="full"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<span style="font-size:11.5px;color:#9ab8d4">GPS Coordinates</span>'
    +'<button type="button" onclick="showLocationPicker(\"ql_lat\",\"ql_lng\",\"qr-loc-status\",\"qr-maps-link\")" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(0,230,118,.4);background:rgba(0,230,118,.08);color:#00e676;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit">📍 Search & Pick Location</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">'
    +'<input id="ql_lat" placeholder="Latitude (auto-filled)">'
    +'<input id="ql_lng" placeholder="Longitude (auto-filled)">'
    +'</div>'
    +'<div id="qr-loc-status" style="font-size:11px;color:#8ab0d0"></div>'
    +'<div id="qr-maps-link" style="margin-top:4px"></div>'
    +'</div>'
    +'</div>';
  modal('Add QR Location', body,
    '<button class="btn btn-sm" onclick="closeModal()">Cancel</button>'

};

window.saveQRLocation = async function() {
  var name = gv('ql_name'), type = gv('ql_type');
  if(!name || !type) { alert('Location name and type are required.'); return; }
  try {
    var code = await sbRpc('next_qr_code');
    var lat = gv('ql_lat') ? parseFloat(gv('ql_lat')) : null;
    var lng = gv('ql_lng') ? parseFloat(gv('ql_lng')) : null;
    await sbInsert('qr_locations', {
      qr_code: code,
      location_name: name,
      location_type: type,
      latitude: lat,
      longitude: lng,
      radius_meters: parseInt(gv('ql_radius')) || 50,
      is_active: true
    });
    closeModal();
    success('QR Location ' + code + ' created! Print the QR code and display it at the location.');
    renderQRLocations();
  } catch(e) { alert('Error: ' + e.message); }
};

window.editQRLocation = async function(id) {
  var locs = await sbFetch('qr_locations',{select:'*',eq:{id:id}});
  var loc = safeArr(locs)[0]; if(!loc) return;
  var body = '<div class="fg">'
    +fld('Location Name','<input id="ql_name" value="'+loc.location_name.replace(/"/g,'&quot;')+'">',true)
    +fld('Location Type',sel('ql_type',['Yard','Parking','Vehicle','Office','Weighbridge','Gate']))
    +fld('GPS Radius (metres)','<input id="ql_radius" type="number" value="'+(loc.radius_meters||50)+'">')
    +'<div class="sec">Location — Search address or use GPS to update</div>'
    +'<div class="full"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<span style="font-size:11.5px;color:#9ab8d4">GPS Coordinates</span>'
    +'<button type="button" onclick="showLocationPicker(\"ql_lat\",\"ql_lng\",\"qr-loc-status\",\"qr-maps-link\")" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(0,230,118,.4);background:rgba(0,230,118,.08);color:#00e676;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit">📍 Search & Pick Location</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">'
    +'<input id="ql_lat" placeholder="Latitude" value="'+(loc.latitude||'')+'">'
    +'<input id="ql_lng" placeholder="Longitude" value="'+(loc.longitude||'')+'">'
    +'</div>'
    +(loc.latitude ? '<div style="margin-top:4px"><a href="https://www.google.com/maps?q='+loc.latitude+','+loc.longitude+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">📍 Current location on Google Maps →</a></div>' : '<div id="qr-loc-status" style="font-size:11px;color:#8ab0d0"></div><div id="qr-maps-link"></div>')
    +'</div>'
    +fld('Status',sel('ql_active',['true','false']))
    +'</div>';
  var foot = '<button class="btn btn-sm" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-g btn-sm" id="sqebtn">Save Changes</button>';
  modal('Edit QR —' + loc.qr_code, body, foot);
  setTimeout(function(){
    document.getElementById('ql_type').value = loc.location_type || 'Yard';
    document.getElementById('ql_active').value = String(loc.is_active);
    var sb = document.getElementById('sqebtn');
    if(sb) { var lid = id; sb.onclick = function(){ saveQREdit(lid); }; }
  }, 50);
};

window.saveQREdit = async function(id) {
  var lat = gv('ql_lat') ? parseFloat(gv('ql_lat')) : null;
  var lng = gv('ql_lng') ? parseFloat(gv('ql_lng')) : null;
  try {
    await sbUpdate('qr_locations', {
      location_name: gv('ql_name'),
      location_type: gv('ql_type'),
      latitude: lat,
      longitude: lng,
      radius_meters: parseInt(gv('ql_radius')) || 50,
      is_active: gv('ql_active') === 'true'
    }, {id: id});
    closeModal();
    success('QR Location updated!');
    renderQRLocations();
  } catch(e) { alert('Error: ' + e.message); }
}

window.printQR = function(code, name) {
  var svg = generateQRSVG(code, 260);
  var win = window.open('', '_blank');
  if(!win) { alert('Please allow popups for this site to print QR codes.'); return; }
  win.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>QR — '+code+'</title>'
    +'<style>*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Segoe UI,Arial,sans-serif;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}'
    +'.card{text-align:center;padding:32px;border:2px solid #000;border-radius:12px;display:inline-block}'
    +'.brand{font-size:20px;font-weight:700;margin-bottom:4px}'
    +'.sub{font-size:11px;color:#666;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}'
    +'.code{font-family:Consolas,monospace;font-size:18px;font-weight:700;margin-top:10px;color:#000}'
    +'.name{font-size:16px;font-weight:600;margin-top:4px}'
    +'.inst{font-size:11px;color:#666;margin-top:10px}'
    +'@media print{body{-webkit-print-color-adjust:exact}}'
    +'</style></head><body>'
    +'<div class="card">'
    +'<div class="brand">♻️ Steam House</div>'
    +'<div class="sub">Attendance QR Code</div>'
    +svg
    +'<div class="code">'+code+'</div>'
    +'<div class="name">'+name+'</div>'
    +'<div class="inst">Scan to mark attendance</div>'
    +'</div>'
    +'<'+'script>window.onload=function(){window.print();}<'+'/script>'
    +'</body></html>'
  );
  win.document.close();
};
;
