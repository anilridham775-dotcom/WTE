<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>EcoLoop Pro — Waste-to-Energy ERP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1724;color:#e2eeff;height:100vh;width:100vw;display:flex;overflow:hidden;margin:0;padding:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#2a4066;border-radius:3px}
#sb{width:232px;min-width:232px;background:#162033;border-right:1px solid rgba(100,160,255,.1);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{background:#162033;border-bottom:1px solid rgba(100,160,255,.1);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#ct{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;background:#0f1724;width:100%;box-sizing:border-box}
.ni{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12px;color:#5a7a9a;border-left:2px solid transparent}
.ni:hover{background:rgba(255,255,255,.03);color:#8ab0d0}
.ni.on{color:#00e676;border-left-color:#00e676;background:rgba(0,230,118,.07)}
.nh{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#2e4a65;padding:8px 16px 3px}
.card{background:#162033;border:1px solid rgba(100,160,255,.1);border-radius:12px;overflow:hidden;margin-bottom:0}
.ch{padding:11px 15px;border-bottom:1px solid rgba(100,160,255,.1);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct2{font-size:13px;font-weight:600;color:#e2eeff}
.cb{padding:14px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px}
.sc{background:#162033;border:1px solid rgba(100,160,255,.1);border-radius:12px;padding:13px 14px;border-top:2px solid var(--c)}
.sl{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#5a7a9a}
.sv{font-size:22px;font-weight:700;margin:5px 0 2px;font-family:Consolas,monospace;color:var(--c)}
.ss{font-size:10.5px;color:#5a7a9a}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600}
.bg{background:rgba(0,230,118,.15);color:#00e676}.ba{background:rgba(255,152,0,.15);color:#ff9800}.br{background:rgba(244,67,54,.15);color:#f44336}.bb{background:rgba(33,150,243,.15);color:#2196f3}.bgr{background:rgba(255,255,255,.08);color:#5a7a9a}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#5a7a9a;font-weight:600;border-bottom:1px solid rgba(100,160,255,.15)}
td{padding:9px 12px;color:#8ab0d0;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
.prog{height:5px;background:#243858;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid rgba(100,160,255,.15);background:#243858;color:#e2eeff;font-family:inherit;font-size:12px;cursor:pointer}
.btn-g{background:#00e676;border-color:#00e676;color:#000;font-weight:700}
.btn-sm{padding:4px 9px;font-size:11px}
.alert{padding:9px 13px;border-radius:8px;font-size:12.5px;border-left:3px solid;margin-bottom:4px}
.al-r{background:rgba(244,67,54,.07);border-color:#f44336;color:#f44336}
.al-a{background:rgba(255,152,0,.07);border-color:#ff9800;color:#ff9800}
.al-g{background:rgba(0,230,118,.07);border-color:#00e676;color:#00e676}
.al-b{background:rgba(33,150,243,.07);border-color:#2196f3;color:#2196f3}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#162033;border:1px solid rgba(100,160,255,.15);border-radius:16px;width:580px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.mh{padding:15px 18px;border-bottom:1px solid rgba(100,160,255,.1);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#e2eeff}
.mb{padding:18px;overflow-y:auto;flex:1}
.mf{padding:12px 18px;border-top:1px solid rgba(100,160,255,.1);display:flex;justify-content:flex-end;gap:10px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl{font-size:11.5px;color:#8ab0d0;font-weight:500;margin-bottom:4px}
input,select,textarea{background:#1e3048;border:1px solid rgba(100,160,255,.15);border-radius:8px;color:#e2eeff;padding:7px 10px;font-size:12.5px;width:100%;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:#00e676}
.sec{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#5a7a9a;padding:4px 0 8px;border-bottom:1px solid rgba(100,160,255,.1);margin:14px 0 12px;grid-column:1/-1}
.full{grid-column:1/-1}
</style>
</head>
<body>
<div id="sb">
  <div style="padding:16px 16px 12px;border-bottom:1px solid rgba(100,160,255,.1)">
    <div style="font-size:22px;margin-bottom:4px">♻️</div>
    <div style="font-family:Consolas,monospace;font-size:13px;font-weight:700;color:#00e676">EcoLoop Pro</div>
    <div style="font-size:9px;color:#5a7a9a;text-transform:uppercase;letter-spacing:.5px">Waste-to-Energy ERP v3.0</div>
  </div>

  <div style="padding:10px 14px;border-top:1px solid rgba(100,160,255,.1);font-size:11px;color:#5a7a9a">
    <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#00e676;margin-right:5px"></span>System Online · v3.0

</div>
<div id="main">
  <div id="tb">
    <div>
      <div style="font-size:14px;font-weight:600;color:#e2eeff" id="ptitle">Operations Dashboard</div>

<div id="modal-container"></div>

<script>
var SB_URL='https://oddvetoasqjziohmqugg.supabase.co';
function goTrips(){go('trips');}
function goPage(p){go(p);}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}

// ── STAFF MASTER ──────────────────────────────────────────
async function renderStaff() {
  var ct = document.getElementById('ct');
  try {
    var data = await sbFetch('staff_profiles',{select:'*',order:'created_at.desc'});
    data = safeArr(data);
    var rows = data.map(function(s){
      return [
        '<strong style="font-family:Consolas,monospace;color:#00e676">'+s.staff_code+'</strong>',
        '<div style="font-weight:600;color:#e2eeff">'+s.full_name+'</div><div style="font-size:10px;color:#8ab0d0">'+s.mobile+'</div>',
        s.designation,
        s.department||'-',
        s.city||'-',
        badge(s.employment_type==='Permanent'?'g':s.employment_type==='Contract'?'a':'b', s.employment_type||'-'),
        badge(s.is_active?'g':'gr', s.is_active?'Active':'Inactive'),
        '<button class="btn btn-sm" id="es'+s.id+'">Edit</button>'
      ];
    });
    ct.innerHTML = '<div class="sg">'
      +sc('#00e676','Total Staff',data.length,'Registered')
      +sc('#00e676','Active',data.filter(function(s){return s.is_active;}).length,'')
      +sc('#2196f3','Drivers',data.filter(function(s){return s.designation==='Driver';}).length,'')
      +sc('#ff9800','Inspectors',data.filter(function(s){return s.designation==='WTE-Inspector';}).length,'')
      +'</div>'
      +card('👥 Staff Master',
        '<button class="btn btn-g btn-sm" onclick="newStaff()">+ Register Staff</button>',
        tbl(['Staff Code','Name & Mobile','Designation','Department','City','Employment','Status',''],rows),true);
    setTimeout(wireButtons,150);
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

window.newStaff = function() {
  var body = '<div class="fg">'
    +'<div class="sec">Personal Information</div>'
    +fld('Full Name',inp('sf_name','Legal full name as per Aadhaar'),true)
    +fld('Designation','<select id="sf_desig"><option>Driver</option><option>Cleaner</option><option>WTE-Inspector</option><option>WTE-Manager</option><option>Admin</option><option>Security</option></select>',true)
    +fld('Mobile',inp('sf_mobile','+91 XXXXXXXXXX'),true)
    +fld('Email',inp('sf_email','email@company.com','email'))
    +fld('Date of Birth',inp('sf_dob','','date'))
    +fld('Blood Group','<select id="sf_blood"><option value="">-</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select>')
    +fld('Gender','<select id="sf_gender"><option value="">-</option><option>Male</option><option>Female</option><option>Other</option></select>')
    +'<div class="sec">Aadhaar Details</div>'
    +fld('Aadhaar Number',inp('sf_aadhaar','XXXX XXXX XXXX'))
    +fld('Aadhaar Verified','<select id="sf_aadv"><option value="false">Pending</option><option value="true">Verified</option></select>')
    +'<div class="sec">Address</div>'
    +fld('Address Line 1',inp('sf_addr1','House/Flat, Street'),true)
    +fld('Address Line 2',inp('sf_addr2','Area, Landmark'))
    +fld('City',inp('sf_city','City'),true)
    +fld('State',inp('sf_state','State'))
    +fld('PIN Code',inp('sf_pin','400001'))
    +'<div class="sec">Emergency Contact</div>'
    +fld('Contact Name',inp('sf_ecname','Full name'))
    +fld('Contact Mobile',inp('sf_ecmob','+91 XXXXXXXXXX'))
    +fld('Relation',inp('sf_ecrel','Spouse / Parent / Sibling'))
    +'<div class="sec">Employment</div>'
    +fld('Joining Date',inp('sf_join','','date'))
    +fld('Employment Type','<select id="sf_emp"><option>Permanent</option><option>Contract</option><option>Outsourced</option></select>')
    +fld('Department',inp('sf_dept','Operations / Fleet / Compliance'))
    +fld('Reporting To',inp('sf_report','Manager name'))
    +'</div>';
  var foot = '<button class="btn btn-sm" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-g btn-sm" onclick="saveStaff()">Register Staff</button>';
  modal('👥 Register Staff Member',body,foot);
};

window.saveStaff = async function() {
  var name=gv('sf_name'),mobile=gv('sf_mobile'),desig=gv('sf_desig'),city=gv('sf_city'),addr=gv('sf_addr1');
  if(!name||!mobile||!desig||!addr||!city){alert('Name, mobile, designation, address and city required.');return;}
  try {
    var code = await sbRpc('next_staff_code');
    await sbInsert('staff_profiles',{
      staff_code:code, full_name:name, designation:desig, mobile:mobile,
      email:gv('sf_email')||null, date_of_birth:gv('sf_dob')||null,
      blood_group:gv('sf_blood')||null, gender:gv('sf_gender')||null,
      aadhaar_no:gv('sf_aadhaar')||null, aadhaar_verified:gv('sf_aadv')==='true',
      address_line1:addr, address_line2:gv('sf_addr2')||null,
      city:city, state:gv('sf_state')||null, pincode:gv('sf_pin')||null,
      emergency_contact_name:gv('sf_ecname')||null,
      emergency_contact_mobile:gv('sf_ecmob')||null,
      emergency_contact_relation:gv('sf_ecrel')||null,
      joining_date:gv('sf_join')||null, employment_type:gv('sf_emp'),
      department:gv('sf_dept')||null, reporting_to:gv('sf_report')||null,
      is_active:true
    });
    closeModal();
    setTimeout(function(){var s=document.createElement('div');s.className='alert al-g';s.textContent='Staff '+code+' registered!';document.getElementById('ct').prepend(s);setTimeout(function(){s.remove();},4000);},100);
    renderStaff();
  } catch(e){alert('Error: '+e.message);}
};

// ── ROLE PERMISSIONS ──────────────────────────────────────
async function renderRoles() {
  var ct = document.getElementById('ct');
  try {
    var data = await sbFetch('role_permissions',{select:'*',order:'role'});
    data = safeArr(data);
    var roles = ['admin','manager','inspector','driver','generator'];
    var modules = ['dashboard','generators','bins','trips','billing','drivers','vehicles','cleaning','pm','rm','fuel','tyres','reports','users'];

    var html = '<div class="card"><div class="ch"><span class="ct2">🔐 Role Permissions Matrix</span>'
      +'<div style="font-size:11px;color:#8ab0d0">Green = Allowed · Click to toggle</div></div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:600px">'
      +'<thead><tr style="border-bottom:1px solid rgba(100,160,255,.15)">'
      +'<th style="text-align:left;padding:8px 12px;color:#8ab0d0;font-size:10px;text-transform:uppercase">Module</th>'
      +roles.map(function(r){return '<th style="text-align:center;padding:8px 12px;color:#8ab0d0;font-size:10px;text-transform:uppercase">'+r.toUpperCase()+'</th>';}).join('')
      +'</tr></thead><tbody>';

    modules.forEach(function(mod){
      html += '<tr style="border-bottom:1px solid rgba(100,160,255,.08)">'
        +'<td style="padding:8px 12px;font-weight:600;color:#e2eeff">'+mod+'</td>';
      roles.forEach(function(role){
        var perm = data.find(function(p){return p.role===role&&p.module===mod;});
        var hasView = perm&&perm.can_view;
        html += '<td style="text-align:center;padding:8px 12px">'
          +'<span style="display:inline-flex;flex-direction:column;gap:3px;align-items:center">'
          +(hasView?'<span style="color:#00e676;font-size:16px">✓</span>':'<span style="color:#2a4066;font-size:16px">✗</span>')
          +(perm&&perm.can_create?'<span style="font-size:9px;color:#00e676">CREATE</span>':'')
          +(perm&&perm.can_approve?'<span style="font-size:9px;color:#ff9800">APPROVE</span>':'')
          +'</span></td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    ct.innerHTML = html;
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

// ── GENERATOR REQUESTS ────────────────────────────────────
async function renderGenRequests() {
  var ct = document.getElementById('ct');
  try {
    var data = await sbFetch('generator_requests',{select:'*',order:'created_at.desc'});
    data = safeArr(data);
    var rows = data.map(function(r){
      return [
        '<strong style="font-family:Consolas,monospace;color:#00e676">'+r.request_code+'</strong>',
        '<div style="font-weight:600;color:#e2eeff">'+r.company_name+'</div><div style="font-size:10px;color:#8ab0d0">'+r.industry_type+'</div>',
        r.contact_person,
        '<span style="font-family:Consolas,monospace;font-size:11px">'+r.mobile+'</span>',
        r.city||'-',
        r.waste_category||'-',
        badge(r.status==='Approved'?'g':r.status==='Rejected'?'r':'a',r.status),
        new Date(r.created_at).toLocaleDateString('en-IN'),
        r.status==='Pending'
          ? '<button class="btn btn-sm" id="edr'+r.id+'" style="cursor:pointer;margin-right:4px">✏️ Edit</button>'
            +'<button class="btn btn-sm" style="background:#00e676;color:#000;border-color:#00e676" id="apr'+r.id+'">✓ Approve</button> '
            +'<button class="btn btn-sm" style="background:#f44336;color:#fff;border-color:#f44336" id="rej'+r.id+'">✗ Reject</button>'
          : badge(r.status==='Approved'?'g':'r',r.status)
      ];
    });
    var regUrl = window.location.origin + (window.location.pathname||'/') + '?register=generator';
    ct.innerHTML = '<div class="sg">'
      +sc('#ff9800','Pending',data.filter(function(r){return r.status==='Pending';}).length,'Awaiting review')
      +sc('#00e676','Approved',data.filter(function(r){return r.status==='Approved';}).length,'Active')
      +sc('#f44336','Rejected',data.filter(function(r){return r.status==='Rejected';}).length,'')
      +'</div>'
      +'<div style="background:#1a2840;border:1px solid rgba(100,160,255,.15);border-radius:12px;padding:14px;margin-bottom:14px">'
      +'<div style="font-size:12px;font-weight:600;color:#e2eeff;margin-bottom:6px">🔗 Generator Self-Registration URL — Share this with Generators</div>'
      +'<div style="font-family:Consolas,monospace;font-size:12px;color:#00e676;background:#0f1724;padding:10px;border-radius:6px;word-break:break-all" id="reg-url">'+regUrl+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:8px">'
      +'<button class="btn btn-sm btn-g" onclick="navigator.clipboard.writeText(document.getElementById(\'reg-url\').textContent).then(function(){alert(\'URL copied!\');})">📋 Copy URL</button>'
      +'<button class="btn btn-sm" onclick="window.open(document.getElementById(\'reg-url\').textContent,\'_blank\')">🔗 Open Form</button>'
      +'</div>'
      +'<div style="font-size:11px;color:#8ab0d0;margin-top:8px">When approved: Generator created + Bin auto-allocated + Login account created automatically.</div>'
      +'</div>'
      +card('📋 Generator Registration Requests',
        '<button class="btn btn-g btn-sm" onclick="showGenRegForm()">+ Manual Add Request</button>',
        tbl(['Req.Code','Company','Contact','Mobile','City','Waste Cat.','Status','Date','Action'],rows),true);
    setTimeout(function(){
      document.querySelectorAll('[id^="apr"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){approveGen(id);};});
      document.querySelectorAll('[id^="rej"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){rejectGen(id);};});
      document.querySelectorAll('[id^="edr"]').forEach(function(b){var id=b.id.slice(3);b.onclick=function(){editGenRequest(id);};});
    },150);
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

window.editGenRequest = async function(id) {
  var req = await sbFetch('generator_requests',{select:'*',eq:{id:id}});
  var r = req[0]; if(!r) return;

  var body = '<div class="fg">'
    +'<div style="grid-column:1/-1;padding:8px 12px;background:rgba(255,152,0,.08);border-left:3px solid #ff9800;border-radius:6px;font-size:12px;color:#ff9800;margin-bottom:4px">Editing request '+r.request_code+' — changes will be saved before approval</div>'
    +'<div class="sec">Company Information</div>'
    +fld('Company Name','<input id="er_name" value="'+(r.company_name||'').replace(/"/g,"&quot;")+'">',true)
    +fld('Industry Type','<select id="er_ind"><option>Chemical</option><option>Petrochemical</option><option>Textile</option><option>Pharmaceutical</option><option>Metal/Foundry</option><option>Food Processing</option><option>Cement</option><option>Refinery</option><option>Power Plant</option><option>Other</option></select>')
    +fld('Contact Person','<input id="er_contact" value="'+(r.contact_person||'').replace(/"/g,"&quot;")+'">',true)
    +fld('Mobile','<input id="er_mobile" value="'+(r.mobile||'').replace(/"/g,"&quot;")+'">',true)
    +fld('Email','<input id="er_email" type="email" value="'+(r.email||'').replace(/"/g,"&quot;")+'">') 
    +fld('GSTIN','<input id="er_gstin" value="'+(r.gstin||'').replace(/"/g,"&quot;")+'">') 
    +'<div class="sec">PCB Authorization</div>'
    +fld('PCB Auth No.','<input id="er_pcb" value="'+(r.pcb_auth_no||'').replace(/"/g,"&quot;")+'">') 
    +fld('PCB Expiry','<input id="er_pcbexp" type="date" value="'+(r.pcb_expiry||'')+'">') 
    +'<div class="sec">Address</div>'
    +'<div class="full">'+fld('Address','<input id="er_addr" value="'+(r.address||'').replace(/"/g,"&quot;")+'">',true)+'</div>'
    +fld('City','<input id="er_city" value="'+(r.city||'').replace(/"/g,"&quot;")+'">',true)
    +fld('State','<input id="er_state" value="'+(r.state||'').replace(/"/g,"&quot;")+'">') 
    +fld('PIN Code','<input id="er_pin" value="'+(r.pincode||'').replace(/"/g,"&quot;")+'">') 
    +'<div class="sec">GPS Location</div>'
    +'<div class="full"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:11.5px;color:#9ab8d4">Plant GPS Coordinates</span><button type="button" onclick="detectGenLocation()" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(100,160,255,.3);background:#1e3048;color:#00e676;cursor:pointer;font-size:11px;font-family:inherit">🎯 Auto-Detect</button></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="g_lat" placeholder="Latitude" value="'+(r.latitude||'')+'"><input id="g_lng" placeholder="Longitude" value="'+(r.longitude||'')+'"></div>'
    +'<div id="gen-loc-status" style="font-size:11px;color:#8ab0d0;margin-top:4px"></div>'
    +(r.latitude&&r.longitude?'<div style="margin-top:4px"><a href="https://www.google.com/maps?q='+r.latitude+','+r.longitude+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ Current location on Maps →</a></div>':'')
    +'</div>'

window.approveGen = async function(id) {
  var notes = prompt('Approval notes (optional):') || 'Approved';
  try {
    var req = await sbFetch('generator_requests',{select:'*',eq:{id:id}});
    var r = req[0]; if(!r) return;

    // Step 1: Create Generator
    var genCode = await sbRpc('next_gen_code');
    var genResult = await sbInsert('generators',{
      gen_code:genCode, company_name:r.company_name, industry_type:r.industry_type,
      contact_person:r.contact_person, mobile:r.mobile, email:r.email,
      gstin:r.gstin, pcb_auth_no:r.pcb_auth_no, pcb_expiry:r.pcb_expiry,
      address:r.address, city:r.city, state:r.state, pincode:r.pincode,
      avg_waste_per_day:r.avg_waste_per_day, waste_category:r.waste_category,
      is_active:true
    });
    var genId = genResult[0] && genResult[0].id;

    // Step 2: Auto-allocate a default bin
    var binCode = await sbRpc('next_bin_code');
    var wasteCategory = r.waste_category || 'Non-Hazardous';
    var binType = wasteCategory === 'Hazardous' ? 'B' : 'A';
    await sbInsert('bins',{
      bin_code:binCode,
      generator_id:genId,
      operation_type:binType,
      container_category:'Wheelie Bin — 240L',
      body_material:'HDPE Plastic',
      capacity_kg:220,
      waste_category:wasteCategory,
      hazard_class:'Not applicable',
      zone:'Main Gate',
      tag_technology:'QR Code',
      fill_alert_threshold:80,
      alert_channel:'WhatsApp+SMS',
      current_fill_pct:0,
      status:'Active'
    });

    // Step 3: Create login account for generator contact
    if(r.email){
      var defaultPin = r.mobile ? r.mobile.slice(-4) : '0000';
      try {
        await sbInsert('user_roles',{
          full_name:r.contact_person,
          email:r.email,
          phone:r.mobile,
          role:'generator',
          pin:defaultPin,
          is_active:true
        });
      } catch(ue){ console.warn('Login not created:',ue); }
    }

    // Step 4: Update request status
    await sbUpdate('generator_requests',{
      status:'Approved',
      review_notes:notes,
      reviewed_at:new Date().toISOString()
    },{id:id});

    // Show success
    var msg = '✅ Generator '+genCode+' approved!\n'
      +'📦 Bin '+binCode+' auto-allocated\n'
      +(r.email ? '🔑 Login created: '+r.email+' / PIN: '+r.mobile.slice(-4) : '');
    alert(msg);
    renderGenRequests();
  } catch(e){alert('Error: '+e.message);}
};

async function renderPayments() {
  var ct = document.getElementById('ct');
  try {
    var [payments, invoices] = await Promise.all([
      sbFetch('payments',{select:'*',order:'created_at.desc',limit:50}),
      sbFetch('invoices',{select:'id,invoice_no,total_amount,payment_status,generators(company_name)',eq:{payment_status:'Pending'},order:'invoice_date.desc',limit:50}),
    ]);
    payments=safeArr(payments); invoices=safeArr(invoices);

    var totalPaid = payments.reduce(function(s,p){return s+(p.amount||0);},0);
    var pendingAmt = invoices.reduce(function(s,i){return s+(i.total_amount||0);},0);

    var payRows = payments.map(function(p){
      return [
        '<strong style="font-family:Consolas,monospace">'+p.payment_code+'</strong>',
        p.payment_date,
        '₹'+Number(p.amount).toLocaleString('en-IN'),
        p.payment_mode||'-',
        p.transaction_ref||'-',
        p.bank_name||'-',
        p.remarks||'-'
      ];
    });

    ct.innerHTML = '<div class="sg">'
      +sc('#00e676','Total Collected','₹'+(totalPaid/100000).toFixed(2)+'L','All time')
      +sc('#ff9800','Pending','₹'+(pendingAmt/100000).toFixed(2)+'L','Unpaid invoices')
      +sc('#2196f3','Payments',payments.length,'Recorded')
      +'</div>'
      +'<div class="card" style="margin-bottom:14px"><div class="ch"><span class="ct2">⏳ Pending Invoices</span></div><div class="cb">'
      +tbl(['Invoice','Generator','Amount','Action'],
        invoices.map(function(i){
          return [
            '<strong style="font-family:Consolas,monospace;color:#00e676">'+i.invoice_no+'</strong>',
            (i.generators&&i.generators.company_name)||'-',
            '₹'+Number(i.total_amount||0).toLocaleString('en-IN'),
            '<button class="btn btn-sm btn-g" id="pay'+i.id+'">Record Payment</button>'
          ];
        }))
      +'</div></div>'
      +card('💳 Payment Records','<button class="btn btn-g btn-sm" onclick="newPayment()">+ Record Payment</button>',tbl(['Payment Code','Date','Amount','Mode','Txn Ref','Bank','Remarks'],payRows),true);
    setTimeout(function(){
      document.querySelectorAll('[id^="pay"]').forEach(function(b){
        var id=b.id.slice(3);
        var inv=invoices.find(function(i){return i.id===id;});
        b.onclick=function(){newPaymentForInvoice(id,inv);};
      });
    },150);
  } catch(e){ ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

window.detectLocation = function() {
  var status = document.getElementById('loc-status');
  if(!status) return;
  status.textContent = '🔄 Detecting location...';
  if(!navigator.geolocation) {
    status.textContent = '❌ GPS not supported. Please enter manually.';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude.toFixed(6);
      var lng = pos.coords.longitude.toFixed(6);
      var latEl = document.getElementById('pg_lat');
      var lngEl = document.getElementById('pg_lng');
      if(latEl) latEl.value = lat;
      if(lngEl) lngEl.value = lng;
      status.innerHTML = '✅ Location detected! Accuracy: ±' + Math.round(pos.coords.accuracy) + 'm';
      var mapsEl = document.getElementById('maps-link');
      if(mapsEl) {
        mapsEl.innerHTML = '<a href="https://www.google.com/maps?q=' + lat + ',' + lng + '" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ View on Google Maps →</a>';
      }
    },
    function(err) {
      var msgs = {1:'Permission denied — please allow location access',2:'Position unavailable',3:'Timeout'};
      status.textContent = '❌ ' + (msgs[err.code] || 'Error detecting location');
    },
    {enableHighAccuracy:true, timeout:10000}
  );
};

// ── AUTO TRIP PLANNER ─────────────────────────────────────
async function autoTripPlanner() {
  // Find all bins >= 95% that don't have a pending/active trip
  var criticalBins = await sbFetch('bins',{select:'*,generators(company_name,address,city,latitude,longitude)',order:'current_fill_pct.desc'});
  criticalBins = safeArr(criticalBins).filter(function(b){ return b.current_fill_pct >= 95 && b.status !== 'In Transit'; });

  if(criticalBins.length === 0) {
    return {triggered:false, message:'No bins at critical level (95%+)'};
  }

  // Find available vehicles (status Active, no active trip today)
  var vehicles = await sbFetch('vehicles',{select:'*',eq:{status:'Active'}});
  vehicles = safeArr(vehicles);

  // Find vehicles with checklist done today (vehicle ready)
  var today = new Date().toISOString().split('T')[0];
  var checklists = await sbFetch('vehicle_checklist',{select:'vehicle_id,vehicle_ready',eq:{check_date:today}});
  var readyVehicleIds = safeArr(checklists).filter(function(c){return c.vehicle_ready;}).map(function(c){return c.vehicle_id;});

  var readyVehicles = vehicles.filter(function(v){ return readyVehicleIds.includes(v.id); });

  if(readyVehicles.length === 0) {
    return {triggered:false, message:'No vehicles have completed pre-trip checklist today. Drivers must complete 360 degree check first.'};
  }

  // Create trip for each critical bin group
  var tripsCreated = [];
  var vIdx = 0;

  for(var i=0; i<criticalBins.length; i++) {
    var bin = criticalBins[i];
    var vehicle = readyVehicles[vIdx % readyVehicles.length];
    vIdx++;

    try {
      var tripCode = await sbRpc('next_trip_code');
      var tripResult = await sbInsert('trips',{
        trip_code: tripCode,
        vehicle_id: vehicle.id,
        driver_id: vehicle.drivers ? vehicle.drivers.id : null,
        trip_date: today,
        route_priority: 'Urgent Fill First',
        instructions: 'AUTO-PLANNED: Bin '+bin.bin_code+' at '+bin.current_fill_pct+'% capacity. Urgent pickup required. Generator: '+(bin.generators ? bin.generators.company_name : ''),
        status: 'Planned',
        auto_planned: true
      });

      var tripId = tripResult[0] && tripResult[0].id;
      if(tripId) {
        await sbInsert('trip_pickups',{trip_id:tripId, bin_id:bin.id, sequence_no:1, status:'Pending'});
        await sbUpdate('bins',{status:'Trip Planned'},{id:bin.id});
        tripsCreated.push({trip:tripCode, bin:bin.bin_code, vehicle:vehicle.reg_no, driver:vehicle.drivers ? vehicle.drivers.full_name : 'Unassigned', fill:bin.current_fill_pct});
      }
    } catch(e) {
      console.error('Auto plan error:', e);
    }
  }

  return {triggered:true, trips:tripsCreated};
}

window.doGenUpdateFill = async function(binId) {
  var pct = parseInt(document.getElementById('gf_pct').value);
  if(isNaN(pct)||pct<0||pct>100){alert('Please enter a valid fill level (0-100).');return;}
  try {
    var newStatus = pct >= 95 ? 'Critical' : pct >= 80 ? 'Warning' : 'Active';
    await sbUpdate('bins',{current_fill_pct:pct, status:newStatus},{id:binId});
    await sbInsert('bin_fill_readings',{bin_id:binId,fill_pct:pct,data_source:'GENERATOR-PORTAL',notes:document.getElementById('gf_note').value||null,supervisor_pin_verified:false});
    
    // Remove overlay
    document.querySelectorAll('div[style*="position:fixed"]').forEach(function(el){el.remove();});
    
    // Show success flash
    var flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#00e676;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap';
    flash.textContent = 'Fill level updated to '+pct+'%'+(pct>=95?' — Pickup alert triggered!':'');
    document.body.appendChild(flash);
    setTimeout(function(){flash.remove();},3000);

    // If critical, auto-trigger planner
    if(pct >= 95) {
      setTimeout(autoTripPlanner, 500);
    }
    
    renderGeneratorPortal();
  } catch(e){alert('Error: '+e.message);}
};

window.genRequestPickup = async function(binId, binCode) {
  if(!confirm('Request urgent pickup for bin '+binCode+'?\n\nThis will notify EcoLoop operations team immediately.')) return;
  try {
    // Mark bin as critical
    await sbUpdate('bins',{status:'Critical'},{id:binId});
    // Auto-trigger planner
    var result = await autoTripPlanner();
    
    var msg = '🚨 Pickup request submitted for '+binCode+'!\n\n';
    if(result.triggered && result.trips.length > 0) {
      msg += 'Trip automatically created: '+result.trips[0].trip+'\nVehicle: '+result.trips[0].vehicle+'\nDriver: '+result.trips[0].driver;
    } else {
      msg += 'Operations team has been notified. A vehicle will be assigned shortly.';
    }
    alert(msg);
    renderGeneratorPortal();
  } catch(e){alert('Error: '+e.message);}
};

window.detectSiteLocation = function() {
  var status = document.getElementById('site-loc-status');
  var mapsEl = document.getElementById('site-maps-link');
  if(status) status.textContent = 'Detecting...';
  if(!navigator.geolocation){if(status)status.textContent='GPS not supported';return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
      var le=document.getElementById('st_lat'); var lne=document.getElementById('st_lng');
      if(le) le.value=lat; if(lne) lne.value=lng;
      if(status) status.innerHTML='✅ Detected! Accuracy: ±'+Math.round(pos.coords.accuracy)+'m';
      if(mapsEl) mapsEl.innerHTML='<a href="https://www.google.com/maps?q='+lat+','+lng+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ Verify on Google Maps →</a>';
    },
    function(e){if(status)status.textContent='Error: '+(e.code===1?'Permission denied':'Could not detect');},
    {enableHighAccuracy:true,timeout:10000}
  );
};

// ── QR CODE GENERATOR & ATTENDANCE SYSTEM ─────────────────

// Generate QR code as SVG (simple QR-like visual with encoded data)
function generateQRSVG(text, size) {
  size = size || 200;
  // Create a simple visual QR placeholder with the code text
  // In production this would use a QR library
  var hash = 0;
  for(var i=0;i<text.length;i++) hash = ((hash<<5)-hash)+text.charCodeAt(i);
  hash = Math.abs(hash);
  
  var cells = 21;
  var cell = Math.floor(size/cells);
  var svg = '<svg width="'+size+'" height="'+size+'" xmlns="http://www.w3.org/2000/svg" style="background:#fff">';
  
  // Border
  svg += '<rect x="0" y="0" width="'+size+'" height="'+size+'" fill="#fff"/>';
  svg += '<rect x="2" y="2" width="'+(size-4)+'" height="'+(size-4)+'" fill="none" stroke="#000" stroke-width="2"/>';
  
  // Position detection patterns (corners)
  var corners = [[1,1],[1,cells-8],[cells-8,1]];
  corners.forEach(function(c) {
    var x=c[0]*cell, y=c[1]*cell;
    svg += '<rect x="'+x+'" y="'+y+'" width="'+(7*cell)+'" height="'+(7*cell)+'" fill="#000"/>';
    svg += '<rect x="'+(x+cell)+'" y="'+(y+cell)+'" width="'+(5*cell)+'" height="'+(5*cell)+'" fill="#fff"/>';
    svg += '<rect x="'+(x+2*cell)+'" y="'+(y+2*cell)+'" width="'+(3*cell)+'" height="'+(3*cell)+'" fill="#000"/>';
  });
  
  // Data pattern based on hash
  for(var r=0;r<cells;r++) {
    for(var c2=0;c2<cells;c2++) {
      if((r<9&&c2<9)||(r<9&&c2>cells-9)||(r>cells-9&&c2<9)) continue;
      var bit = (hash >> ((r*cells+c2)%32)) & 1;
      var extra = (text.charCodeAt((r+c2)%text.length)>>((r*c2)%8))&1;
      if((bit^extra)==1) {
        svg += '<rect x="'+(c2*cell)+'" y="'+(r*cell)+'" width="'+cell+'" height="'+cell+'" fill="#000"/>';
      }
    }
  }
  
  // Center text
  svg += '<rect x="'+(size/2-30)+'" y="'+(size/2-10)+'" width="60" height="20" fill="#fff"/>';
  svg += '<text x="'+(size/2)+'" y="'+(size/2+5)+'" text-anchor="middle" font-size="9" font-family="Consolas,monospace" fill="#000">'+text+'</text>';
  svg += '</svg>';
  return svg;
}

window.detectQRLocation = function() {
  var status=document.getElementById('qr-loc-status');
  var mapsEl=document.getElementById('qr-maps-link');
  if(status) status.textContent='Detecting...';
  if(!navigator.geolocation){if(status)status.textContent='GPS not supported';return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);
      var le=document.getElementById('ql_lat');var lne=document.getElementById('ql_lng');
      if(le)le.value=lat;if(lne)lne.value=lng;
      if(status)status.innerHTML='✅ Detected! ±'+Math.round(pos.coords.accuracy)+'m';
      if(mapsEl)mapsEl.innerHTML='<a href="https://www.google.com/maps?q='+lat+','+lng+'" target="_blank" style="font-size:11px;color:#00e676;text-decoration:none">🗺️ Verify on Maps →</a>';
    },
    function(e){if(status)status.textContent='Error: '+(e.code===1?'Permission denied':'Failed');},
    {enableHighAccuracy:true,timeout:10000}
  );
};

window.processQRPunch = async function(punchType) {
  var qrCode = gv('qr-input').trim().toUpperCase();
  if(!qrCode){alert('Please enter QR code.');return;}
  
  try {
    // Find QR location
    var locs = await sbFetch('qr_locations',{select:'*',eq:{qr_code:qrCode,is_active:'true'}});
    var loc = safeArr(locs)[0];
    if(!loc){
      document.getElementById('scan-result').innerHTML = '<div style="color:#f44336;padding:10px;background:rgba(244,67,54,.08);border-radius:8px">❌ Invalid QR code: '+qrCode+'</div>';
      return;
    }

    // Get current GPS
    var lat=null, lng=null, gpsVerified=false, distance=null;
    if(navigator.geolocation) {
      await new Promise(function(resolve){
        navigator.geolocation.getCurrentPosition(
          function(pos){
            lat=pos.coords.latitude; lng=pos.coords.longitude;
            // Check if within radius
            if(loc.latitude&&loc.longitude) {
              var R=6371000;
              var dLat=(loc.latitude-lat)*Math.PI/180;
              var dLon=(loc.longitude-lng)*Math.PI/180;
              var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat*Math.PI/180)*Math.cos(loc.latitude*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
              distance=Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
              gpsVerified=distance<=(loc.radius_meters||50);
            } else {
              gpsVerified=true; // No GPS set on location, trust the QR
            }
            resolve();
          },
          function(){resolve();},
          {enableHighAccuracy:true,timeout:5000}
        );
      });
    }

    // Record attendance
    await sbInsert('attendance',{
      user_role_id:CURRENT_USER?CURRENT_USER.id:null,
      qr_location_id:loc.id,
      punch_type:punchType,
      punch_time:new Date().toISOString(),
      latitude:lat, longitude:lng,
      gps_verified:gpsVerified,
      distance_from_qr:distance
    });

    var msg = punchType==='IN'
      ? '<div style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);border-radius:8px;padding:14px;text-align:center"><div style="font-size:28px;margin-bottom:6px">✅</div><div style="font-size:14px;font-weight:700;color:#00e676">Punched IN Successfully!</div><div style="font-size:12px;color:#8ab0d0;margin-top:4px">Location: '+loc.location_name+'</div><div style="font-size:12px;color:#8ab0d0">Time: '+new Date().toLocaleTimeString('en-IN')+'</div>'+(gpsVerified?'<div style="font-size:11px;color:#00e676;margin-top:4px">📍 GPS Verified ('+distance+'m from location)</div>':'<div style="font-size:11px;color:#ff9800;margin-top:4px">⚠️ GPS not verified</div>')+'</div>'
      : '<div style="background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.2);border-radius:8px;padding:14px;text-align:center"><div style="font-size:28px;margin-bottom:6px">👋</div><div style="font-size:14px;font-weight:700;color:#f44336">Punched OUT</div><div style="font-size:12px;color:#8ab0d0;margin-top:4px">Location: '+loc.location_name+'</div><div style="font-size:12px;color:#8ab0d0">Time: '+new Date().toLocaleTimeString('en-IN')+'</div></div>';

    document.getElementById('scan-result').innerHTML = msg;
    setTimeout(renderAttendance, 2000);
  } catch(e){alert('Error: '+e.message);}
};

function safeArr(d){
  if(!d) return [];
  if(Array.isArray(d)) return d;
  if(d.data && Array.isArray(d.data)) return d.data;
  if(typeof d === 'object' && d.message) { console.error('Supabase err:',d.message,d.hint||''); return []; }
  return [];
}
var SB_KEY='sb_publishable_5Z2PrRqnJ8gLiG12KmecCQ_m4VyDFaB';

async function sbFetch(table,opts){
  opts=opts||{};
  var url=SB_URL+'/rest/v1/'+table;
  var params=[];
  if(opts.select) params.push('select='+encodeURIComponent(opts.select));
  if(opts.eq) Object.keys(opts.eq).forEach(k=>params.push(k+'=eq.'+encodeURIComponent(opts.eq[k])));
  if(opts.gte) Object.keys(opts.gte).forEach(k=>params.push(k+'=gte.'+encodeURIComponent(opts.gte[k])));
  if(opts.order) params.push('order='+opts.order);
  if(opts.limit) params.push('limit='+opts.limit);
  if(params.length) url+='?'+params.join('&');
  var r=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Accept':'application/json'}});
  if(!r.ok){ console.error('Supabase error',r.status,table); return []; }
  var data=await r.json();
  return safeArr(data);
}

async function sbInsert(table,data){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation','Accept':'application/json'},body:JSON.stringify(Array.isArray(data)?data:[data])});
  if(!r.ok){var e=await r.json();throw new Error(e.message||e.hint||'Insert failed');}
  return r.json();
}

async function sbUpdate(table,data,eq){
  var url=SB_URL+'/rest/v1/'+table+'?'+Object.keys(eq).map(k=>k+'=eq.'+eq[k]).join('&');
  var r=await fetch(url,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  return r.json();
}

async function sbRpc(fn){
  var r=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Accept':'application/json'},body:'{}'});
  if(!r.ok){var e=await r.json();throw new Error(e.message||'RPC failed');}
  return r.json();
}

function fc(p){return p>=80?'#f44336':p>=60?'#ff9800':'#00e676';}

function prog(p,c){return '<div class="prog"><div class="pf" style="width:'+Math.min(p,100)+'%;background:'+(c||fc(p))+'"></div></div>';}
function card(title,extra,body,np){return '<div class="card"><div class="ch"><span class="ct2">'+title+'</span>'+(extra||'')+'</div><div class="'+(np?'':'cb')+'">'+body+'</div></div>';}
function sc(color,label,val,sub){return '<div class="sc" style="--c:'+color+'"><div class="sl">'+label+'</div><div class="sv">'+val+'</div><div class="ss">'+sub+'</div></div>';}
function tbl(heads,rows){
  var h=heads.map(h=>'<th>'+h+'</th>').join('');
  var r=rows.map(row=>'<tr>'+row.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('');
  return '<div style="overflow-x:auto"><table><thead><tr>'+h+'</tr></thead><tbody>'+r+'</tbody></table></div>';
}
function fld(label,html,req){return '<div><div class="fl">'+label+(req?'<span style="color:#f44336;margin-left:2px">*</span>':'')+'</div>'+html+'</div>';}
function inp(id,ph,type){return '<input id="'+id+'" type="'+(type||'text')+'" placeholder="'+(ph||'')+'">';}

window.saveDriver=async function(){

// Global driver state
var DRIVER_LOCATION = null;
var DRIVER_RECORD = null;
var CHECKLIST_DONE_TODAY = false;

function captureDriverLocation() {
  return new Promise(function(resolve) {
    if(!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        DRIVER_LOCATION = {lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,timestamp:new Date().toISOString()};
        resolve(DRIVER_LOCATION);
      },
      function() { resolve(null); },
      {enableHighAccuracy:true,timeout:8000}
    );
  });
}

async function showDriverApp() {
  var user = CURRENT_USER;
  document.body.innerHTML = '';
  document.body.style.cssText = 'font-family:Segoe UI,Arial,sans-serif;background:#0f1724;color:#e2eeff;margin:0;min-height:100vh';
  document.body.innerHTML =
    '<div style="background:#162033;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(100,160,255,.1);position:sticky;top:0;z-index:10">'
    +'<div><div style="font-family:Consolas,monospace;font-size:15px;font-weight:700;color:#00e676">♻️ EcoLoop Pro</div>'
    +'<div style="font-size:11px;color:#8ab0d0">Driver App · '+user.full_name+'</div></div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div id="gps-badge" style="font-size:10px;padding:3px 8px;border-radius:20px;background:rgba(255,152,0,.15);color:#ff9800">📍 Getting GPS...</div>'
    +'<button onclick="doLogout()" style="background:none;border:1px solid rgba(100,160,255,.15);color:#8ab0d0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px">Logout</button>'
    +'</div></div>'
    +'<div id="driver-content" style="padding:16px;display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto"></div>';

  // Capture GPS
  var loc = await captureDriverLocation();
  var gpsBadge = document.getElementById('gps-badge');
  if(loc && gpsBadge) {
    gpsBadge.style.background='rgba(0,230,118,.15)';gpsBadge.style.color='#00e676';
    gpsBadge.textContent='📍 GPS Active ±'+Math.round(loc.accuracy)+'m';
  } else if(gpsBadge) {
    gpsBadge.style.background='rgba(244,67,54,.15)';gpsBadge.style.color='#f44336';
    gpsBadge.textContent='📍 GPS Unavailable';
  }

  // Get driver record
  var drvData = await sbFetch('drivers',{select:'*',eq:{mobile:user.phone||''}});
  DRIVER_RECORD = safeArr(drvData)[0]||null;

  // Check if today checklist done - first check localStorage (fast)
  var today = new Date().toISOString().split('T')[0];
  var savedCheckDate = localStorage.getItem('checklist_date');
  if(savedCheckDate === today) {
    CHECKLIST_DONE_TODAY = true;
    renderDriverHome();
    return;
  }
  // Then check database
  var todayCheck = await sbFetch('vehicle_checklist',{select:'id,vehicle_ready',eq:{check_date:today},limit:1});
  CHECKLIST_DONE_TODAY = safeArr(todayCheck).some(function(c){return c.vehicle_ready;});
  if(CHECKLIST_DONE_TODAY) {
    localStorage.setItem('checklist_date', today);
  }
  if(!CHECKLIST_DONE_TODAY) {
    showMandatoryChecklist();
  } else {
    renderDriverHome();
  }
}

function showMandatoryChecklist() {

window.toggleCheck=function(id){
  var state=window._checkState||{};
  state[id]=!state[id];
  window._checkState=state;
  var chkEl=document.getElementById('chk-'+id);
  var lblEl=document.getElementById('lbl-'+id);
  var def=(window._checkDefs||[]).find(function(c){return c.id===id;});
  if(state[id]){
    chkEl.style.background='#00e676';chkEl.style.borderColor='#00e676';chkEl.innerHTML='&#10003;';
    lblEl.style.background='rgba(0,230,118,.06)';lblEl.style.borderColor='rgba(0,230,118,.2)';
  } else {
    chkEl.style.background='';chkEl.style.borderColor=def&&def.critical?'#ff9800':'#5a7a9a';chkEl.textContent='';
    lblEl.style.background='';lblEl.style.borderColor='rgba(100,160,255,.08)';
  }
  var defs=window._checkDefs||[];
  var req=defs.filter(function(c){return c.critical;});
  var done=req.filter(function(c){return state[c.id];}).length;
  var prog=document.getElementById('checklist-progress');
  var btn=document.getElementById('submit-checklist-btn');
  if(prog) prog.textContent=done+' / '+req.length+' required checks completed';
  if(btn){
    if(done===req.length){btn.style.background='#00e676';btn.style.color='#000';btn.style.borderColor='#00e676';}
    else{btn.style.background='#162033';btn.style.color='#8ab0d0';btn.style.borderColor='rgba(100,160,255,.15)';}
  }
};

window.submitDriverChecklist=async function(){
  var state=window._checkState||{};
  var defs=window._checkDefs||[];
  var req=defs.filter(function(c){return c.critical;});
  var allReq=req.every(function(c){return state[c.id];});
  if(!allReq){
    var missing=req.filter(function(c){return !state[c.id];}).map(function(c){return c.label;});
    alert('Please complete all required checks:\n\n'+missing.join('\n'));return;
  }
  var fuelPct=parseInt(document.getElementById('fuel_pct').value)||0;
  var cleanStatus=document.getElementById('cl_status').value;
  if(cleanStatus==='Dirty - Cannot Proceed'){alert('Vehicle is dirty. Please clean before proceeding.');return;}
  if(fuelPct<20){alert('Fuel below 20%. Please refuel before proceeding.');return;}
  try{
    var today=new Date().toISOString().split('T')[0];
    var code=await sbRpc('next_checklist_code');
    var checkData={checklist_code:code,check_date:today,fuel_level_pct:fuelPct,cleaning_status:cleanStatus,vehicle_ready:true,driver_notes:document.getElementById('chk_notes').value||null};
    if(DRIVER_RECORD) checkData.driver_id=DRIVER_RECORD.id;
    defs.forEach(function(c){if(c.id!=='cleaning_ok') checkData[c.id]=state[c.id]||false;});
    await sbInsert('vehicle_checklist',checkData);
    CHECKLIST_DONE_TODAY=true;
    // Store in localStorage so it persists through page actions
    localStorage.setItem('checklist_date', today);
    var dc=document.getElementById('driver-content');
    dc.innerHTML='<div style="text-align:center;padding:40px">'
      +'<div style="font-size:60px;margin-bottom:12px">✅</div>'
      +'<div style="font-size:18px;font-weight:700;color:#00e676;margin-bottom:6px">Vehicle Cleared!</div>'
      +'<div style="font-size:13px;color:#8ab0d0">Checklist '+code+' submitted successfully</div>'
      +'<div style="font-size:12px;color:#5a7a9a;margin-top:4px">Loading your trips...</div></div>';
    setTimeout(renderDriverHome,1500);
  }catch(e){alert('Error: '+e.message);}
};

window.startTrip = async function(id) {
  // Capture GPS location when trip starts
  var updateData = {status:'In Transit', actual_start_time:new Date().toISOString()};
  if(DRIVER_LOCATION) {
    updateData.driver_lat = DRIVER_LOCATION.lat;
    updateData.driver_lng = DRIVER_LOCATION.lng;
  }
  await sbUpdate('trips', updateData, {id:id});
  
  // Show GPS confirmation
  var dc = document.getElementById('driver-content');
  if(dc && DRIVER_LOCATION) {
    var flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#00e676;color:#000;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;z-index:999';
    flash.textContent = '📍 GPS Location recorded — Trip Started!';
    document.body.appendChild(flash);
    setTimeout(function(){flash.remove();},3000);
  }
  
  renderDriverHome();
};

window.completeTrip = async function(id) {
  if(!confirm('Mark this trip as Complete?')) return;
  try {
    await sbUpdate('trips',{status:'Completed',actual_end_time:new Date().toISOString()},{id:id});
    // Show success then refresh home - no checklist re-check
    var dc = document.getElementById('driver-content');
    if(dc) {
      dc.innerHTML = '<div style="text-align:center;padding:30px">'
        +'<div style="font-size:50px;margin-bottom:12px">✅</div>'
        +'<div style="font-size:16px;font-weight:700;color:#00e676">Trip Completed!</div>'
        +'<div style="font-size:12px;color:#8ab0d0;margin-top:6px">Loading your trips...</div>'
        +'</div>';
    }
    setTimeout(renderDriverHome, 1500);
  } catch(e) { alert('Error: '+e.message); }
};

window.openTripCollect = async function(tripId, tripCode) {
  var dc = document.getElementById('driver-content');
  var pickups = await sbFetch('trip_pickups',{select:'*,bins(bin_code,waste_category,zone,generators(company_name))',eq:{trip_id:tripId},order:'sequence_no'});

  var html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
    +'<button onclick="renderDriverHome()" style="background:none;border:1px solid rgba(100,160,255,.15);color:#8ab0d0;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px">← Back</button>'
    +'<div style="font-family:Consolas,monospace;font-size:16px;font-weight:700;color:#00e676">'+tripCode+'</div>'
    +'</div>';

  if(pickups.length===0){
    html += '<div style="background:#162033;border-radius:10px;padding:20px;text-align:center;color:#5a7a9a">No bins assigned to this trip.</div>';
  } else {
    pickups.forEach(function(p,i){
      var done = p.status==='Collected';
      var b = p.bins||{};
      html += '<div id="pickup-'+p.id+'" style="background:'+(done?'rgba(0,230,118,.06)':'#0d1520')+';border:2px solid '+(done?'rgba(0,230,118,.3)':'rgba(100,160,255,.1)')+';border-radius:12px;padding:14px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
        +'<div style="width:32px;height:32px;border-radius:50%;background:'+(done?'#00e676':'#1c2d42')+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:'+(done?'#000':'#5a7a9a')+';flex-shrink:0">'+(done?'✓':(i+1))+'</div>'
        +'<div><div style="font-family:Consolas,monospace;font-weight:700;font-size:14px;color:'+(done?'#00e676':'#e8f4fd')+'">'+( b.bin_code||'-')+'</div>'
        +'<div style="font-size:11.5px;color:#5a7a9a">'+(b.generators&&b.generators.company_name||'-')+' · '+(b.zone||'')+'</div>'

async function renderRM() {
  var ct = document.getElementById('ct');
  try {
    var [records_r, vehicles_r, drivers_r] = await Promise.all([
      sbFetch('reactive_maintenance',{select:'*,vehicles(reg_no),drivers(full_name)',order:'created_at.desc',limit:30}),
      sbFetch('vehicles',{select:'id,reg_no',eq:{status:'Active'}}),
      sbFetch('drivers',{select:'id,full_name',eq:{status:'Active'}}),
    ]);
    var records=safeArr(records_r),vehicles=safeArr(vehicles_r),drivers=safeArr(drivers_r);

    var rows = records.map(function(r){
      return [
        '<strong style="font-family:Consolas,monospace;font-size:11px">'+r.rm_code+'</strong>',
        '<span style="font-family:Consolas,monospace;font-size:11px">'+(r.vehicles&&r.vehicles.reg_no||'-')+'</span>',
        (r.drivers&&r.drivers.full_name||'-'),
        new Date(r.breakdown_at).toLocaleDateString('en-IN'),
        r.fault_description,
        badge(r.severity==='Critical'?'r':r.severity==='High'?'a':'b', r.severity||'-'),
        r.downtime_hours?r.downtime_hours+'h':'-',
        r.repair_cost?'₹'+Number(r.repair_cost).toLocaleString('en-IN'):'-',
        badge(r.status==='Open'?'r':r.status==='In Progress'?'a':'g', r.status),
        r.status!=='Resolved'
          ? '<button class="btn btn-sm" id="rm'+r.id+'" style="cursor:pointer">Resolve</button>'
          : badge('g','Done')
      ];
    });

    var mtdCost = records.filter(function(r){return new Date(r.created_at).getMonth()===new Date().getMonth();}).reduce(function(s,r){return s+(r.repair_cost||0);},0);

    ct.innerHTML = '<div class="sg">'
      +sc('#f44336','Open',records.filter(function(r){return r.status==='Open';}).length,'Breakdowns')
      +sc('#ff9800','In Progress',records.filter(function(r){return r.status==='In Progress';}).length,'')
      +sc('#00e676','Resolved',records.filter(function(r){return r.status==='Resolved';}).length,'')
      +sc('#2196f3','MTD Cost','₹'+(mtdCost/1000).toFixed(0)+'K','Repair spend')
      +'</div>'
      +card('⚡ Reactive Maintenance / Breakdowns',
        '<button class="btn btn-sm" style="background:#f44336;border-color:#f44336;color:#fff" onclick="newRM()">+ Log Breakdown</button>',
        tbl(['RM ID','Vehicle','Driver','Date','Fault','Severity','Downtime','Cost','Status',''],rows), true);
    window._rmData = {vehicles, drivers};
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

// ── MAINTENANCE SCHEDULE ──────────────────────────────────
async function renderSchedule() {
  var ct = document.getElementById('ct');
  try {
    var [scheds_r, vehicles_r, drivers_r] = await Promise.all([
      sbFetch('maintenance_schedule',{select:'*,vehicles(reg_no),drivers(full_name)',order:'scheduled_date'}),
      sbFetch('vehicles',{select:'id,reg_no',eq:{status:'Active'}}),
      sbFetch('drivers',{select:'id,full_name',eq:{status:'Active'}}),
    ]);
    var scheds=safeArr(scheds_r),vehicles=safeArr(vehicles_r),drivers=safeArr(drivers_r);

    function daysTill(d){ return Math.ceil((new Date(d)-new Date())/864e5); }
    function schedColor(d){ var n=daysTill(d); return n<0?'#f44336':n<3?'#f44336':n<7?'#ff9800':'#00e676'; }

    var html = '<div class="sg">'
      +sc('#f44336','Overdue',scheds.filter(function(s){return daysTill(s.scheduled_date)<0&&s.status!=='Completed';}).length,'')
      +sc('#ff9800','Due This Week',scheds.filter(function(s){var d=daysTill(s.scheduled_date);return d>=0&&d<=7&&s.status!=='Completed';}).length,'')
      +sc('#00e676','Scheduled',scheds.filter(function(s){return s.status==='Scheduled';}).length,'')
      +'</div>';

    html += '<div style="background:#162033;border:1px solid rgba(100,160,255,.1);border-radius:12px;overflow:hidden">'
      +'<div class="ch"><span class="ct2">📅 Maintenance Schedule & Alerts</span>'
      +'<button class="btn btn-g btn-sm" onclick="newSchedule()">+ Schedule Service</button></div>'
      +'<div class="cb"><div style="display:flex;flex-direction:column;gap:8px">';

    if(scheds.length===0){
      html += '<div style="text-align:center;padding:20px;color:#5a7a9a">No schedules yet. Add your first service schedule.</div>';
    }

    scheds.forEach(function(s){
      var days = daysTill(s.scheduled_date);
      var color = schedColor(s.scheduled_date);
      var dLabel = days<0?'OVERDUE '+Math.abs(days)+'d':days===0?'TODAY':days===1?'Tomorrow':'In '+days+' days';
      if(s.status==='Completed') { color='#5a7a9a'; dLabel='Completed'; }
      var entity = (s.vehicles&&s.vehicles.reg_no)||(s.drivers&&s.drivers.full_name)||s.entity_type;
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a2840;border-radius:8px;border:1px solid rgba(255,255,255,.05)">'
        +'<div style="width:48px;height:48px;background:#1e3048;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">'
        +'<div style="font-size:9px;text-transform:uppercase;font-weight:600;color:#5a7a9a">'+new Date(s.scheduled_date).toLocaleDateString('en-IN',{month:'short'})+'</div>'
        +'<div style="font-size:18px;font-weight:700;font-family:Consolas,monospace;color:#e2eeff">'+new Date(s.scheduled_date).getDate()+'</div>'
        +'</div>'
        +'<div style="flex:1">'
        +'<div style="font-size:12.5px;font-weight:600;color:#e2eeff">'+s.service_type+'</div>'
        +'<div style="font-size:11px;color:#5a7a9a">'+entity+' · 🔔 '+s.alert_channel+'</div>'
        +'<div style="font-size:11px;margin-top:2px;color:'+color+'">'+dLabel+' · Alert '+s.alert_days_before+'d before</div>'
        +(s.notes?'<div style="font-size:11px;color:#5a7a9a;margin-top:2px">'+s.notes+'</div>':'')
        +'</div>'
        +(s.status!=='Completed'
          ? '<button class="btn btn-sm" style="background:#00e676;border-color:#00e676;color:#000" id="ds'+s.id+'" style2="cursor:pointer">Done</button>'
          : '<span class="badge bg">Done</span>')
        +'</div>';
    });

    html += '</div></div></div>';
    ct.innerHTML = html;
    setTimeout(wireButtons,150);
    window._schedData = {vehicles, drivers};
    setTimeout(function(){
      document.querySelectorAll('[id^="ds"]').forEach(function(btn){
        var id = btn.id.slice(2);
        btn.onclick = function(){ doneSchedule(id); };
      });
    }, 100);
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

window.saveBulkSchedule = async function() {
  var vehId = gv('sch_veh');
  var drvId = gv('sch_drv');
  var days = gv('sch_days');
  var ch = gv('sch_ch');
  var notes = gv('sch_notes');
  var svcs = window._schServices||[];

  var toSchedule = [];
  svcs.forEach(function(svc, idx) {
    var cb = document.getElementById('sc_'+idx);
    var dt = document.getElementById('sd_'+idx);
    if(cb && cb.checked) {
      if(!dt || !dt.value) {
        alert('Please set a date for: '+svc);
        return;
      }
      toSchedule.push({svc:svc, date:dt.value});
    }
  });

  if(toSchedule.length === 0) {
    alert('Please select at least one service and set its date.');
    return;
  }

  try {
    var created = 0;
    for(var i=0; i<toSchedule.length; i++) {
      var code = await sbRpc('next_schedule_code');
      var etype = vehId ? 'vehicle' : 'driver';
      await sbInsert('maintenance_schedule',{
        schedule_code:code,
        entity_type:etype,
        vehicle_id:vehId||null,
        driver_id:drvId||null,
        service_type:toSchedule[i].svc,
        scheduled_date:toSchedule[i].date,
        alert_days_before:parseInt(days)||3,
        alert_channel:ch,
        notes:notes||null,
        status:'Scheduled'
      });
      created++;
    }
    closeModal();
    setTimeout(function(){
      var s=document.createElement('div');
      s.className='alert al-g';
      s.textContent=created+' service(s) scheduled successfully!';
      document.getElementById('ct').prepend(s);
      setTimeout(function(){s.remove();},5000);
    },100);
    renderSchedule();
  } catch(e){alert('Error: '+e.message);}
};

window.saveSchedule = async function() {

// ── REPORTS ───────────────────────────────────────────────
async function renderReports() {
  var ct = document.getElementById('ct');
  try {
    var now = new Date();
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    var [invoices, trips, bins, drivers, vehicles] = await Promise.all([
      sbFetch('invoices',{select:'*,generators(company_name)',order:'invoice_date.desc',limit:100}),
      sbFetch('trips',{select:'*',order:'trip_date.desc',limit:100}),
      sbFetch('bins',{select:'*'}),
      sbFetch('drivers',{select:'*'}),
      sbFetch('vehicles',{select:'*'}),
    ]);
    invoices=safeArr(invoices); trips=safeArr(trips); bins=safeArr(bins); drivers=safeArr(drivers); vehicles=safeArr(vehicles);

    var mtdInv = invoices.filter(function(i){return i.invoice_date>=monthStart;});
    var mtdTrips = trips.filter(function(t){return t.trip_date>=monthStart;});
    var mtdRev = mtdInv.reduce(function(s,i){return s+(i.total_amount||0);},0);
    var totalWt = mtdInv.reduce(function(s,i){return s+(i.net_weight_kg||0);},0);
    var paidInv = mtdInv.filter(function(i){return i.payment_status==='Paid';});
    var collectRate = mtdInv.length>0?Math.round(paidInv.length/mtdInv.length*100):0;

    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      +'<div style="font-size:16px;font-weight:700;color:#e2eeff">📊 Monthly Reports — '+now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})+'</div>'
      +'<button class="btn btn-g btn-sm" onclick="printReport()">🖨️ Print Report</button>'
      +'</div>';

    html += '<div class="sg">'
      +sc('#00e676','Monthly Revenue','₹'+(mtdRev/100000).toFixed(2)+'L',mtdInv.length+' invoices')
      +sc('#2196f3','Waste Collected',(totalWt/1000).toFixed(1)+'T',mtdTrips.length+' trips')
      +sc('#ff9800','Collection Rate',collectRate+'%','Paid invoices')
      +sc('#00bcd4','Active Bins',bins.filter(function(b){return b.status==='Active';}).length,'Deployed')
      +sc('#9c27b0','Active Drivers',drivers.filter(function(d){return d.status==='Active';}).length,'On roster')
      +sc('#00e676','Active Vehicles',vehicles.filter(function(v){return v.status==='Active';}).length,'Fleet')
      +'</div>';

    // Revenue by generator
    var byGen = {};
    mtdInv.forEach(function(i){
      var name = (i.generators&&i.generators.company_name)||'Unknown';
      byGen[name] = (byGen[name]||0) + (i.total_amount||0);
    });
    var genRows = Object.keys(byGen).sort(function(a,b){return byGen[b]-byGen[a];}).map(function(name){
      var pct = mtdRev>0?Math.round(byGen[name]/mtdRev*100):0;
      return [name, '₹'+byGen[name].toLocaleString('en-IN'), pct+'%',
        '<div class="prog" style="width:100px;display:inline-block"><div class="pf" style="width:'+pct+'%;background:#00e676"></div></div>'];
    });

    // Trip status summary
    var tripStatus = {};
    trips.forEach(function(t){ tripStatus[t.status]=(tripStatus[t.status]||0)+1; });
    var tripRows = Object.keys(tripStatus).map(function(s){
      return [badge(s==='Completed'||s==='Certified'?'g':s==='In Transit'?'a':'b',s), tripStatus[s]+''];
    });

    // DL expiry alerts
    var dlAlerts = drivers.filter(function(d){
      return d.dl_expiry && new Date(d.dl_expiry) < new Date(Date.now()+60*864e5);
    });
    var dlRows = dlAlerts.map(function(d){
      var days = Math.ceil((new Date(d.dl_expiry)-new Date())/864e5);
      return [d.full_name, d.dl_no||'-', d.dl_expiry, badge(days<0?'r':days<30?'r':'a', days<0?'EXPIRED':days+'d left')];
    });

    html += '<div class="two">'
      +card('💰 Revenue by Generator','',tbl(['Generator','Revenue','Share',''],genRows),true)
      +card('🚛 Trip Summary','',tbl(['Status','Count'],tripRows),true)
      +'</div>';

    if(dlAlerts.length>0){
      html += card('⚠️ DL Expiry Alerts','<span class="badge br">'+dlAlerts.length+' drivers</span>',
        tbl(['Driver','DL Number','Expiry Date','Status'],dlRows), true);
    }

    ct.innerHTML = html;
    setTimeout(wireButtons,150);
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

// ── OVERRIDE go() TO ADD NEW MODULES ─────────────────────
var _origGo = go;
go = function(page) {
  var access = CURRENT_USER ? (ROLE_ACCESS[CURRENT_USER.role]||[]) : ROLE_ACCESS.admin;
  if(CURRENT_USER && access.length > 0 && !access.includes(page)) {
    var ct = document.getElementById('ct');
    if(ct) ct.innerHTML='<div class="alert al-r">Access denied. Your role does not have permission for this module.</div>';
    return;
  }
  setTimeout(wireButtons, 200);
  var newPages = {rm:renderRM, schedule:renderSchedule, users:renderUsers, reports:renderReports, staff:renderStaff, roles:renderRoles, 'gen-requests':renderGenRequests, checklist:renderChecklist, payments:renderPayments, autoplanner:renderAutoPlanner, smarttrip:renderSmartTripPlanner, sites:renderSites, qrlocations:renderQRLocations, attendance:renderAttendance};
  if(newPages[page]){
    CUR=page;
    document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on');});
    var ni=document.getElementById('ni-'+page);
    if(ni) ni.classList.add('on');
    var titles = {rm:'Reactive Maintenance',schedule:'Maintenance Schedule',users:'User Management',reports:'Reports & Export'};
    var ptEl = document.getElementById('ptitle');
    if(ptEl) ptEl.textContent = titles[page]||page;
    newPages[page]();
  } else {
    _origGo(page);
    setTimeout(wireButtons, 200);
  }
};
