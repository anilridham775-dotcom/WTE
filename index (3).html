<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EcoLoop Pro — Waste-to-Energy ERP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#060a0f;color:#e8f4fd;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#233450;border-radius:3px}
#sb{width:232px;min-width:232px;background:#0d1520;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{background:#0d1520;border-bottom:1px solid rgba(255,255,255,.07);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#ct{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;background:#060a0f}
.ni{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12px;color:#5a7a9a;border-left:2px solid transparent}
.ni:hover{background:rgba(255,255,255,.03);color:#9ab8d4}
.ni.on{color:#00e676;border-left-color:#00e676;background:rgba(0,230,118,.07)}
.nh{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#2e4a65;padding:8px 16px 3px}
.card{background:#0d1520;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;margin-bottom:0}
.ch{padding:11px 15px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct2{font-size:13px;font-weight:600;color:#e8f4fd}
.cb{padding:14px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px}
.sc{background:#0d1520;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:13px 14px;border-top:2px solid var(--c)}
.sl{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#5a7a9a}
.sv{font-size:22px;font-weight:700;margin:5px 0 2px;font-family:Consolas,monospace;color:var(--c)}
.ss{font-size:10.5px;color:#5a7a9a}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600}
.bg{background:rgba(0,230,118,.15);color:#00e676}.ba{background:rgba(255,152,0,.15);color:#ff9800}.br{background:rgba(244,67,54,.15);color:#f44336}.bb{background:rgba(33,150,243,.15);color:#2196f3}.bgr{background:rgba(255,255,255,.08);color:#5a7a9a}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#5a7a9a;font-weight:600;border-bottom:1px solid rgba(255,255,255,.12)}
td{padding:9px 12px;color:#9ab8d4;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
.prog{height:5px;background:#1c2d42;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#1c2d42;color:#e8f4fd;font-family:inherit;font-size:12px;cursor:pointer}
.btn-g{background:#00e676;border-color:#00e676;color:#000;font-weight:700}
.btn-sm{padding:4px 9px;font-size:11px}
.alert{padding:9px 13px;border-radius:8px;font-size:12.5px;border-left:3px solid;margin-bottom:4px}
.al-r{background:rgba(244,67,54,.07);border-color:#f44336;color:#f44336}
.al-a{background:rgba(255,152,0,.07);border-color:#ff9800;color:#ff9800}
.al-g{background:rgba(0,230,118,.07);border-color:#00e676;color:#00e676}
.al-b{background:rgba(33,150,243,.07);border-color:#2196f3;color:#2196f3}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#0d1520;border:1px solid rgba(255,255,255,.12);border-radius:16px;width:580px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.mh{padding:15px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#e8f4fd}
.mb{padding:18px;overflow-y:auto;flex:1}
.mf{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:flex-end;gap:10px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl{font-size:11.5px;color:#9ab8d4;font-weight:500;margin-bottom:4px}
input,select,textarea{background:#162236;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e8f4fd;padding:7px 10px;font-size:12.5px;width:100%;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:#00e676}
.sec{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#5a7a9a;padding:4px 0 8px;border-bottom:1px solid rgba(255,255,255,.07);margin:14px 0 12px;grid-column:1/-1}
.full{grid-column:1/-1}
</style>
</head>
<body>
<div id="sb">
  <div style="padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07)">
    <div style="font-size:22px;margin-bottom:4px">♻️</div>
    <div style="font-family:Consolas,monospace;font-size:13px;font-weight:700;color:#00e676">EcoLoop Pro</div>
    <div style="font-size:9px;color:#5a7a9a;text-transform:uppercase;letter-spacing:.5px">Waste-to-Energy ERP v3.0</div>
  </div>
  <div style="flex:1;padding:6px 0" id="nav"></div>
  <div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#5a7a9a">
    <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#00e676;margin-right:5px"></span>System Online · v3.0
  </div>
</div>
<div id="main">
  <div id="tb">
    <div>
      <div style="font-size:14px;font-weight:600;color:#e8f4fd" id="ptitle">Operations Dashboard</div>
      <div style="font-size:11px;color:#5a7a9a">EcoLoop Waste-to-Energy ERP · Live</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:11px;color:#5a7a9a;padding:3px 10px;background:#162236;border-radius:20px">🟢 All Systems Online</div>
      <button class="btn btn-g btn-sm" onclick="go('trips')">+ New Trip</button>
    </div>
  </div>
  <div id="ct"></div>
</div>

<div id="modal-container"></div>

<script>
var SB_URL='https://oddvetoasqjziohmqugg.supabase.co';
function goTrips(){go('trips');}
function goPage(p){go(p);}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
// ── GLOBAL EVENT DELEGATION ──────────────────────────────
function wireButtons(){
  // Generator edit
  document.querySelectorAll('[id^="eg"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){editGen(id);}; });
  // Driver view/edit
  document.querySelectorAll('[id^="vd"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){viewDriver(id);}; });
  document.querySelectorAll('[id^="ed"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){editDriver(id);}; });
  // Vehicle edit
  document.querySelectorAll('[id^="ev"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){editVeh(id);}; });
  // Trip dispatch/complete
  document.querySelectorAll('[id^="tb"]').forEach(function(b){
    var id=b.id.slice(2,-1), a=b.id.slice(-1);
    var m={d:'Dispatched',i:'In Transit',c:'Completed'};
    b.onclick=function(){updateTripStatus(id,m[a]);};
  });
  // Driver app - open collect
  document.querySelectorAll('[id^="otc"]').forEach(function(b){ var id=b.id.slice(3); var tc=b.getAttribute('data-tc'); b.onclick=function(){openTripCollect(id,tc);}; });
  // Driver app - complete trip
  document.querySelectorAll('[id^="ct"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){completeTrip(id);}; });
  // Collect bin
  document.querySelectorAll('[id^="cb"]').forEach(function(b){ var id=b.id.slice(2); var bid=b.getAttribute('data-bid'); b.onclick=function(){collectBin(id,bid);}; });
  // Issue slip
  document.querySelectorAll('[id^="is"]').forEach(function(b){ var id=b.id.slice(2); var tc=b.getAttribute('data-tc'); b.onclick=function(){issueSlip(id,tc);}; });
  // Resolve RM
  document.querySelectorAll('[id^="rm"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){resolveRM(id);}; });
  // Done schedule
  document.querySelectorAll('[id^="ds"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){doneSchedule(id);}; });
  // Edit user
  document.querySelectorAll('[id^="eu"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){editUser(id);}; });
  // Update fill (bins)
  document.querySelectorAll('[id^="uf"]').forEach(function(b){ var id=b.id.slice(2); var bc=b.getAttribute('data-bc')||''; b.onclick=function(){updateFill(id,bc);}; });
  // Dashboard nav buttons
  var gt=document.getElementById('gotrips'); if(gt) gt.onclick=function(){go('trips');};
  var gb=document.getElementById('gobins'); if(gb) gb.onclick=function(){go('bins');};
  var gv2=document.getElementById('govehicles'); if(gv2) gv2.onclick=function(){go('vehicles');}; 
  // Mark paid (billing)
  document.querySelectorAll('[id^="mp"]').forEach(function(b){ var id=b.id.slice(2); b.onclick=function(){markPaid(id);}; });
}

function safeArr(d){
  if(!d) return [];
  if(Array.isArray(d)) return d;
  if(d.data && Array.isArray(d.data)) return d.data;
  if(typeof d === 'object' && d.message) { console.error('Supabase err:',d.message,d.hint||''); return []; }
  return [];
}
var SB_KEY='sb_publishable_5Z2PrRqnJ8gLiG12KmecCQ_m4VyDFaB';

async function sbFetch(table,opts){
  opts=opts||{};
  var url=SB_URL+'/rest/v1/'+table;
  var params=[];
  if(opts.select) params.push('select='+encodeURIComponent(opts.select));
  if(opts.eq) Object.keys(opts.eq).forEach(k=>params.push(k+'=eq.'+encodeURIComponent(opts.eq[k])));
  if(opts.gte) Object.keys(opts.gte).forEach(k=>params.push(k+'=gte.'+encodeURIComponent(opts.gte[k])));
  if(opts.order) params.push('order='+opts.order);
  if(opts.limit) params.push('limit='+opts.limit);
  if(params.length) url+='?'+params.join('&');
  var r=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Accept':'application/json'}});
  if(!r.ok){ console.error('Supabase error',r.status,table); return []; }
  var data=await r.json();
  return safeArr(data);
}

async function sbInsert(table,data){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation','Accept':'application/json'},body:JSON.stringify(Array.isArray(data)?data:[data])});
  if(!r.ok){var e=await r.json();throw new Error(e.message||e.hint||'Insert failed');}
  return r.json();
}

async function sbUpdate(table,data,eq){
  var url=SB_URL+'/rest/v1/'+table+'?'+Object.keys(eq).map(k=>k+'=eq.'+eq[k]).join('&');
  var r=await fetch(url,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  return r.json();
}

async function sbRpc(fn){
  var r=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Accept':'application/json'},body:'{}'});
  if(!r.ok){var e=await r.json();throw new Error(e.message||'RPC failed');}
  return r.json();
}

var NAV=[
  {s:'Operations',items:[{id:'dashboard',l:'Dashboard',i:'⬡'},{id:'generators',l:'Generator Registry',i:'🏭'},{id:'trips',l:'Trip & Lift Plans',i:'📍'},{id:'billing',l:'Billing & Receipts',i:'🧾'}]},
  {s:'Dustbin Management',items:[{id:'bins',l:'Bin Management',i:'🗑'},{id:'fillalerts',l:'Fill Alerts',i:'⚠️'}]},
  {s:'Compliance',items:[{id:'inspection',l:'Yard Inspection',i:'🔍'},{id:'boiler',l:'Boiler & Steam',i:'🔥'}]},
  {s:'Fleet Management',items:[{id:'vehicles',l:'Vehicle Registry',i:'🚛'},{id:'drivers',l:'Driver Registry',i:'👤'},{id:'cleaning',l:'Vehicle Cleaning',i:'🧹'},{id:'pm',l:'Preventive Maint.',i:'🔧'},{id:'rm',l:'Reactive Maint.',i:'⚡'},{id:'schedule',l:'Maint. Schedule',i:'📅'},{id:'fuel',l:'Fuel Management',i:'⛽'},{id:'tyres',l:'Tyre Management',i:'⭕'}]},
  {s:'Admin',items:[{id:'reports',l:'Reports & Export',i:'📊'},{id:'users',l:'User Management',i:'👥'}]},
];

var PAGE_TITLES={dashboard:'Operations Dashboard',generators:'Generator Registry',trips:'Trip & Lift Plans',billing:'Billing & Receipts',bins:'Bin Management',fillalerts:'Fill Alerts',inspection:'Yard Inspection',boiler:'Boiler & Steam',vehicles:'Vehicle Registry',drivers:'Driver Registry',cleaning:'Vehicle Cleaning',pm:'Preventive Maintenance',rm:'Reactive Maintenance',schedule:'Maintenance Schedule',fuel:'Fuel Management',tyres:'Tyre Management',reports:'Reports & Export',users:'User Management'};

function fc(p){return p>=80?'#f44336':p>=60?'#ff9800':'#00e676';}
function badge(c,t){return '<span class="badge b'+c+'">'+t+'</span>';}
function prog(p,c){return '<div class="prog"><div class="pf" style="width:'+Math.min(p,100)+'%;background:'+(c||fc(p))+'"></div></div>';}
function card(title,extra,body,np){return '<div class="card"><div class="ch"><span class="ct2">'+title+'</span>'+(extra||'')+'</div><div class="'+(np?'':'cb')+'">'+body+'</div></div>';}
function sc(color,label,val,sub){return '<div class="sc" style="--c:'+color+'"><div class="sl">'+label+'</div><div class="sv">'+val+'</div><div class="ss">'+sub+'</div></div>';}
function tbl(heads,rows){
  var h=heads.map(h=>'<th>'+h+'</th>').join('');
  var r=rows.map(row=>'<tr>'+row.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('');
  return '<div style="overflow-x:auto"><table><thead><tr>'+h+'</tr></thead><tbody>'+r+'</tbody></table></div>';
}
function fld(label,html,req){return '<div><div class="fl">'+label+(req?'<span style="color:#f44336;margin-left:2px">*</span>':'')+'</div>'+html+'</div>';}
function inp(id,ph,type){return '<input id="'+id+'" type="'+(type||'text')+'" placeholder="'+(ph||'')+'">';}
function sel(id,opts){return '<select id="'+id+'"><option value="">— Select —</option>'+opts.map(o=>'<option>'+o+'</option>').join('')+'</select>';}
function modal(title,body,foot){
  document.getElementById('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="mh">'+title+'<button onclick="closeModal()" style="background:none;border:none;color:#5a7a9a;cursor:pointer;font-size:18px">✕</button></div><div class="mb">'+body+'</div><div class="mf">'+foot+'</div></div></div>';
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function success(msg){var d=document.createElement('div');d.className='alert al-g';d.textContent=msg;document.getElementById('ct').prepend(d);setTimeout(()=>d.remove(),4000);}

function buildNav(){
  var h='';
  NAV.forEach(sec=>{
    h+='<div class="nh">'+sec.s+'</div>';
    sec.items.forEach(item=>{
      h+='<div class="ni" id="ni-'+item.id+'" data-page="'+item.id+'" onclick="go(this.getAttribute(\'data-page\'))">';
        +'<span style="font-size:15px;width:18px;text-align:center">'+item.i+'</span>'
        +'<span>'+item.l+'</span></div>';
    });
  });
  document.getElementById('nav').innerHTML=h;
}

var CUR='dashboard';
function go(page){
  CUR=page;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  var ni=document.getElementById('ni-'+page);
  if(ni) ni.classList.add('on');
  document.getElementById('ptitle').textContent=PAGE_TITLES[page]||page;
  var ct=document.getElementById('ct');
  ct.innerHTML='<div style="padding:20px;color:#5a7a9a;text-align:center">Loading...</div>';
  var pages={dashboard:renderDash,generators:renderGenerators,trips:renderTrips,billing:renderBilling,bins:renderBins,fillalerts:renderFillAlerts,inspection:renderInspection,boiler:renderBoiler,vehicles:renderVehicles,drivers:renderDrivers,cleaning:renderCleaning,pm:renderPM,fuel:renderFuel,tyres:renderTyres};
  if(pages[page]) pages[page]();
  else ct.innerHTML='<div style="padding:40px;text-align:center;color:#5a7a9a"><div style="font-size:40px;margin-bottom:12px">🚧</div><div style="font-size:16px;color:#e8f4fd">'+PAGE_TITLES[page]+'</div><div style="margin-top:8px">Module loading...</div></div>';
}

async function renderDash(){
  var ct=document.getElementById('ct');
  try{
    var[gens_r,bins_r,trips_r,vehicles_r]=await Promise.all([
      sbFetch('generators',{select:'id',eq:{is_active:'true'}}),
      sbFetch('bins',{select:'id,bin_code,current_fill_pct,zone,generators(company_name)'}),
      sbFetch('trips',{select:'id,trip_code,status,vehicles(reg_no),drivers(full_name)',order:'created_at.desc',limit:5}),
      sbFetch('vehicles',{select:'id,reg_no,current_fuel_pct,status,drivers(full_name)',eq:{status:'Active'}}),
    ]);
    var gens=safeArr(gens_r),bins=safeArr(bins_r),trips=safeArr(trips_r),vehicles=safeArr(vehicles_r);
    var critical=bins.filter(b=>b.current_fill_pct>=80);
    var alerts='';
    if(critical.length) alerts+='<div class="alert al-r">🔴 '+critical.length+' bin(s) critical (≥80%) — pickup required immediately.</div>';
    var stats='<div class="sg">'
      +sc('#00e676','Generators',(gens||[]).length,'Active clients')
      +sc('#2196f3','Total Bins',(bins||[]).length,(critical.length)+' critical')
      +sc('#ff9800','Active Trips',(trips||[]).filter(t=>t.status==='In Transit').length,'In transit')
      +sc('#00e676','Vehicles',(vehicles||[]).length,'Active fleet')
      +sc('#f44336','Critical Bins',critical.length,'≥80% fill')
      +sc('#00bcd4','Boiler B-01','92%','Efficiency')
      +'</div>';
    var tripRows=(trips||[]).map(t=>[
      '<strong style="font-family:Consolas,monospace;color:#00e676">'+t.trip_code+'</strong>',
      '<span style="font-family:Consolas,monospace;font-size:11px">'+(t.vehicles&&t.vehicles.reg_no||'-')+'</span>',
      (t.drivers&&t.drivers.full_name||'-'),
      badge(t.status==='In Transit'?'a':t.status==='Completed'?'g':t.status==='Dispatched'?'b':'gr',t.status)
    ]);
    var binHtml=(bins||[]).slice(0,8).map(b=>'<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span><strong style="font-family:Consolas,monospace;color:#e8f4fd">'+b.bin_code+'</strong> <span style="color:#5a7a9a">'+(b.generators&&b.generators.company_name||'')+' · '+(b.zone||'')+'</span></span><span style="font-family:Consolas,monospace;font-weight:700;color:'+fc(b.current_fill_pct||0)+'">'+( b.current_fill_pct||0)+'%</span></div>'+prog(b.current_fill_pct||0)+'</div>').join('');
    var fleetHtml=(vehicles||[]).slice(0,4).map(v=>'<div style="background:#111d2e;border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><strong style="font-family:Consolas,monospace;font-size:12px">'+v.reg_no+'</strong><div style="font-size:10.5px;color:#5a7a9a">'+(v.drivers&&v.drivers.full_name||'Unassigned')+'</div></div>'+badge('g',v.status)+'</div>'+prog(v.current_fuel_pct||0)+'<div style="font-size:10px;color:#5a7a9a;margin-top:3px">Fuel '+(v.current_fuel_pct||0)+'%</div></div>').join('');
    var boilerHtml='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">'
      +['842°C|Combustion|#f44336|84','9.2 bar|Pressure|#ff9800|77','92%|Efficiency|#00e676|92'].map(s=>{var p=s.split('|');return'<div style="text-align:center;background:#111d2e;border-radius:8px;padding:10px"><div style="font-size:18px;font-weight:700;font-family:Consolas,monospace;color:'+p[2]+'">'+p[0]+'</div><div style="font-size:10px;color:#5a7a9a;margin:3px 0">'+p[1]+'</div>'+prog(parseInt(p[3]),p[2])+'</div>';}).join('')+'</div>'
      +'<div style="font-size:11.5px;color:#5a7a9a">Steam: <strong style="color:#e8f4fd">4.2T/h</strong> · Feed: <strong style="color:#e8f4fd">580kg/h</strong></div>';
    ct.innerHTML=alerts+stats
      +'<div class="two">'
      +card('🚛 Active Trips','<button class="btn btn-sm" id="gotrips" style="cursor:pointer">All</button>',tbl(['Trip','Vehicle','Driver','Status'],tripRows),true)
      +card('🔥 Boiler B-01 Live','<span class="badge bg">Operational</span>',boilerHtml)
      +'</div>'
      +'<div class="two">'
      +card('📊 Bin Fill Levels','<button class="btn btn-sm" id="gobins" style="cursor:pointer">All Bins</button>',binHtml)

async function doLogin() {

  if(!email||!pin){ document.getElementById('login-err').innerHTML='<div style="background:rgba(244,67,54,.1);border-left:3px solid #f44336;padding:8px 12px;border-radius:6px;color:#f44336;font-size:12px">Please enter email and PIN.</div>'; return; }
  var data = await sbFetch('user_roles',{select:'*',eq:{email:email}});
  var user = data && data[0];

  CURRENT_USER = user;

// ── REACTIVE MAINTENANCE ──────────────────────────────────
async function renderRM() {
  var ct = document.getElementById('ct');
  try {
    var [records, vehicles, drivers] = await Promise.all([
      sbFetch('reactive_maintenance',{select:'*,vehicles(reg_no),drivers(full_name)',order:'created_at.desc',limit:30}),
      sbFetch('vehicles',{select:'id,reg_no',eq:{status:'Active'}}),
      sbFetch('drivers',{select:'id,full_name',eq:{status:'Active'}}),
    ]);
    records = safeArr(records); vehicles = safeArr(vehicles); drivers = safeArr(drivers);

    var rows = records.map(function(r){
      return [
        '<strong style="font-family:Consolas,monospace;font-size:11px">'+r.rm_code+'</strong>',
        '<span style="font-family:Consolas,monospace;font-size:11px">'+(r.vehicles&&r.vehicles.reg_no||'-')+'</span>',
        (r.drivers&&r.drivers.full_name||'-'),
        new Date(r.breakdown_at).toLocaleDateString('en-IN'),
        r.fault_description,
        badge(r.severity==='Critical'?'r':r.severity==='High'?'a':'b', r.severity||'-'),
        r.downtime_hours?r.downtime_hours+'h':'-',
        r.repair_cost?'₹'+Number(r.repair_cost).toLocaleString('en-IN'):'-',
        badge(r.status==='Open'?'r':r.status==='In Progress'?'a':'g', r.status),
        r.status!=='Resolved'
          ? '<button class="btn btn-sm" id="rm'+r.id+'" style="cursor:pointer">Resolve</button>'
          : badge('g','Done')
      ];
    });

    var mtdCost = records.filter(function(r){return new Date(r.created_at).getMonth()===new Date().getMonth();}).reduce(function(s,r){return s+(r.repair_cost||0);},0);

    ct.innerHTML = '<div class="sg">'
      +sc('#f44336','Open',records.filter(function(r){return r.status==='Open';}).length,'Breakdowns')
      +sc('#ff9800','In Progress',records.filter(function(r){return r.status==='In Progress';}).length,'')
      +sc('#00e676','Resolved',records.filter(function(r){return r.status==='Resolved';}).length,'')
      +sc('#2196f3','MTD Cost','₹'+(mtdCost/1000).toFixed(0)+'K','Repair spend')
      +'</div>'
      +card('⚡ Reactive Maintenance / Breakdowns',
        '<button class="btn btn-sm" style="background:#f44336;border-color:#f44336;color:#fff" onclick="newRM()">+ Log Breakdown</button>',
        tbl(['RM ID','Vehicle','Driver','Date','Fault','Severity','Downtime','Cost','Status',''],rows), true);
    window._rmData = {vehicles, drivers};
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

// ── MAINTENANCE SCHEDULE ──────────────────────────────────
async function renderSchedule() {
  var ct = document.getElementById('ct');
  try {
    var [scheds, vehicles, drivers] = await Promise.all([
      sbFetch('maintenance_schedule',{select:'*,vehicles(reg_no),drivers(full_name)',order:'scheduled_date'}),
      sbFetch('vehicles',{select:'id,reg_no',eq:{status:'Active'}}),
      sbFetch('drivers',{select:'id,full_name',eq:{status:'Active'}}),
    ]);
    scheds = safeArr(scheds); vehicles = safeArr(vehicles); drivers = safeArr(drivers);

    function daysTill(d){ return Math.ceil((new Date(d)-new Date())/864e5); }
    function schedColor(d){ var n=daysTill(d); return n<0?'#f44336':n<3?'#f44336':n<7?'#ff9800':'#00e676'; }

    var html = '<div class="sg">'
      +sc('#f44336','Overdue',scheds.filter(function(s){return daysTill(s.scheduled_date)<0&&s.status!=='Completed';}).length,'')
      +sc('#ff9800','Due This Week',scheds.filter(function(s){var d=daysTill(s.scheduled_date);return d>=0&&d<=7&&s.status!=='Completed';}).length,'')
      +sc('#00e676','Scheduled',scheds.filter(function(s){return s.status==='Scheduled';}).length,'')
      +'</div>';

    html += '<div style="background:#0d1520;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden">'
      +'<div class="ch"><span class="ct2">📅 Maintenance Schedule & Alerts</span>'
      +'<button class="btn btn-g btn-sm" onclick="newSchedule()">+ Schedule Service</button></div>'
      +'<div class="cb"><div style="display:flex;flex-direction:column;gap:8px">';

    if(scheds.length===0){
      html += '<div style="text-align:center;padding:20px;color:#5a7a9a">No schedules yet. Add your first service schedule.</div>';
    }

    scheds.forEach(function(s){
      var days = daysTill(s.scheduled_date);
      var color = schedColor(s.scheduled_date);
      var dLabel = days<0?'OVERDUE '+Math.abs(days)+'d':days===0?'TODAY':days===1?'Tomorrow':'In '+days+' days';
      if(s.status==='Completed') { color='#5a7a9a'; dLabel='Completed'; }
      var entity = (s.vehicles&&s.vehicles.reg_no)||(s.drivers&&s.drivers.full_name)||s.entity_type;
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#111d2e;border-radius:8px;border:1px solid rgba(255,255,255,.05)">'
        +'<div style="width:48px;height:48px;background:#162236;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">'
        +'<div style="font-size:9px;text-transform:uppercase;font-weight:600;color:#5a7a9a">'+new Date(s.scheduled_date).toLocaleDateString('en-IN',{month:'short'})+'</div>'
        +'<div style="font-size:18px;font-weight:700;font-family:Consolas,monospace;color:#e8f4fd">'+new Date(s.scheduled_date).getDate()+'</div>'
        +'</div>'
        +'<div style="flex:1">'
        +'<div style="font-size:12.5px;font-weight:600;color:#e8f4fd">'+s.service_type+'</div>'
        +'<div style="font-size:11px;color:#5a7a9a">'+entity+' · 🔔 '+s.alert_channel+'</div>'
        +'<div style="font-size:11px;margin-top:2px;color:'+color+'">'+dLabel+' · Alert '+s.alert_days_before+'d before</div>'
        +(s.notes?'<div style="font-size:11px;color:#5a7a9a;margin-top:2px">'+s.notes+'</div>':'')
        +'</div>'
        +(s.status!=='Completed'
          ? '<button class="btn btn-sm" style="background:#00e676;border-color:#00e676;color:#000" id="ds'+s.id+'" style2="cursor:pointer">Done</button>'
          : '<span class="badge bg">Done</span>')
        +'</div>';
    });

    html += '</div></div></div>';
    ct.innerHTML = html;
    setTimeout(wireButtons,150);
    window._schedData = {vehicles, drivers};
    setTimeout(function(){
      document.querySelectorAll('[id^="ds"]').forEach(function(btn){
        var id = btn.id.slice(2);
        btn.onclick = function(){ doneSchedule(id); };
      });
    }, 100);
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

// ── REPORTS ───────────────────────────────────────────────
async function renderReports() {
  var ct = document.getElementById('ct');
  try {
    var now = new Date();
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    var [invoices, trips, bins, drivers, vehicles] = await Promise.all([
      sbFetch('invoices',{select:'*,generators(company_name)',order:'invoice_date.desc',limit:100}),
      sbFetch('trips',{select:'*',order:'trip_date.desc',limit:100}),
      sbFetch('bins',{select:'*'}),
      sbFetch('drivers',{select:'*'}),
      sbFetch('vehicles',{select:'*'}),
    ]);
    invoices=safeArr(invoices); trips=safeArr(trips); bins=safeArr(bins); drivers=safeArr(drivers); vehicles=safeArr(vehicles);

    var mtdInv = invoices.filter(function(i){return i.invoice_date>=monthStart;});
    var mtdTrips = trips.filter(function(t){return t.trip_date>=monthStart;});
    var mtdRev = mtdInv.reduce(function(s,i){return s+(i.total_amount||0);},0);
    var totalWt = mtdInv.reduce(function(s,i){return s+(i.net_weight_kg||0);},0);
    var paidInv = mtdInv.filter(function(i){return i.payment_status==='Paid';});
    var collectRate = mtdInv.length>0?Math.round(paidInv.length/mtdInv.length*100):0;

    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      +'<div style="font-size:16px;font-weight:700;color:#e8f4fd">📊 Monthly Reports — '+now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})+'</div>'
      +'<button class="btn btn-g btn-sm" onclick="printReport()">🖨️ Print Report</button>'
      +'</div>';

    html += '<div class="sg">'
      +sc('#00e676','Monthly Revenue','₹'+(mtdRev/100000).toFixed(2)+'L',mtdInv.length+' invoices')
      +sc('#2196f3','Waste Collected',(totalWt/1000).toFixed(1)+'T',mtdTrips.length+' trips')
      +sc('#ff9800','Collection Rate',collectRate+'%','Paid invoices')
      +sc('#00bcd4','Active Bins',bins.filter(function(b){return b.status==='Active';}).length,'Deployed')
      +sc('#9c27b0','Active Drivers',drivers.filter(function(d){return d.status==='Active';}).length,'On roster')
      +sc('#00e676','Active Vehicles',vehicles.filter(function(v){return v.status==='Active';}).length,'Fleet')
      +'</div>';

    // Revenue by generator
    var byGen = {};
    mtdInv.forEach(function(i){
      var name = (i.generators&&i.generators.company_name)||'Unknown';
      byGen[name] = (byGen[name]||0) + (i.total_amount||0);
    });
    var genRows = Object.keys(byGen).sort(function(a,b){return byGen[b]-byGen[a];}).map(function(name){
      var pct = mtdRev>0?Math.round(byGen[name]/mtdRev*100):0;
      return [name, '₹'+byGen[name].toLocaleString('en-IN'), pct+'%',
        '<div class="prog" style="width:100px;display:inline-block"><div class="pf" style="width:'+pct+'%;background:#00e676"></div></div>'];
    });

    // Trip status summary
    var tripStatus = {};
    trips.forEach(function(t){ tripStatus[t.status]=(tripStatus[t.status]||0)+1; });
    var tripRows = Object.keys(tripStatus).map(function(s){
      return [badge(s==='Completed'||s==='Certified'?'g':s==='In Transit'?'a':'b',s), tripStatus[s]+''];
    });

    // DL expiry alerts
    var dlAlerts = drivers.filter(function(d){
      return d.dl_expiry && new Date(d.dl_expiry) < new Date(Date.now()+60*864e5);
    });
    var dlRows = dlAlerts.map(function(d){
      var days = Math.ceil((new Date(d.dl_expiry)-new Date())/864e5);
      return [d.full_name, d.dl_no||'-', d.dl_expiry, badge(days<0?'r':days<30?'r':'a', days<0?'EXPIRED':days+'d left')];
    });

    html += '<div class="two">'
      +card('💰 Revenue by Generator','',tbl(['Generator','Revenue','Share',''],genRows),true)
      +card('🚛 Trip Summary','',tbl(['Status','Count'],tripRows),true)
      +'</div>';

    if(dlAlerts.length>0){
      html += card('⚠️ DL Expiry Alerts','<span class="badge br">'+dlAlerts.length+' drivers</span>',
        tbl(['Driver','DL Number','Expiry Date','Status'],dlRows), true);
    }

    ct.innerHTML = html;
    setTimeout(wireButtons,150);
  } catch(e) { ct.innerHTML='<div class="alert al-r">Error: '+e.message+'</div>'; }
}

// ── OVERRIDE go() TO ADD NEW MODULES ─────────────────────
var _origGo = go;
go = function(page) {
  var access = CURRENT_USER ? (ROLE_ACCESS[CURRENT_USER.role]||[]) : ROLE_ACCESS.admin;
  if(CURRENT_USER && access.length > 0 && !access.includes(page)) {
    var ct = document.getElementById('ct');
    if(ct) ct.innerHTML='<div class="alert al-r">Access denied. Your role does not have permission for this module.</div>';
    return;
  }
  var newPages = {rm:renderRM, schedule:renderSchedule, users:renderUsers, reports:renderReports};
  if(newPages[page]){
    CUR=page;
    document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on');});
    var ni=document.getElementById('ni-'+page);
    if(ni) ni.classList.add('on');
    var titles = {rm:'Reactive Maintenance',schedule:'Maintenance Schedule',users:'User Management',reports:'Reports & Export'};
    var ptEl = document.getElementById('ptitle');
    if(ptEl) ptEl.textContent = titles[page]||page;
    newPages[page]();
  } else {
    _origGo(page);
  }
};
